<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.20"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square base with brand gradient -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <!-- Three ascending bars — classic trading chart symbol -->
  <g fill="white" filter="url(#shadow)">
    <rect x="248" y="612" width="128" height="216" rx="24"/>
    <rect x="448" y="412" width="128" height="416" rx="24"/>
    <rect x="648" y="212" width="128" height="616" rx="24"/>
  </g>
  <!-- Subtle trend line above the bars -->
  <path d="M 312 540 L 512 340 L 712 140" stroke="white" stroke-opacity="0.45" stroke-width="32" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small dots at each peak -->
  <g fill="white">
    <circle cx="312" cy="540" r="22"/>
    <circle cx="512" cy="340" r="22"/>
    <circle cx="712" cy="140" r="22"/>
  </g>
</svg>
