<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Times New Roman',Times,Georgia,serif;background:#f0efe9;color:#1a1a18;}
#home{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:32px 18px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.home-title{font-size:34px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;text-align:center;}
.home-sub{font-size:15px;color:#6b6b67;margin-bottom:28px;text-align:center;}
.apps-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;width:100%;max-width:980px;margin-bottom:22px;}
.app-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:22px 10px;background:var(--cbg);color:var(--ctc);border:none;border-radius:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;font-family:'Times New Roman',Times,Georgia,serif;box-shadow:0 2px 8px rgba(0,0,0,.08);-webkit-tap-highlight-color:transparent;user-select:none;}
.app-btn:hover{transform:translateY(-4px);box-shadow:0 8px 22px rgba(0,0,0,.12);}
.app-btn:active{transform:translateY(-1px);opacity:.88;}
.app-icon{font-size:32px;line-height:1;}
.app-name{font-size:12px;font-weight:700;text-align:center;line-height:1.3;}
.bkp-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
.bkp-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:0.5px solid rgba(0,0,0,.17);border-radius:8px;color:#6b6b67;font-family:'Times New Roman',Times,Georgia,serif;font-size:13px;font-weight:600;padding:8px 16px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.bkp-btn:hover{border-color:#1a1a18;color:#1a1a18;}
.bkp-note{font-size:11px;color:#9a9a96;}
#viewer{position:fixed;inset:0;display:none;flex-direction:column;background:#fff;z-index:100;}
#viewer.open{display:flex;}
#topbar{flex-shrink:0;display:flex;align-items:center;background:#1a1a18;min-height:44px;}
#back-btn{background:none;border:none;color:#f0efe9;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Times New Roman',Times,Georgia,serif;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
#tool-label{color:#9a9a96;font-size:12px;padding-right:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#tool-frame{flex:1;width:100%;border:none;background:#f0efe9;}
@media(max-width:580px){
  .apps-grid{grid-template-columns:repeat(3,1fr);gap:8px;}
  .home-title{font-size:24px;}
  .app-btn{padding:16px 8px;}
  .app-icon{font-size:26px;}
  .app-name{font-size:10px;}
  .home-sub{font-size:13px;margin-bottom:20px;}
}
@media(max-width:360px){
  .apps-grid{grid-template-columns:repeat(2,1fr);}
}
/* iOS safe-area for notch / home indicator */
#home{padding-top:max(32px, env(safe-area-inset-top));padding-bottom:max(32px, env(safe-area-inset-bottom));}
#topbar{padding-top:env(safe-area-inset-top);}
#viewer{padding-bottom:env(safe-area-inset-bottom);}
</style>
<style id="theme-style">

body{background:var(--bg) !important;color:var(--text) !important;}
.home-sub,.bkp-note{color:var(--muted) !important;}
.bkp-btn{border-color:var(--border) !important;color:var(--sub) !important;background:transparent !important;}
.bkp-btn:hover{color:var(--text) !important;border-color:var(--text) !important;}
#viewer{background:var(--bg) !important;}
#topbar{background:var(--topbar) !important;}
#tool-frame{background:var(--bg) !important;}
.theme-picker{position:relative;display:inline-block;}
.theme-menu{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);display:none;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;box-shadow:0 6px 20px var(--shadow);padding:6px;z-index:50;min-width:170px;}
.theme-menu.open{display:block;}
.theme-menu button{display:block;width:100%;text-align:left;padding:9px 12px;background:none;border:none;border-radius:6px;color:var(--text);cursor:pointer;font-family:inherit;font-size:13px;}
.theme-menu button:hover{background:var(--bg);}
.theme-menu button.active{font-weight:700;background:var(--bg);}
</style>
</head>

    <div class="theme-picker">
      <button class="bkp-btn" onclick="toggleThemeMenu(event)">🎨 Тема</button>
      <div class="theme-menu" id="theme-menu">
        <button data-theme="light" onclick="applyTheme('light')">☀️ Light Classic</button>
        <button data-theme="dark" onclick="applyTheme('dark')">🌙 Dark</button>
        <button data-theme="oled" onclick="applyTheme('oled')">🖤 OLED Black</button>
        <button data-theme="sepia" onclick="applyTheme('sepia')">📜 Sepia</button>

    </div>
  </div>
</div>

<div id="viewer">

</div>

xt);}\n.ebtn[data-e=\"calm\"].active{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);font-weight:700;}\n.ebtn[data-e=\"fear\"].active{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);font-weight:700;}\n.ebtn[data-e=\"greed\"].active{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);font-weight:700;}\n.ebtn[data-e=\"fomo\"].active{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);font-weight:700;}\n.ebtn[data-e=\"revenge\"].active{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple-tx);font-weight:700;}\n.pbtn{padding:9px 4px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surf2);color:var(--text2);text-align:center;font-family:var(--font);transition:all .15s;}\n.pbtn:hover{border-color:var(--text3);color:var(--text);}\n.pbtn[data-p=\"yes\"].active{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);font-weight:700;}\n.pbtn[data-p=\"partial\"].active{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);font-weight:700;}\n.pbtn[data-p=\"no\"].active{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);font-weight:700;}\n.emotion-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}\n.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}\n.risk-result{background:var(--amber-bg);border:0.5px solid var(--amber-bd);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--amber-tx);font-weight:600;margin-top:8px;display:none;}\n.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}\n.filter-bar input,.filter-bar select{width:auto;flex:1;min-width:120px;padding:7px 10px;font-size:13px;}\n.filter-bar .btn-secondary{flex-shrink:0;}\n.export-bar{display:flex;gap:8px;margin-bottom:12px;}\n/* PERIOD */\n.period-box{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:18px;}\n.period-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}\n.ptype-btn{padding:12px 8px;font-size:13px;font-weight:700;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surf2);color:var(--text2);text-align:center;font-family:var(--font);transition:all .15s;}\n.ptype-btn.active{background:var(--text);color:var(--surface);border-color:var(--text);}\n.period-selects{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}\n.close-period-btn{width:100%;padding:12px;background:var(--amber-bg);color:var(--amber-tx);border:1.5px solid var(--amber-bd);border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:700;font-family:var(--font);transition:all .15s;}\n.close-period-btn:hover{background:var(--amber-bd);color:#fff;}\n.period-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;}\n.period-card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .1s;}\n.period-card-header:hover{background:var(--surf2);}\n.period-card.open .period-card-body{display:block;}\n.period-card.open .period-chevron{transform:rotate(180deg);}\n.period-card-body{display:none;padding:0 16px 16px;border-top:0.5px solid var(--border);}\n.period-chevron{font-size:10px;color:var(--text3);margin-left:auto;transition:transform .2s;flex-shrink:0;}\n.period-name{font-size:15px;font-weight:700;}\n.period-meta{font-size:12px;color:var(--text2);margin-top:2px;}\n.period-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;}\n.del-period-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:12px;padding:4px 10px;font-family:var(--font);transition:all .15s;}\n.del-period-btn:hover{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-bd);}\n</style></head><body>\n<div class=\"page\">\n  <h1>\u0422\u043e\u0440\u0433\u043e\u0432\u044b\u0439 \u0436\u0443\u0440\u043d\u0430\u043b</h1>\n  <p class=\"subtitle\">\u0424\u0438\u043a\u0441\u0438\u0440\u0443\u0439 \u0441\u0434\u0435\u043b\u043a\u0438, \u044d\u043c\u043e\u0446\u0438\u0438 \u0438 \u0441\u043b\u0435\u0434\u043e\u0432\u0430\u043d\u0438\u0435 \u043f\u043b\u0430\u043d\u0443</p>\n  <div class=\"metric-grid mg-4\" id=\"metrics-bar\"></div>\n  <div class=\"tabs-bar\">\n    <button class=\"tab-btn active\" onclick=\"showTab('log')\">\u0421\u0434\u0435\u043b\u043a\u0438</button>\n    <button class=\"tab-btn\" onclick=\"showTab('history')\">\u0418\u0441\u0442\u043e\u0440\u0438\u044f</button>\n    <button class=\"tab-btn\" onclick=\"showTab('periods')\">\u041f\u0435\u0440\u0438\u043e\u0434\u044b</button>\n    <button class=\"tab-btn\" onclick=\"showTab('stats')\">\u0410\u043d\u0430\u043b\u0438\u0442\u0438\u043a\u0430</button>\n  </div>\n  <div id=\"tab-log\">\n    <button class=\"add-btn\" onclick=\"addCard()\"><span class=\"plus-icon\">+</span>&nbsp;\u041d\u043e\u0432\u0430\u044f \u0441\u0434\u0435\u043b\u043a\u0430</button>\n    <div id=\"cards\"></div>\n  </div>\n  <div id=\"tab-history\" style=\"display:none\">\n    <div class=\"filter-bar\">\n      <input type=\"text\" id=\"f-search\" placeholder=\"\u041f\u043e\u0438\u0441\u043a \u043f\u043e \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442\u0443\u2026\" oninput=\"renderHistory()\">\n      <select id=\"f-dir\" onchange=\"renderHistory()\"><option value=\"\">\u0412\u0441\u0435 \u043d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u044f</option><option value=\"long\">Long</option><option value=\"short\">Short</option></select>\n      <select id=\"f-emotion\" onchange=\"renderHistory()\">\n        <option value=\"\">\u0412\u0441\u0435 \u044d\u043c\u043e\u0446\u0438\u0438</option>\n        <option value=\"calm\">\u0421\u043f\u043e\u043a\u043e\u0439\u0441\u0442\u0432\u0438\u0435</option><option value=\"fear\">\u0421\u0442\u0440\u0430\u0445</option>\n        <option value=\"greed\">\u0416\u0430\u0434\u043d\u043e\u0441\u0442\u044c</option><option value=\"fomo\">FOMO</option><option value=\"revenge\">\u041c\u0435\u0441\u0442\u044c</option>\n      </select>\n      <button class=\"btn-secondary\" onclick=\"clearFilters()\">\u0421\u0431\u0440\u043e\u0441\u0438\u0442\u044c</button>\n    </div>\n    <div class=\"export-bar\">\n      <button class=\"btn-secondary\" onclick=\"exportCSV()\">&#8595; \u042d\u043a\u0441\u043f\u043e\u0440\u0442 CSV</button>\n      <span id=\"history-count\" style=\"font-size:12px;color:var(--text2);align-self:center;margin-left:4px\"></span>\n    </div>\n    <div id=\"history-content\"></div>\n  </div>\n  <div id=\"tab-periods\" style=\"display:none\">\n    <div class=\"period-box\">\n      <div class=\"section-label\">\u0417\u0430\u043a\u0440\u044b\u0442\u044c \u043f\u0435\u0440\u0438\u043e\u0434</div>\n      <div class=\"period-type-grid\">\n        <button class=\"ptype-btn active\" onclick=\"setPType('month')\" id=\"pt-month\">\u041c\u0435\u0441\u044f\u0446</button>\n        <button class=\"ptype-btn\" onclick=\"setPType('quarter')\" id=\"pt-quarter\">\u041a\u0432\u0430\u0440\u0442\u0430\u043b</button>\n        <button class=\"ptype-btn\" onclick=\"setPType('year')\" id=\"pt-year\">\u0413\u043e\u0434</button>\n      </div>\n      <div class=\"period-selects\" id=\"period-selects\"></div>\n      <div id=\"period-preview\" style=\"margin-bottom:14px\"></div>\n      <button class=\"close-period-btn\" onclick=\"closePeriod()\">\u0417\u0430\u043a\u0440\u044b\u0442\u044c \u0438 \u0441\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u044c \u043f\u0435\u0440\u0438\u043e\u0434</button>\n    </div>\n    <div class=\"section-label\" style=\"margin-bottom:8px\">\u0421\u043e\u0445\u0440\u0430\u043d\u0451\u043d\u043d\u044b\u0435 \u043f\u0435\u0440\u0438\u043e\u0434\u044b</div>\n    <div id=\"archived-periods\"></div>\n  </div>\n  <div id=\"tab-stats\" style=\"display:none\"><div id=\"stats-content\"></div></div>\n</div>\n<script>\nconst EL={calm:'\u0421\u043f\u043e\u043a\u043e\u0439\u0441\u0442\u0432\u0438\u0435',fear:'\u0421\u0442\u0440\u0430\u0445',greed:'\u0416\u0430\u0434\u043d\u043e\u0441\u0442\u044c',fomo:'FOMO',revenge:'\u041c\u0435\u0441\u0442\u044c'};\nconst PL={yes:'\u041f\u043e\u043b\u043d\u043e\u0441\u0442\u044c\u044e',partial:'\u0427\u0430\u0441\u0442\u0438\u0447\u043d\u043e',no:'\u041d\u0430\u0440\u0443\u0448\u0438\u043b'};\nlet trades=[],cardIdx=0,pnlChart=null,archivedPeriods=[],currentPType='month';\nfunction load(){try{const s=localStorage.getItem('tj_v3');if(s)trades=JSON.parse(s);}catch(e){}try{const p=localStorage.getItem('tj_periods');if(p)archivedPeriods=JSON.parse(p);}catch(e){}renderMetrics();}\nfunction save(){localStorage.setItem('tj_v3',JSON.stringify(trades));}\nfunction savePeriods(){localStorage.setItem('tj_periods',JSON.stringify(archivedPeriods));}\nfunction nowLocal(){const n=new Date();return new Date(n-n.getTimezoneOffset()*60000).toISOString().slice(0,16);}\nfunction showTab(t){['log','history','periods','stats'].forEach((tab,i)=>{document.getElementById('tab-'+tab).style.display=tab===t?'':'none';document.querySelectorAll('.tab-btn')[i].classList.toggle('active',tab===t);});if(t==='history')renderHistory();if(t==='stats')renderStats();if(t==='periods'){buildPeriodSelects();renderArchivedPeriods();}}\nfunction clearFilters(){document.getElementById('f-search').value='';document.getElementById('f-dir').value='';document.getElementById('f-emotion').value='';renderHistory();}\nfunction getFilteredTrades(){let r=trades;const s=(document.getElementById('f-search').value||'').toLowerCase();const d=document.getElementById('f-dir').value;const e=document.getElementById('f-emotion').value;if(s)r=r.filter(t=>t.asset&&t.asset.toLowerCase().includes(s));if(d)r=r.filter(t=>t.dir===d);if(e)r=r.filter(t=>t.emotion===e);return r;}\nfunction exportCSV(){\n  const ft=getFilteredTrades();\n  if(!ft.length){alert('\u041d\u0435\u0442 \u0441\u0434\u0435\u043b\u043e\u043a \u0434\u043b\u044f \u044d\u043a\u0441\u043f\u043e\u0440\u0442\u0430');return;}\n  const h=['\u0414\u0430\u0442\u0430','\u0418\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442','\u041d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435','\u0420\u0430\u0437\u043c\u0435\u0440','\u0426\u0435\u043d\u0430 \u0432\u0445\u043e\u0434\u0430','\u0426\u0435\u043d\u0430 \u0432\u044b\u0445\u043e\u0434\u0430','\u0421\u0442\u043e\u043f-\u043b\u043e\u0441\u0441','\u0422\u0435\u0439\u043a-\u043f\u0440\u043e\u0444\u0438\u0442','P&L','\u042d\u043c\u043e\u0446\u0438\u044f','\u0421\u043e\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435 \u043f\u043b\u0430\u043d\u0430','\u041f\u0440\u0438\u0447\u0438\u043d\u0430 \u0432\u044b\u0445\u043e\u0434\u0430','\u0417\u0430\u043c\u0435\u0442\u043a\u0438'];\n  const rows=ft.map(t=>[t.date||'',t.asset||'',t.dir==='long'?'Long':'Short',t.size||'',t.entry||'',t.exit||'',t.sl||'',t.tp||'',t.pnl||'',EL[t.emotion]||'',PL[t.plan]||'',t.reason||'',t.notes||''].map(v=>'\"'+String(v).replace(/\"/g,'\"\"')+'\"').join(','));\n  const csv='\\uFEFF'+[h.join(','),...rows].join('\\n');\n  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});\n  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='trades_'+new Date().toISOString().slice(0,10)+'.csv';a.click();\n}\n// RISK CALC\nfunction calcRisk(id){\n  const deposit=parseFloat(document.getElementById('rc-dep-'+id).value)||0;\n  const riskPct=parseFloat(document.getElementById('rc-pct-'+id).value)||1;\n  const entry=parseFloat(document.getElementById('fen-'+id).value)||0;\n  const sl=parseFloat(document.getElementById('fsl-'+id).value)||0;\n  const res=document.getElementById('risk-result-'+id);\n  if(!deposit||!entry||!sl){res.style.display='none';return;}\n  const riskAmt=deposit*riskPct/100;\n  const diff=Math.abs(entry-sl);\n  if(!diff){res.style.display='none';return;}\n  const units=riskAmt/diff;\n  const posSize=(units*entry).toFixed(2);\n  res.style.display='block';\n  res.textContent='\u0420\u0438\u0441\u043a: $'+riskAmt.toFixed(2)+' \u00b7 \u041e\u0431\u044a\u0451\u043c \u043f\u043e\u0437\u0438\u0446\u0438\u0438: $'+posSize+' ('+units.toFixed(4)+' \u0435\u0434.)';\n}\n// PERIOD\nconst MONTHS=['\u042f\u043d\u0432\u0430\u0440\u044c','\u0424\u0435\u0432\u0440\u0430\u043b\u044c','\u041c\u0430\u0440\u0442','\u0410\u043f\u0440\u0435\u043b\u044c','\u041c\u0430\u0439','\u0418\u044e\u043d\u044c','\u0418\u044e\u043b\u044c','\u0410\u0432\u0433\u0443\u0441\u0442','\u0421\u0435\u043d\u0442\u044f\u0431\u0440\u044c','\u041e\u043a\u0442\u044f\u0431\u0440\u044c','\u041d\u043e\u044f\u0431\u0440\u044c','\u0414\u0435\u043a\u0430\u0431\u0440\u044c'];\nconst QUARTERS=['I \u043a\u0432\u0430\u0440\u0442\u0430\u043b (\u044f\u043d\u0432\u2013\u043c\u0430\u0440\u0442)','II \u043a\u0432\u0430\u0440\u0442\u0430\u043b (\u0430\u043f\u0440\u2013\u0438\u044e\u043d\u044c)','III \u043a\u0432\u0430\u0440\u0442\u0430\u043b (\u0438\u044e\u043b\u2013\u0441\u0435\u043d)','IV \u043a\u0432\u0430\u0440\u0442\u0430\u043b (\u043e\u043a\u0442\u2013\u0434\u0435\u043a)'];\nfunction setPType(t){currentPType=t;document.querySelectorAll('.ptype-btn').forEach(b=>b.classList.remove('active'));document.getElementById('pt-'+t).classList.add('active');buildPeriodSelects();}\nfunction buildPeriodSelects(){\n  const now=new Date();const cy=now.getFullYear();const cm=now.getMonth();const cq=Math.floor(cm/3);\n  const sel=document.getElementById('period-selects');\n  const yearOpts=Array.from({length:6},(_,i)=>cy-i).map(y=>`<option value=\"${y}\">${y}</option>`).join('');\n  if(currentPType==='month'){const mo=MONTHS.map((m,i)=>`<option value=\"${i}\"${i===cm?' selected':''}>${m}</option>`).join('');sel.innerHTML=`<div class=\"field\"><label>\u041c\u0435\u0441\u044f\u0446</label><select id=\"ps-month\">${mo}</select></div><div class=\"field\"><label>\u0413\u043e\u0434</label><select id=\"ps-year\">${yearOpts}</select></div>`;}\n  else if(currentPType==='quarter'){const qo=QUARTERS.map((q,i)=>`<option value=\"${i}\"${i===cq?' selected':''}>${q}</option>`).join('');sel.innerHTML=`<div class=\"field\"><label>\u041a\u0432\u0430\u0440\u0442\u0430\u043b</label><select id=\"ps-quarter\">${qo}</select></div><div class=\"field\"><label>\u0413\u043e\u0434</label><select id=\"ps-year\">${yearOpts}</select></div>`;}\n  else{sel.innerHTML=`<div class=\"field full\"><label>\u0413\u043e\u0434</label><select id=\"ps-year\">${yearOpts}</select></div>`;}\n  sel.querySelectorAll('select').forEach(s=>s.addEventListener('change',updatePeriodPreview));\n  updatePeriodPreview();\n}\nfunction getPeriodRange(){\n  const y=parseInt((document.getElementById('ps-year')||{value:new Date().getFullYear()}).value);\n  if(currentPType==='month'){const m=parseInt(document.getElementById('ps-month').value);return{from:new Date(y,m,1),to:new Date(y,m+1,0,23,59,59),label:MONTHS[m]+' '+y};}\n  else if(currentPType==='quarter'){const q=parseInt(document.getElementById('ps-quarter').value);const sm=q*3;return{from:new Date(y,sm,1),to:new Date(y,sm+3,0,23,59,59),label:QUARTERS[q].split(' (')[0]+' '+y};}\n  else{return{from:new Date(y,0,1),to:new Date(y,11,31,23,59,59),label:'\u0413\u043e\u0434 '+y};}\n}\nfunction updatePeriodPreview(){\n  try{const{from,to,label}=getPeriodRange();const pts=trades.filter(t=>{if(!t.date)return false;const d=new Date(t.date);return d>=from&&d<=to;});const el=document.getElementById('period-preview');if(!pts.length){el.innerHTML=`<div style=\"font-size:13px;color:var(--text2);padding:10px 0\">\u0412 \u043f\u0435\u0440\u0438\u043e\u0434\u0435 \u00ab${label}\u00bb \u0441\u0434\u0435\u043b\u043e\u043a \u043d\u0435\u0442</div>`;return;}const wins=pts.filter(t=>t.pnl>0).length;const tp=pts.reduce((s,t)=>s+t.pnl,0);const wr=Math.round(wins/pts.length*100);el.innerHTML=`<div style=\"background:var(--surf2);border-radius:var(--radius);padding:12px 14px;font-size:13px\"><span style=\"font-weight:700\">${label}</span> &nbsp;\u00b7&nbsp; ${pts.length} \u0441\u0434\u0435\u043b\u043e\u043a &nbsp;\u00b7&nbsp; \u0412\u0420 ${wr}% &nbsp;\u00b7&nbsp; P&L <span style=\"font-family:var(--mono);font-weight:700;color:${tp>=0?'var(--pos)':'var(--neg)'}\">${tp>=0?'+':''}${tp.toFixed(2)}</span></div>`;}catch(e){}\n}\nfunction closePeriod(){\n  const{from,to,label}=getPeriodRange();const pts=trades.filter(t=>{if(!t.date)return false;const d=new Date(t.date);return d>=from&&d<=to;});\n  if(!pts.length){alert('\u0412 \u0432\u044b\u0431\u0440\u0430\u043d\u043d\u043e\u043c \u043f\u0435\u0440\u0438\u043e\u0434\u0435 \u043d\u0435\u0442 \u0441\u0434\u0435\u043b\u043e\u043a.');return;}\n  if(!confirm('\u0417\u0430\u043a\u0440\u044b\u0442\u044c \u043f\u0435\u0440\u0438\u043e\u0434 \u00ab'+label+'\u00bb ('+pts.length+' \u0441\u0434\u0435\u043b\u043e\u043a)?'))return;\n  const wins=pts.filter(t=>t.pnl>0).length;const totalPnl=pts.reduce((s,t)=>s+t.pnl,0);\n  const best=pts.reduce((b,t)=>t.pnl>b.pnl?t:b,pts[0]);const worst=pts.reduce((b,t)=>t.pnl<b.pnl?t:b,pts[0]);\n  archivedPeriods.unshift({id:Date.now(),label,type:currentPType,from:from.toISOString(),to:to.toISOString(),closedAt:new Date().toISOString(),count:pts.length,wins,losses:pts.length-wins,totalPnl,avgPnl:totalPnl/pts.length,winRate:Math.round(wins/pts.length*100),bestTrade:{asset:best.asset,pnl:best.pnl},worstTrade:{asset:worst.asset,pnl:worst.pnl},trades:pts});\n  savePeriods();renderArchivedPeriods();updatePeriodPreview();alert('\u041f\u0435\u0440\u0438\u043e\u0434 \u00ab'+label+'\u00bb \u0441\u043e\u0445\u0440\u0430\u043d\u0451\u043d!');\n}\nfunction renderArchivedPeriods(){\n  const el=document.getElementById('archived-periods');\n  if(!archivedPeriods.length){el.innerHTML='<div class=\"empty-state\">\u041d\u0435\u0442 \u0441\u043e\u0445\u0440\u0430\u043d\u0451\u043d\u043d\u044b\u0445 \u043f\u0435\u0440\u0438\u043e\u0434\u043e\u0432</div>';return;}\n  el.innerHTML=archivedPeriods.map((p,i)=>{\n    const tb=p.type==='month'?'b-blue':p.type==='quarter'?'b-amber':'b-purple';\n    const tl=p.type==='month'?'\u041c\u0435\u0441\u044f\u0446':p.type==='quarter'?'\u041a\u0432\u0430\u0440\u0442\u0430\u043b':'\u0413\u043e\u0434';\n    const pc=p.totalPnl>=0?'var(--pos)':'var(--neg)';\n    return `<div class=\"period-card\" id=\"pc-${p.id}\">\n      <div class=\"period-card-header\" onclick=\"togglePeriodCard(${p.id})\">\n        <div style=\"flex:1;min-width:0\"><div class=\"period-name\">${p.label}</div>\n          <div class=\"period-meta\"><span class=\"badge ${tb}\">${tl}</span> &nbsp;${p.count} \u0441\u0434\u0435\u043b\u043e\u043a &nbsp;\u00b7&nbsp; \u0412\u0420 ${p.winRate}% &nbsp;\u00b7&nbsp; <span class=\"mono\" style=\"color:${pc};font-weight:700\">${p.totalPnl>=0?'+':''}${p.totalPnl.toFixed(2)}</span></div>\n        </div>\n        <button class=\"del-period-btn\" onclick=\"event.stopPropagation();deletePeriod(${p.id})\">\u0423\u0434\u0430\u043b\u0438\u0442\u044c</button>\n        <span class=\"period-chevron\">&#9660;</span>\n      </div>\n      <div class=\"period-card-body\">\n        <div class=\"period-stats\">\n          <div class=\"metric\"><div class=\"metric-label\">\u0421\u0434\u0435\u043b\u043e\u043a</div><div class=\"metric-value\">${p.count}</div></div>\n          <div class=\"metric\"><div class=\"metric-label\">\u0412\u0438\u043d\u0440\u0435\u0439\u0442</div><div class=\"metric-value ${p.winRate>=50?'pos':'neg'}\">${p.winRate}%</div></div>\n          <div class=\"metric\"><div class=\"metric-label\">\u0418\u0442\u043e\u0433\u043e P&L</div><div class=\"metric-value ${p.totalPnl>=0?'pos':'neg'}\">${p.totalPnl>=0?'+':''}${p.totalPnl.toFixed(2)}</div></div>\n          <div class=\"metric\"><div class=\"metric-label\">\u0421\u0440\u0435\u0434\u043d\u0438\u0439 P&L</div><div class=\"metric-value ${p.avgPnl>=0?'pos':'neg'}\">${p.avgPnl>=0?'+':''}${p.avgPnl.toFixed(2)}</div></div>\n        </div>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px\">\n          <div class=\"metric\" style=\"background:var(--green-bg)\"><div class=\"metric-label\" style=\"color:var(--green-tx)\">\u041b\u0443\u0447\u0448\u0430\u044f</div><div class=\"metric-value pos\">${p.bestTrade.asset} +${p.bestTrade.pnl.toFixed(2)}</div></div>\n          <div class=\"metric\" style=\"background:var(--red-bg)\"><div class=\"metric-label\" style=\"color:var(--red-tx)\">\u0425\u0443\u0434\u0448\u0430\u044f</div><div class=\"metric-value neg\">${p.worstTrade.asset} ${p.worstTrade.pnl.toFixed(2)}</div></div>\n        </div>\n        <p class=\"section-label\">\u0421\u0434\u0435\u043b\u043a\u0438 \u043f\u0435\u0440\u0438\u043e\u0434\u0430</p>\n        <div class=\"table-wrap\"><table><thead><tr><th>\u0414\u0430\u0442\u0430</th><th>\u0418\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442</th><th>\u041d\u0430\u043f\u0440.</th><th>P&L</th><th>\u042d\u043c\u043e\u0446\u0438\u044f</th><th>\u041f\u043b\u0430\u043d</th></tr></thead>\n        <tbody>${p.trades.map(t=>`<tr>\n          <td class=\"mono\" style=\"font-size:11px;white-space:nowrap\">${(t.date||'').replace('T',' ')}</td>\n          <td style=\"font-weight:700\">${t.asset}</td>\n          <td><span class=\"badge ${t.dir==='long'?'b-green':'b-red'}\">${t.dir==='long'?'Long':'Short'}</span></td>\n          <td class=\"mono\" style=\"color:${t.pnl>=0?'var(--pos)':'var(--neg)'};font-weight:700\">${t.pnl>=0?'+':''}${t.pnl.toFixed(2)}</td>\n          <td style=\"font-size:12px;color:var(--text2)\">${EL[t.emotion]||'&mdash;'}</td>\n          <td>${t.plan?`<span class=\"badge ${t.plan==='yes'?'b-green':t.plan==='partial'?'b-amber':'b-red'}\">${PL[t.plan]}</span>`:'&mdash;'}</td>\n        </tr>`).join('')}</tbody></table></div>\n        <p style=\"font-size:11px;color:var(--text3);margin-top:10px\">\u0417\u0430\u043a\u0440\u044b\u0442: ${new Date(p.closedAt).toLocaleString('ru-RU')}</p>\n      </div>\n    </div>`;\n  }).join('');\n}\nfunction togglePeriodCard(id){document.getElementById('pc-'+id).classList.toggle('open');}\nfunction deletePeriod(id){if(!confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u043f\u0435\u0440\u0438\u043e\u0434?'))return;archivedPeriods=archivedPeriods.filter(p=>p.id!==id);savePeriods();renderArchivedPeriods();}\n// CARDS\nfunction addCard(){\n  const id=++cardIdx;\n  document.querySelectorAll('.trade-card.open').forEach(c=>c.classList.remove('open'));\n  const div=document.createElement('div');div.className='trade-card open';div.id='card-'+id;\n  div.innerHTML=`<div class=\"card-header\" onclick=\"toggleCard(${id})\">\n    <div style=\"flex:1;min-width:0\"><div class=\"card-title\">\u041d\u043e\u0432\u0430\u044f \u0441\u0434\u0435\u043b\u043a\u0430</div><div class=\"card-sub\" id=\"csub-${id}\">\u0437\u0430\u043f\u043e\u043b\u043d\u0438 \u0444\u043e\u0440\u043c\u0443</div></div>\n    <span class=\"card-chevron\">&#9660;</span>\n  </div>\n  <div class=\"card-body\">\n    <p class=\"section-label\" style=\"margin-top:14px\">\u041f\u0430\u0440\u0430\u043c\u0435\u0442\u0440\u044b</p>\n    <div class=\"form-grid\">\n      <div class=\"field\"><label>\u0414\u0430\u0442\u0430 \u0438 \u0432\u0440\u0435\u043c\u044f</label><input type=\"datetime-local\" id=\"fd-${id}\" value=\"${nowLocal()}\"></div>\n      <div class=\"field\"><label>\u0418\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442</label><input type=\"text\" id=\"fa-${id}\" placeholder=\"BTC/USD\"></div>\n      <div class=\"field\"><label>\u041d\u0430\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435</label><select id=\"fdir-${id}\"><option value=\"long\">Long (\u043f\u043e\u043a\u0443\u043f\u043a\u0430)</option><option value=\"short\">Short (\u043f\u0440\u043e\u0434\u0430\u0436\u0430)</option></select></div>\n      <div class=\"field\"><label>\u0420\u0430\u0437\u043c\u0435\u0440 \u043f\u043e\u0437\u0438\u0446\u0438\u0438</label><input type=\"number\" id=\"fsz-${id}\" placeholder=\"0.1\" step=\"any\"></div>\n      <div class=\"field\"><label>\u0426\u0435\u043d\u0430 \u0432\u0445\u043e\u0434\u0430</label><input type=\"number\" id=\"fen-${id}\" placeholder=\"0.00\" step=\"any\" oninput=\"calcRisk(${id})\"></div>\n      <div class=\"field\"><label>\u0426\u0435\u043d\u0430 \u0432\u044b\u0445\u043e\u0434\u0430</label><input type=\"number\" id=\"fex-${id}\" placeholder=\"0.00\" step=\"any\"></div>\n      <div class=\"field\"><label>\u0421\u0442\u043e\u043f-\u043b\u043e\u0441\u0441 (\u043f\u043b\u0430\u043d)</label><input type=\"number\" id=\"fsl-${id}\" placeholder=\"0.00\" step=\"any\" oninput=\"calcRisk(${id})\"></div>\n      <div class=\"field\"><label>\u0422\u0435\u0439\u043a-\u043f\u0440\u043e\u0444\u0438\u0442 (\u043f\u043b\u0430\u043d)</label><input type=\"number\" id=\"ftp-${id}\" placeholder=\"0.00\" step=\"any\"></div>\n      <div class=\"field\"><label>P&amp;L ($)</label><input type=\"number\" id=\"fpnl-${id}\" placeholder=\"0.00\" step=\"any\"></div>\n    </div>\n    <div class=\"divider\"></div>\n    <p class=\"section-label\">\u041a\u0430\u043b\u044c\u043a\u0443\u043b\u044f\u0442\u043e\u0440 \u0440\u0438\u0441\u043a\u0430</p>\n    <div class=\"form-grid\">\n      <div class=\"field\"><label>\u0414\u0435\u043f\u043e\u0437\u0438\u0442 ($)</label><input type=\"number\" id=\"rc-dep-${id}\" placeholder=\"10000\" step=\"any\" oninput=\"calcRisk(${id})\"></div>\n      <div class=\"field\"><label>\u0420\u0438\u0441\u043a \u043d\u0430 \u0441\u0434\u0435\u043b\u043a\u0443 (%)</label><input type=\"number\" id=\"rc-pct-${id}\" placeholder=\"1\" step=\"0.1\" value=\"1\" oninput=\"calcRisk(${id})\"></div>\n    </div>\n    <div class=\"risk-result\" id=\"risk-result-${id}\"></div>\n    <div class=\"divider\"></div>\n    <p class=\"section-label\">\u041f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u044f</p>\n    <div class=\"field\" style=\"margin-bottom:10px\"><label style=\"margin-bottom:6px\">\u042d\u043c\u043e\u0446\u0438\u044f \u043f\u0435\u0440\u0435\u0434 \u0432\u0445\u043e\u0434\u043e\u043c</label>\n      <div class=\"emotion-grid\">\n        <button class=\"ebtn\" data-e=\"calm\"    onclick=\"pickE(this)\">\u0421\u043f\u043e\u043a\u043e\u0439\u0441\u0442\u0432\u0438\u0435</button>\n        <button class=\"ebtn\" data-e=\"fear\"    onclick=\"pickE(this)\">\u0421\u0442\u0440\u0430\u0445</button>\n        <button class=\"ebtn\" data-e=\"greed\"   onclick=\"pickE(this)\">\u0416\u0430\u0434\u043d\u043e\u0441\u0442\u044c</button>\n        <button class=\"ebtn\" data-e=\"fomo\"    onclick=\"pickE(this)\">FOMO</button>\n        <button class=\"ebtn\" data-e=\"revenge\" onclick=\"pickE(this)\">\u041c\u0435\u0441\u0442\u044c</button>\n      </div>\n    </div>\n    <div class=\"field\" style=\"margin-bottom:10px\"><label style=\"margin-bottom:6px\">\u0421\u043e\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435 \u043f\u043b\u0430\u043d\u0430</label>\n      <div class=\"plan-grid\">\n        <button class=\"pbtn\" data-p=\"yes\"     onclick=\"pickP(this)\">\u041f\u043e\u043b\u043d\u043e\u0441\u0442\u044c\u044e</button>\n        <button class=\"pbtn\" data-p=\"partial\" onclick=\"pickP(this)\">\u0427\u0430\u0441\u0442\u0438\u0447\u043d\u043e</button>\n        <button class=\"pbtn\" data-p=\"no\"      onclick=\"pickP(this)\">\u041d\u0430\u0440\u0443\u0448\u0438\u043b</button>\n      </div>\n    </div>\n    <div class=\"field\" style=\"margin-bottom:10px\"><label>\u041f\u043e\u0447\u0435\u043c\u0443 \u0432\u044b\u0448\u0435\u043b \u0440\u0430\u043d\u044c\u0448\u0435 / \u043d\u0430\u0440\u0443\u0448\u0438\u043b \u043f\u043b\u0430\u043d?</label><textarea id=\"frs-${id}\" placeholder=\"\u0418\u0441\u043f\u0443\u0433\u0430\u043b\u0441\u044f \u043e\u0442\u043a\u0430\u0442\u0430...\"></textarea></div>\n    <div class=\"field\" style=\"margin-bottom:12px\"><label>\u0417\u0430\u043c\u0435\u0442\u043a\u0438 \u0438 \u0432\u044b\u0432\u043e\u0434\u044b</label><textarea id=\"fnt-${id}\" placeholder=\"\u0427\u0442\u043e \u043c\u043e\u0436\u043d\u043e \u0443\u043b\u0443\u0447\u0448\u0438\u0442\u044c?\"></textarea></div>\n    <button class=\"btn-primary\" onclick=\"saveTrade(${id})\">\u0421\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u044c \u0441\u0434\u0435\u043b\u043a\u0443</button>\n  </div>`;\n  const c=document.getElementById('cards');c.insertBefore(div,c.firstChild);\n}\nfunction toggleCard(id){document.getElementById('card-'+id).classList.toggle('open');}\nfunction pickE(btn){btn.closest('.emotion-grid').querySelectorAll('.ebtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}\nfunction pickP(btn){btn.closest('.plan-grid').querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}\nfunction saveTrade(id){\n  const asset=(document.getElementById('fa-'+id).value||'').trim();const pnlVal=parseFloat(document.getElementById('fpnl-'+id).value);\n  if(!asset){alert('\u0423\u043a\u0430\u0436\u0438 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442');return;}if(isNaN(pnlVal)){alert('\u0423\u043a\u0430\u0436\u0438 P&L');return;}\n  const card=document.getElementById('card-'+id);\n  const eBtn=card.querySelector('.ebtn.active'),pBtn=card.querySelector('.pbtn.active');\n  const emotion=eBtn?eBtn.dataset.e:'',plan=pBtn?pBtn.dataset.p:'';\n  const t={id:Date.now(),cardId:id,date:document.getElementById('fd-'+id).value,asset,dir:document.getElementById('fdir-'+id).value,size:document.getElementById('fsz-'+id).value,entry:document.getElementById('fen-'+id).value,exit:document.getElementById('fex-'+id).value,sl:document.getElementById('fsl-'+id).value,tp:document.getElementById('ftp-'+id).value,pnl:pnlVal,emotion,plan,reason:document.getElementById('frs-'+id).value,notes:document.getElementById('fnt-'+id).value};\n  trades.unshift(t);save();renderMetrics();\n  const col=pnlVal>=0?'var(--pos)':'var(--neg)';\n  card.querySelector('.card-title').textContent=asset+' \\u00b7 '+(t.dir==='long'?'Long':'Short');\n  card.querySelector('#csub-'+id).innerHTML=`<span class=\"mono\" style=\"color:${col};font-weight:700\">${pnlVal>=0?'+':''}${pnlVal.toFixed(2)}</span>`+(emotion?` \\u00b7 ${EL[emotion]}`:'')+( plan?` \\u00b7 ${PL[plan]}`:'');\n  const hdr=card.querySelector('.card-header');\n  if(!hdr.querySelector('.del-card-btn')){const btn=document.createElement('button');btn.className='del-card-btn';btn.textContent='\u0423\u0434\u0430\u043b\u0438\u0442\u044c';btn.onclick=e=>{e.stopPropagation();deleteCard(t.id,id);};hdr.insertBefore(btn,hdr.querySelector('.card-chevron'));}\n  card.classList.remove('open');\n}\nfunction deleteCard(tid,cid){if(!confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c?'))return;trades=trades.filter(t=>t.id!==tid);save();renderMetrics();const c=document.getElementById('card-'+cid);if(c)c.remove();}\nfunction deleteFromHistory(tid){if(!confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c?'))return;const t=trades.find(x=>x.id===tid);trades=trades.filter(x=>x.id!==tid);save();renderMetrics();if(t&&t.cardId){const c=document.getElementById('card-'+t.cardId);if(c)c.remove();}renderHistory();}\nfunction renderMetrics(){\n  const total=trades.length,wins=trades.filter(t=>t.pnl>0).length;const totalPnl=trades.reduce((s,t)=>s+t.pnl,0);const wr=total?Math.round(wins/total*100):null,avg=total?totalPnl/total:0;\n  document.getElementById('metrics-bar').innerHTML=`<div class=\"metric\"><div class=\"metric-label\">\u0421\u0434\u0435\u043b\u043e\u043a</div><div class=\"metric-value\">${total}</div></div><div class=\"metric\"><div class=\"metric-label\">\u0412\u0438\u043d\u0440\u0435\u0439\u0442</div><div class=\"metric-value ${wr!==null&&wr>=50?'pos':wr!==null?'neg':''}\">${wr!==null?wr+'%':'&mdash;'}</div></div><div class=\"metric\"><div class=\"metric-label\">\u0418\u0442\u043e\u0433\u043e P&L</div><div class=\"metric-value ${totalPnl>=0?'pos':'neg'}\">${totalPnl>=0?'+':''}${totalPnl.toFixed(2)}</div></div><div class=\"metric\"><div class=\"metric-label\">\u0421\u0440\u0435\u0434\u043d\u0438\u0439 P&L</div><div class=\"metric-value ${avg>=0?'pos':'neg'}\">${avg>=0?'+':''}${avg.toFixed(2)}</div></div>`;\n}\nfunction renderHistory(){\n  const el=document.getElementById('history-content');const ft=getFilteredTrades();\n  document.getElementById('history-count').textContent=ft.length+' \u0438\u0437 '+trades.length+' \u0441\u0434\u0435\u043b\u043e\u043a';\n  if(!trades.length){el.innerHTML='<div class=\"empty-state\">\u0421\u0434\u0435\u043b\u043e\u043a \u043f\u043e\u043a\u0430 \u043d\u0435\u0442</div>';return;}\n  if(!ft.length){el.innerHTML='<div class=\"empty-state\">\u041d\u0435\u0442 \u0441\u0434\u0435\u043b\u043e\u043a \u043f\u043e \u0432\u044b\u0431\u0440\u0430\u043d\u043d\u044b\u043c \u0444\u0438\u043b\u044c\u0442\u0440\u0430\u043c</div>';return;}\n  el.innerHTML=`<div class=\"table-wrap\"><table><thead><tr><th>\u0414\u0430\u0442\u0430</th><th>\u0418\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442</th><th>\u041d\u0430\u043f\u0440.</th><th>P&L</th><th>\u042d\u043c\u043e\u0446\u0438\u044f</th><th>\u041f\u043b\u0430\u043d</th><th>\u0417\u0430\u043c\u0435\u0442\u043a\u0438</th><th></th></tr></thead><tbody>${ft.map(t=>`<tr>\n    <td class=\"mono\" style=\"font-size:11px;white-space:nowrap\">${(t.date||'').replace('T',' ')}</td>\n    <td style=\"font-weight:700\">${t.asset}</td>\n    <td><span class=\"badge ${t.dir==='long'?'b-green':'b-red'}\">${t.dir==='long'?'Long':'Short'}</span></td>\n    <td class=\"mono\" style=\"color:${t.pnl>=0?'var(--pos)':'var(--neg)'};font-weight:700\">${t.pnl>=0?'+':''}${t.pnl.toFixed(2)}</td>\n    <td style=\"font-size:12px;color:var(--text2)\">${EL[t.emotion]||'&mdash;'}</td>\n    <td>${t.plan?`<span class=\"badge ${t.plan==='yes'?'b-green':t.plan==='partial'?'b-amber':'b-red'}\">${PL[t.plan]}</span>`:'&mdash;'}</td>\n    <td style=\"font-size:12px;color:var(--text2);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">${t.notes||t.reason||'&mdash;'}</td>\n    <td><button class=\"del-row-btn\" onclick=\"deleteFromHistory(${t.id})\">&#215;</button></td>\n  </tr>`).join('')}</tbody></table></div>`;\n}\nfunction renderStats(){\n  const el=document.getElementById('stats-content');if(trades.length<2){el.innerHTML='<div class=\"empty-state\">\u041d\u0443\u0436\u043d\u043e \u0445\u043e\u0442\u044f \u0431\u044b 2 \u0441\u0434\u0435\u043b\u043a\u0438</div>';return;}\n  const bE={},bP={};trades.forEach(t=>{if(t.emotion){if(!bE[t.emotion])bE[t.emotion]={total:0,wins:0,pnl:0};bE[t.emotion].total++;if(t.pnl>0)bE[t.emotion].wins++;bE[t.emotion].pnl+=t.pnl;}if(t.plan){if(!bP[t.plan])bP[t.plan]={total:0,wins:0,pnl:0};bP[t.plan].total++;if(t.pnl>0)bP[t.plan].wins++;bP[t.plan].pnl+=t.pnl;}});\n  const sorted=[...trades].sort((a,b)=>new Date(a.date)-new Date(b.date));let cum=0;\n  const labels=sorted.map(t=>(t.date||'').slice(5,10));const data=sorted.map(t=>{cum+=t.pnl;return parseFloat(cum.toFixed(2));});\n  el.innerHTML=`<p class=\"section-label\">\u041a\u0440\u0438\u0432\u0430\u044f P&L</p><div class=\"chart-wrap\"><canvas id=\"pnl-chart\" role=\"img\" aria-label=\"P&L\">P&L.</canvas></div><div class=\"divider\"></div><p class=\"section-label\">\u042d\u043c\u043e\u0446\u0438\u044f &rarr; \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442</p><div class=\"insight-box\">${Object.entries(bE).map(([k,v])=>`<div class=\"insight-row\"><span>${EL[k]}</span><span class=\"mono\" style=\"font-size:12px\">${v.total} \u0441\u0434 &middot; \u0412\u0420 ${Math.round(v.wins/v.total*100)}% &middot; <span style=\"color:${v.pnl>=0?'var(--pos)':'var(--neg)'};font-weight:700\">${v.pnl>=0?'+':''}${v.pnl.toFixed(2)}</span></span></div>`).join('')}</div><div class=\"divider\"></div><p class=\"section-label\">\u0421\u043e\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u0435 \u043f\u043b\u0430\u043d\u0430 &rarr; \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442</p><div class=\"insight-box\">${Object.entries(bP).map(([k,v])=>`<div class=\"insight-row\"><span>${PL   tools[1] = "<!DOCTYPE html>\n<html lang=\"ru\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>\u0422\u043e\u0440\u0433\u043e\u0432\u0430\u044f \u0441\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u044f</title>\n<style>\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    font-family: -apple-system, 'Segoe UI', sans-serif;\n    background: #f5f4f0;\n    color: #1a1a1a;\n    min-height: 100vh;\n    padding: 40px 24px;\n  }\n\n  .page { max-width: 900px; margin: 0 auto; }\n\n  /* Header */\n  .doc-header { margin-bottom: 32px; }\n  .doc-eyebrow {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.12em;\n    text-transform: uppercase; color: #888; margin-bottom: 8px;\n  }\n  .doc-title { font-size: 30px; font-weight: 600; color: #111; line-height: 1.15; }\n  .doc-date { font-size: 13px; color: #999; margin-top: 6px; }\n  .doc-divider { height: 1px; background: #e0ddd6; margin-top: 22px; }\n\n  /* Tabs */\n  .tabs-wrap { margin: 28px 0 28px; }\n  .tabs-label {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;\n    text-transform: uppercase; color: #999; margin-bottom: 12px;\n  }\n  .tabs {\n    display: inline-flex;\n    background: #fff;\n    border: 1px solid #e0ddd6;\n    border-radius: 14px;\n    overflow: hidden;\n    box-shadow: 0 1px 4px rgba(0,0,0,0.06);\n  }\n  .tab-btn {\n    padding: 11px 26px;\n    font-size: 14px; font-weight: 500;\n    border: none; cursor: pointer;\n    font-family: inherit;\n    background: transparent;\n    color: #888;\n    border-right: 1px solid #e0ddd6;\n    transition: background 0.18s, color 0.18s;\n    position: relative;\n    outline: none;\n    display: flex; align-items: center; gap: 8px;\n  }\n  .tab-btn:last-child { border-right: none; }\n  .tab-btn:hover:not([class*=\"active\"]) { background: #f5f4f0; color: #444; }\n\n  .tab-btn.active-bull  { background: #fdf5e6; color: #412402; }\n  .tab-btn.active-bear  { background: #e8f2fc; color: #082a50; }\n  .tab-btn.active-range { background: #edf6e0; color: #1a3d06; }\n\n  .tab-btn::after {\n    content: ''; position: absolute;\n    bottom: 0; left: 0; right: 0; height: 3px;\n    border-radius: 3px 3px 0 0;\n    opacity: 0; transition: opacity 0.18s;\n  }\n  .tab-btn.active-bull::after  { background: #ef9f27; opacity: 1; }\n  .tab-btn.active-bear::after  { background: #378add; opacity: 1; }\n  .tab-btn.active-range::after { background: #639922; opacity: 1; }\n\n  .tab-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }\n\n  /* Content fade */\n  .market-section { animation: fadeIn 0.22s ease; }\n  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }\n\n  /* Hero */\n  .market-hero {\n    display: flex; align-items: center; gap: 18px;\n    padding: 22px 26px; border-radius: 16px;\n    margin-bottom: 18px; border: 1px solid transparent;\n  }\n  .market-hero.bull  { background: #fdf5e6; border-color: #f5d99a; }\n  .market-hero.bear  { background: #e8f2fc; border-color: #aacff0; }\n  .market-hero.range { background: #edf6e0; border-color: #b5d98a; }\n\n  .hero-icon {\n    width: 54px; height: 54px; border-radius: 14px;\n    display: flex; align-items: center; justify-content: center; flex-shrink: 0;\n  }\n  .bull  .hero-icon { background: #fac775; }\n  .bear  .hero-icon { background: #82bef0; }\n  .range .hero-icon { background: #96d15a; }\n  .hero-icon svg { display: block; }\n\n  .hero-info { flex: 1; }\n  .hero-title { font-size: 22px; font-weight: 600; line-height: 1.2; }\n  .bull  .hero-title { color: #3d2500; }\n  .bear  .hero-title { color: #082a50; }\n  .range .hero-title { color: #1a3d06; }\n\n  .hero-sub { font-size: 13px; margin-top: 3px; }\n  .bull  .hero-sub { color: #7a5020; }\n  .bear  .hero-sub { color: #1a4d7a; }\n  .range .hero-sub { color: #2e6010; }\n\n  .hero-tag {\n    display: inline-block; font-size: 11px; font-weight: 600;\n    padding: 3px 10px; border-radius: 999px; margin-top: 9px;\n    letter-spacing: 0.04em; color: #fff;\n  }\n  .bull  .hero-tag { background: #ef9f27; }\n  .bear  .hero-tag { background: #378add; }\n  .range .hero-tag { background: #639922; }\n\n  /* Ratio bar */\n  .ratio-wrap { margin-bottom: 18px; }\n  .ratio-label {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;\n    text-transform: uppercase; color: #999; margin-bottom: 8px;\n  }\n  .ratio-track {\n    height: 10px; border-radius: 999px;\n    background: #e8e6e0; overflow: hidden; display: flex;\n  }\n  .ratio-long  { height: 100%; border-radius: 999px 0 0 999px; }\n  .ratio-short { height: 100%; border-radius: 0 999px 999px 0; }\n  .ratio-legend { display: flex; gap: 20px; margin-top: 8px; }\n  .ratio-leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; }\n  .ratio-dot { width: 8px; height: 8px; border-radius: 50%; }\n\n  /* Range zones */\n  .range-zones {\n    display: grid; grid-template-columns: 1fr 0.7fr 1fr;\n    gap: 8px; margin-bottom: 18px;\n  }\n  .rz { border-radius: 12px; padding: 13px 14px; text-align: center; border: 1px solid transparent; }\n  .rz-long  { background: #fdf5e6; border-color: #f5d99a; }\n  .rz-mid   { background: #f0ede8; border-color: #e0ddd6; }\n  .rz-short { background: #e8f2fc; border-color: #aacff0; }\n  .rz-head  { font-size: 14px; font-weight: 600; margin-bottom: 4px; }\n  .rz-long  .rz-head { color: #3d2500; }\n  .rz-mid   .rz-head { color: #999; }\n  .rz-short .rz-head { color: #082a50; }\n  .rz-body  { font-size: 11px; line-height: 1.5; }\n  .rz-long  .rz-body { color: #7a5020; }\n  .rz-mid   .rz-body { color: #aaa; }\n  .rz-short .rz-body { color: #1a4d7a; }\n\n  /* Cards */\n  .cards {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));\n    gap: 10px; margin-bottom: 12px;\n  }\n  .card {\n    background: #fff; border-radius: 14px;\n    border: 1px solid #e8e6e0; border-top-width
