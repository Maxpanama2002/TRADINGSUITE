;color:var(--text2);}\n.edit-hint{font-size:11px;color:var(--text3);margin-top:3px;}\n.edit-actions{display:flex;gap:8px;margin-top:16px;}\n.edit-actions .btn-secondary,.edit-actions .btn-primary{flex:1;}\n.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a18;color:#f0efe9;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s,transform .25s;z-index:99999;pointer-events:none;white-space:nowrap;}\n.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}\n.status-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:var(--surf2);border-radius:var(--radius);font-size:12px;color:var(--text2);}\n.refresh-btn{background:var(--text);color:var(--surface);border:none;border-radius:var(--radius);padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;}\n.refresh-btn:disabled{opacity:.45;cursor:not-allowed;}\n.err{color:var(--red-tx);font-size:12px;width:100%;}\n.add-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:14px;overflow:visible;}\n.add-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;border-radius:var(--radius-lg);}\n.add-hdr:hover{background:var(--surf2);}\n.add-body{display:none;padding:0 16px 16px;border-top:0.5px solid var(--border);}\n.add-card.open .add-body{display:block;}\n.add-card.open .af-chev{transform:rotate(180deg);}\n.af-chev{font-size:10px;color:var(--text3);transition:transform .2s;}\n.sym-wrap{position:relative;}\n.sug-box{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:0.5px solid var(--border2);border-top:none;border-radius:0 0 var(--radius) var(--radius);z-index:200;max-height:180px;overflow-y:auto;box-shadow:0 8px 20px rgba(0,0,0,.12);}\n.sug-item{padding:9px 12px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;}\n.sug-item:hover{background:var(--surf2);}\n.sug-sym{font-weight:700;font-family:var(--mono);}\n.sug-name{font-size:11px;color:var(--text2);}\n.api-note{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5;}\n</style>\n</head>\n<body>\n<div class=\"page-wide\">\n  <h1>\u041f\u043e\u0440\u0442\u0444\u0435\u043b\u044c</h1>\n  <p class=\"subtitle\">\u041a\u0440\u0438\u043f\u0442\u043e-\u0430\u043a\u0442\u0438\u0432\u044b \u0441 \u0430\u0432\u0442\u043e\u043e\u0431\u043d\u043e\u0432\u043b\u0435\u043d\u0438\u0435\u043c \u0446\u0435\u043d \u0447\u0435\u0440\u0435\u0437 CoinGecko</p>\n\n  <div class=\"metric-grid mg-4\" id=\"pf-metrics\">\n    <div class=\"metric\"><div class=\"metric-label\">\u0422\u0435\u043a\u0443\u0449\u0430\u044f \u0441\u0442\u043e\u0438\u043c\u043e\u0441\u0442\u044c</div><div class=\"metric-value\" id=\"m-val\">\u2014</div></div>\n    <div class=\"metric\"><div class=\"metric-label\">\u0412\u043b\u043e\u0436\u0435\u043d\u043e</div><div class=\"metric-value\" id=\"m-inv\">\u2014</div></div>\n    <div class=\"metric\"><div class=\"metric-label\">P&L</div><div class=\"metric-value\" id=\"m-pnl\">\u2014</div></div>\n    <div class=\"metric\"><div class=\"metric-label\">P&L %</div><div class=\"metric-value\" id=\"m-pct\">\u2014</div></div>\n  </div>\n\n  <div class=\"status-bar\">\n    <button class=\"refresh-btn\" id=\"rbtn\" onclick=\"fetchPrices()\">&#8635; \u041e\u0431\u043d\u043e\u0432\u0438\u0442\u044c \u0446\u0435\u043d\u044b</button>\n    <span id=\"upd-time\">\u0426\u0435\u043d\u044b \u043d\u0435 \u0437\u0430\u0433\u0440\u0443\u0436\u0435\u043d\u044b</span>\n    <label style=\"display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px\">\n      <input type=\"checkbox\" id=\"auto-cb\" onchange=\"toggleAuto()\" style=\"width:auto;padding:0;border:none;background:none;cursor:pointer\">\n      \u0410\u0432\u0442\u043e (60\u0441)\n    </label>\n    <span class=\"err\" id=\"ferr\" style=\"display:none\"></span>\n  </div>\n\n  <div class=\"add-card open\" id=\"add-card\">\n    <div class=\"add-hdr\" onclick=\"document.getElementById('add-card').classList.toggle('open')\">\n      <span style=\"font-weight:700;font-size:14px\">+ \u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u043f\u043e\u0437\u0438\u0446\u0438\u044e</span>\n      <span class=\"af-chev\">&#9660;</span>\n    </div>\n    <div class=\"add-body\">\n      <div class=\"form-grid\" style=\"margin-top:14px\">\n        <div class=\"field\">\n          <label>\u0421\u0438\u043c\u0432\u043e\u043b \u043c\u043e\u043d\u0435\u0442\u044b</label>\n          <div class=\"sym-wrap\">\n            <input type=\"text\" id=\"inp-sym\" placeholder=\"BTC, ETH, SOL\u2026\" oninput=\"onInput()\" autocomplete=\"off\" spellcheck=\"false\">\n            <div class=\"sug-box\" id=\"sug-box\" style=\"display:none\"></div>\n          </div>\n        </div>\n        <div class=\"field\">\n          <label>CoinGecko ID <span style=\"font-size:10px;color:var(--text3)\">(\u0430\u0432\u0442\u043e \u0438\u043b\u0438 \u0432\u0440\u0443\u0447\u043d\u0443\u044e)</span></label>\n          <input type=\"text\" id=\"inp-id\" placeholder=\"bitcoin, ethereum\u2026\">\n        </div>\n        <div class=\"field\">\n          <label>\u041a\u043e\u043b\u0438\u0447\u0435\u0441\u0442\u0432\u043e</label>\n          <input type=\"number\" id=\"inp-qty\" placeholder=\"0.5\" step=\"any\" min=\"0\" inputmode=\"decimal\">\n        </div>\n        <div class=\"field\">\n          <label>\u0421\u0440\u0435\u0434\u043d\u044f\u044f \u0446\u0435\u043d\u0430 \u043f\u043e\u043a\u0443\u043f\u043a\u0438 ($)</label>\n          <input type=\"number\" id=\"inp-buy\" placeholder=\"0.00\" step=\"any\" min=\"0\" inputmode=\"decimal\">\n        </div>\n      </div>\n      <p class=\"api-note\">\u0415\u0441\u043b\u0438 \u043c\u043e\u043d\u0435\u0442\u044b \u043d\u0435\u0442 \u0432 \u0441\u043f\u0438\u0441\u043a\u0435 \u2014 \u0432\u0432\u0435\u0434\u0438 \u0441\u0438\u043c\u0432\u043e\u043b \u0432\u0440\u0443\u0447\u043d\u0443\u044e \u0438 \u0443\u043a\u0430\u0436\u0438 CoinGecko ID \u0441\u043e \u0441\u0442\u0440\u0430\u043d\u0438\u0446\u044b coingecko.com (\u0432 URL \u043f\u043e\u0441\u043b\u0435 /coins/). \u041d\u0430\u043f\u0440\u0438\u043c\u0435\u0440: \u0434\u043b\u044f Sui \u2192 sui, \u0434\u043b\u044f Celestia \u2192 celestia.</p>\n      <button class=\"btn-primary\" style=\"margin-top:12px\" onclick=\"addPos()\">\u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0432 \u043f\u043e\u0440\u0442\u0444\u0435\u043b\u044c</button>\n    </div>\n  </div>\n\n  <div id=\"pf-out\"></div>\n</div>\n\n<script>\nvar portfolio = [];\nvar cache = {};\nvar autoT = null;\n\nvar COINS = {\"BTC\": {\"id\": \"bitcoin\", \"name\": \"Bitcoin\"}, \"ETH\": {\"id\": \"ethereum\", \"name\": \"Ethereum\"}, \"USDT\": {\"id\": \"tether\", \"name\": \"Tether\"}, \"BNB\": {\"id\": \"binancecoin\", \"name\": \"BNB\"}, \"SOL\": {\"id\": \"solana\", \"name\": \"Solana\"}, \"USDC\": {\"id\": \"usd-coin\", \"name\": \"USD Coin\"}, \"XRP\": {\"id\": \"ripple\", \"name\": \"XRP\"}, \"DOGE\": {\"id\": \"dogecoin\", \"name\": \"Dogecoin\"}, \"ADA\": {\"id\": \"cardano\", \"name\": \"Cardano\"}, \"AVAX\": {\"id\": \"avalanche-2\", \"name\": \"Avalanche\"}, \"SHIB\": {\"id\": \"shiba-inu\", \"name\": \"Shiba Inu\"}, \"TON\": {\"id\": \"the-open-network\", \"name\": \"TON\"}, \"DOT\": {\"id\": \"polkadot\", \"name\": \"Polkadot\"}, \"TRX\": {\"id\": \"tron\", \"name\": \"TRON\"}, \"LINK\": {\"id\": \"chainlink\", \"name\": \"Chainlink\"}, \"MATIC\": {\"id\": \"matic-network\", \"name\": \"Polygon\"}, \"LTC\": {\"id\": \"litecoin\", \"name\": \"Litecoin\"}, \"BCH\": {\"id\": \"bitcoin-cash\", \"name\": \"Bitcoin Cash\"}, \"NEAR\": {\"id\": \"near\", \"name\": \"NEAR Protocol\"}, \"UNI\": {\"id\": \"uniswap\", \"name\": \"Uniswap\"}, \"ICP\": {\"id\": \"internet-computer\", \"name\": \"Internet Computer\"}, \"APT\": {\"id\": \"aptos\", \"name\": \"Aptos\"}, \"FIL\": {\"id\": \"filecoin\", \"name\": \"Filecoin\"}, \"SUI\": {\"id\": \"sui\", \"name\": \"Sui\"}, \"ARB\": {\"id\": \"arbitrum\", \"name\": \"Arbitrum\"}, \"OP\": {\"id\": \"optimism\", \"name\": \"Optimism\"}, \"ATOM\": {\"id\": \"cosmos\", \"name\": \"Cosmos\"}, \"INJ\": {\"id\": \"injective-protocol\", \"name\": \"Injective\"}, \"IMX\": {\"id\": \"immutable-x\", \"name\": \"Immutable X\"}, \"VET\": {\"id\": \"vechain\", \"name\": \"VeChain\"}, \"AAVE\": {\"id\": \"aave\", \"name\": \"Aave\"}, \"GRT\": {\"id\": \"the-graph\", \"name\": \"The Graph\"}, \"STX\": {\"id\": \"blockstack\", \"name\": \"Stacks\"}, \"HBAR\": {\"id\": \"hedera-hashgraph\", \"name\": \"Hedera\"}, \"MKR\": {\"id\": \"maker\", \"name\": \"Maker\"}, \"ALGO\": {\"id\": \"algorand\", \"name\": \"Algorand\"}, \"SAND\": {\"id\": \"the-sandbox\", \"name\": \"The Sandbox\"}, \"MANA\": {\"id\": \"decentraland\", \"name\": \"Decentraland\"}, \"EOS\": {\"id\": \"eos\", \"name\": \"EOS\"}, \"XLM\": {\"id\": \"stellar\", \"name\": \"Stellar\"}, \"FLOW\": {\"id\": \"flow\", \"name\": \"Flow\"}, \"AXS\": {\"id\": \"axie-infinity\", \"name\": \"Axie Infinity\"}, \"CRV\": {\"id\": \"curve-dao-token\", \"name\": \"Curve DAO\"}, \"XMR\": {\"id\": \"monero\", \"name\": \"Monero\"}, \"FTM\": {\"id\": \"fantom\", \"name\": \"Fantom\"}, \"THETA\": {\"id\": \"theta-token\", \"name\": \"Theta\"}, \"KAVA\": {\"id\": \"kava\", \"name\": \"Kava\"}, \"SNX\": {\"id\": \"havven\", \"name\": \"Synthetix\"}, \"ZEC\": {\"id\": \"zcash\", \"name\": \"Zcash\"}, \"COMP\": {\"id\": \"compound-governance-token\", \"name\": \"Compound\"}, \"YFI\": {\"id\": \"yearn-finance\", \"name\": \"Yearn Finance\"}, \"BAT\": {\"id\": \"basic-attention-token\", \"name\": \"Basic Attention\"}, \"ZRX\": {\"id\": \"0x\", \"name\": \"0x Protocol\"}, \"ENJ\": {\"id\": \"enjincoin\", \"name\": \"Enjin\"}, \"CHZ\": {\"id\": \"chiliz\", \"name\": \"Chiliz\"}, \"CELR\": {\"id\": \"celer-network\", \"name\": \"Celer\"}, \"ROSE\": {\"id\": \"oasis-network\", \"name\": \"Oasis\"}, \"EGLD\": {\"id\": \"elrond-erd-2\", \"name\": \"MultiversX\"}, \"ONE\": {\"id\": \"harmony\", \"name\": \"Harmony\"}, \"LUNA\": {\"id\": \"terra-luna-2\", \"name\": \"Terra 2.0\"}, \"RUNE\": {\"id\": \"thorchain\", \"name\": \"THORChain\"}, \"CAKE\": {\"id\": \"pancakeswap-token\", \"name\": \"PancakeSwap\"}, \"ZIL\": {\"id\": \"zilliqa\", \"name\": \"Zilliqa\"}, \"IOTA\": {\"id\": \"iota\", \"name\": \"IOTA\"}, \"NEO\": {\"id\": \"neo\", \"name\": \"NEO\"}, \"KSM\": {\"id\": \"kusama\", \"name\": \"Kusama\"}, \"DASH\": {\"id\": \"dash\", \"name\": \"Dash\"}, \"WAVES\": {\"id\": \"waves\", \"name\": \"Waves\"}, \"CELO\": {\"id\": \"celo\", \"name\": \"Celo\"}, \"ENS\": {\"id\": \"ethereum-name-service\", \"name\": \"ENS\"}, \"LDO\": {\"id\": \"lido-dao\", \"name\": \"Lido DAO\"}, \"RPL\": {\"id\": \"rocket-pool\", \"name\": \"Rocket Pool\"}, \"SUSHI\": {\"id\": \"sushi\", \"name\": \"SushiSwap\"}, \"1INCH\": {\"id\": \"1inch\", \"name\": \"1inch\"}, \"CVX\": {\"id\": \"convex-finance\", \"name\": \"Convex Finance\"}, \"FXS\": {\"id\": \"frax-share\", \"name\": \"Frax Share\"}, \"DYDX\": {\"id\": \"dydx\", \"name\": \"dYdX\"}, \"GMX\": {\"id\": \"gmx\", \"name\": \"GMX\"}, \"PERP\": {\"id\": \"perpetual-protocol\", \"name\": \"Perpetual Protocol\"}, \"BLUR\": {\"id\": \"blur\", \"name\": \"Blur\"}, \"MAGIC\": {\"id\": \"magic\", \"name\": \"Magic\"}, \"SSV\": {\"id\": \"ssv-network\", \"name\": \"SSV Network\"}, \"PENDLE\": {\"id\": \"pendle\", \"name\": \"Pendle\"}, \"RDNT\": {\"id\": \"radiant-capital\", \"name\": \"Radiant Capital\"}, \"JOE\": {\"id\": \"joe\", \"name\": \"Trader Joe\"}, \"VELO\": {\"id\": \"velodrome-finance\", \"name\": \"Velodrome\"}, \"AERO\": {\"id\": \"aerodrome-finance\", \"name\": \"Aerodrome\"}, \"PYTH\": {\"id\": \"pyth-network\", \"name\": \"Pyth Network\"}, \"JUP\": {\"id\": \"jupiter-exchange-solana\", \"name\": \"Jupiter\"}, \"BONK\": {\"id\": \"bonk\", \"name\": \"Bonk\"}, \"WIF\": {\"id\": \"dogwifcoin\", \"name\": \"dogwifhat\"}, \"BOME\": {\"id\": \"book-of-meme\", \"name\": \"Book of MEME\"}, \"POPCAT\": {\"id\": \"popcat\", \"name\": \"Popcat\"}, \"MEW\": {\"id\": \"cat-in-a-dogs-world\", \"name\": \"MEW\"}, \"RENDER\": {\"id\": \"render-token\", \"name\": \"Render\"}, \"WLD\": {\"id\": \"worldcoin-wld\", \"name\": \"Worldcoin\"}, \"SEI\": {\"id\": \"sei-network\", \"name\": \"Sei\"}, \"TIA\": {\"id\": \"celestia\", \"name\": \"Celestia\"}, \"STRK\": {\"id\": \"starknet\", \"name\": \"Starknet\"}, \"ALT\": {\"id\": \"altlayer\", \"name\": \"AltLayer\"}, \"DYM\": {\"id\": \"dymension\", \"name\": \"Dymension\"}, \"MANTA\": {\"id\": \"manta-network\", \"name\": \"Manta\"}, \"JTO\": {\"id\": \"jito-governance-token\", \"name\": \"Jito\"}, \"ETHFI\": {\"id\": \"ether-fi\", \"name\": \"Ether.fi\"}, \"ENA\": {\"id\": \"ethena\", \"name\": \"Ethena\"}, \"W\": {\"id\": \"wormhole\", \"name\": \"Wormhole\"}, \"ZK\": {\"id\": \"zksync\", \"name\": \"zkSync\"}, \"TAIKO\": {\"id\": \"taiko\", \"name\": \"Taiko\"}, \"IO\": {\"id\": \"io-net\", \"name\": \"io.net\"}, \"ZRO\": {\"id\": \"layerzero\", \"name\": \"LayerZero\"}, \"LISTA\": {\"id\": \"lista\", \"name\": \"Lista DAO\"}, \"SCR\": {\"id\": \"scroll\", \"name\": \"Scroll\"}, \"EIGEN\": {\"id\": \"eigenlayer\", \"name\": \"EigenLayer\"}, \"MOODENG\": {\"id\": \"moo-deng\", \"name\": \"Moo Deng\"}, \"GOAT\": {\"id\": \"goat\", \"name\": \"GOAT\"}, \"ACT\": {\"id\": \"act-i-the-ai-prophecy\", \"name\": \"Act I\"}, \"PNUT\": {\"id\": \"peanut-the-squirrel\", \"name\": \"Peanut\"}, \"NEIRO\": {\"id\": \"first-neiro-on-ethereum\", \"name\": \"Neiro\"}, \"PEPE\": {\"id\": \"pepe\", \"name\": \"Pepe\"}, \"FLOKI\": {\"id\": \"floki\", \"name\": \"Floki\"}, \"BRETT\": {\"id\": \"brett\", \"name\": \"Brett\"}, \"MOG\": {\"id\": \"mog-coin\", \"name\": \"Mog Coin\"}, \"TURBO\": {\"id\": \"turbo\", \"name\": \"Turbo\"}, \"PEOPLE\": {\"id\": \"constitutiondao\", \"name\": \"ConstitutionDAO\"}, \"NOT\": {\"id\": \"notcoin\", \"name\": \"Notcoin\"}, \"DOGS\": {\"id\": \"dogs-2\", \"name\": \"DOGS\"}, \"HMSTR\": {\"id\": \"hamster-kombat\", \"name\": \"Hamster Kombat\"}, \"CATI\": {\"id\": \"catizen\", \"name\": \"Catizen\"}, \"KAS\": {\"id\": \"kaspa\", \"name\": \"Kaspa\"}, \"ONDO\": {\"id\": \"ondo-finance\", \"name\": \"Ondo\"}, \"MOVE\": {\"id\": \"movement\", \"name\": \"Movement\"}, \"HYPE\": {\"id\": \"hyperliquid\", \"name\": \"Hyperliquid\"}, \"VIRTUAL\": {\"id\": \"virtual-protocol\", \"name\": \"Virtuals Protocol\"}, \"AI16Z\": {\"id\": \"ai16z\", \"name\": \"ai16z\"}, \"GRIFFAIN\": {\"id\": \"griffain\", \"name\": \"Griffain\"}, \"FARTCOIN\": {\"id\": \"fartcoin\", \"name\": \"Fartcoin\"}, \"TRUMP\": {\"id\": \"official-trump\", \"name\": \"TRUMP\"}, \"MELANIA\": {\"id\": \"melania-meme\", \"name\": \"MELANIA\"}, \"S\": {\"id\": \"sonic-3\", \"name\": \"Sonic\"}, \"LAYER\": {\"id\": \"solayer\", \"name\": \"Solayer\"}, \"BIO\": {\"id\": \"bio-protocol\", \"name\": \"Bio Protocol\"}, \"IP\": {\"id\": \"story-2\", \"name\": \"Story\"}, \"BERA\": {\"id\": \"berachain-bera\", \"name\": \"Berachain\"}, \"SIGN\": {\"id\": \"sign\", \"name\": \"Sign\"}, \"TST\": {\"id\": \"the-smurfs-society\", \"name\": \"TST\"}};\n\nfunction load() {\n  try {\n    // 1. Try parent localStorage (parent reads/writes its own storage directly)\n    var pf = null;\n    try { if (window.parent && window.parent !== window) pf = window.parent.localStorage.getItem('portfolio_v1'); } catch(e) {}\n    // 2. Fallback to own localStorage\n    if (!pf) { try { pf = localStorage.getItem('portfolio_v1'); } catch(e) {} }\n    if (pf) portfolio = JSON.parse(pf);\n  } catch(e) {}\n}\nfunction save() {\n  var raw = JSON.stringify(portfolio);\n  // Save everywhere possible so parent can read it back\n  try { localStorage.setItem('portfolio_v1', raw); } catch(e) {}\n  try { if (window.parent && window.parent !== window) window.parent.localStorage.setItem('portfolio_v1', raw); } catch(e) {}\n}\n\nfunction f2(n) { return n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }\nfunction fPrice(p) {\n  if (p >= 1000) return '$' + p.toLocaleString('en-US', {maximumFractionDigits:0});\n  if (p >= 1)    return '$' + f2(p);\n  if (p >= 0.01) return '$' + p.toLocaleString('en-US', {minimumFractionDigits:4, maximumFractionDigits:4});\n  return '$' + p.toLocaleString('en-US', {minimumFractionDigits:6, maximumFractionDigits:6});\n}\n\nfunction onInput() {\n  var v = (document.getElementById('inp-sym').value || '').toUpperCase().replace(/\\s/g,'');\n  var box = document.getElementById('sug-box');\n  if (!v) { box.style.display = 'none'; return; }\n  var keys = Object.keys(COINS);\n  var hits = [];\n  for (var i = 0; i < keys.length; i++) {\n    var sym = keys[i];\n    var c = COINS[sym];\n    if (sym.indexOf(v) === 0 || c.name.toUpperCase().indexOf(v) !== -1) {\n      hits.push({sym:sym, id:c.id, name:c.name});\n      if (hits.length >= 10) break;\n    }\n  }\n  if (!hits.length) { box.style.display = 'none'; return; }\n  var html = '';\n  for (var j = 0; j < hits.length; j++) {\n    var h = hits[j];\n    html += '<div class=\"sug-item\" onclick=\"pick(\\'' + h.sym + '\\',\\'' + h.id + '\\')\">'\n          + '<span class=\"sug-sym\">' + h.sym + '</span>'\n          + '<span class=\"sug-name\">' + h.name + '</span>'\n          + '</div>';\n  }\n  box.innerHTML = html;\n  box.style.display = 'block';\n}\n\nfunction pick(sym, id) {\n  document.getElementById('inp-sym').value = sym;\n  document.getElementById('inp-id').value  = id;\n  document.getElementById('sug-box').style.display = 'none';\n}\n\ndocument.addEventListener('click', function(e) {\n  if (!e.target.closest('.sym-wrap')) {\n    document.getElementById('sug-box').style.display = 'none';\n  }\n});\n\nfunction addPos() {\n  var sym = (document.getElementById('inp-sym').value || '').trim().toUpperCase();\n  var id  = (document.getElementById('inp-id').value  || '').trim().toLowerCase();\n  var qty = parseFloat(document.getElementById('inp-qty').value);\n  var buy = parseFloat(document.getElementById('inp-buy').value);\n  if (!sym)         { alert('\u0423\u043a\u0430\u0436\u0438 \u0441\u0438\u043c\u0432\u043e\u043b \u043c\u043e\u043d\u0435\u0442\u044b'); return; }\n  if (!id)          { alert('\u0423\u043a\u0430\u0436\u0438 CoinGecko ID'); return; }\n  if (!qty || qty <= 0) { alert('\u0423\u043a\u0430\u0436\u0438 \u043a\u043e\u043b\u0438\u0447\u0435\u0441\u0442\u0432\u043e'); return; }\n  if (!buy || buy <= 0) { alert('\u0423\u043a\u0430\u0436\u0438 \u0446\u0435\u043d\u0443 \u043f\u043e\u043a\u0443\u043f\u043a\u0438'); return; }\n\n  var exist = null;\n  for (var i = 0; i < portfolio.length; i++) {\n    if (portfolio[i].gecko === id) { exist = portfolio[i]; break; }\n  }\n  if (exist) {\n    var newQty  = exist.qty + qty;\n    var newAvg  = (exist.qty * exist.buy + qty * buy) / newQty;\n    exist.qty = newQty;\n    exist.buy = newAvg;\n    showToast(sym + ' \u2014 \u043f\u043e\u0437\u0438\u0446\u0438\u044f \u0443\u0432\u0435\u043b\u0438\u0447\u0435\u043d\u0430. \u0421\u0440. \u0446\u0435\u043d\u0430: $' + f2(newAvg));\n  } else {\n    var coinName = (COINS[sym] && COINS[sym].name) || sym;\n    portfolio.push({id: Date.now(), sym: sym, name: coinName, gecko: id, qty: qty, buy: buy});\n  }\n  save();\n  document.getElementById('inp-sym').value = '';\n  document.getElementById('inp-id').value  = '';\n  document.getElementById('inp-qty').value = '';\n  document.getElementById('inp-buy').value = '';\n  render();\n  setTimeout(fetchPrices, 80);\n}\n\nfunction showToast(msg) {\n  var t = document.getElementById('toast');\n  if (!t) return;\n  t.textContent = msg;\n  t.classList.add('show');\n  setTimeout(function(){ t.classList.remove('show'); }, 2800);\n}\n\nvar _editId = null;\nfunction editPos(id) {\n  var p = null; for(var i=0;i<portfolio.length;i++){if(portfolio[i].id===id){p=portfolio[i];break;}}\n  if (!p) return;\n  _editId = id;\n  document.getElementById('edit-title').textContent = p.sym + ' \u2014 \u0440\u0435\u0434\u0430\u043a\u0442\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u0435';\n  var qStr = p.qty >= 1 ? p.qty.toFixed(4) : p.qty.toLocaleString('en-US',{maximumFractionDigits:8});\n  document.getElementById('edit-sym-info').textContent = p.name + ' \u2014 \u0442\u0435\u043a. \u043e\u0431\u044a\u0451\u043c: ' + qStr;\n  document.getElementById('edit-qty').value = p.qty;\n  document.getElementById('edit-buy').value = p.buy;\n  document.getElementById('edit-modal').classList.add('open');\n  setTimeout(function(){document.getElementById('edit-qty').focus();},60);\n}\nfunction _closeEditModal() {\n  document.getElementById('edit-modal').classList.remove('open');\n  _editId = null;\n}\nfunction closeEditModal(e) {\n  if (e && e.target !== document.getElementById('edit-modal')) return;\n  _closeEditModal();\n}\nfunction saveEdit() {\n  var p = null; for(var i=0;i<portfolio.length;i++){if(portfolio[i].id===_editId){p=portfolio[i];break;}}\n  if (!p) return;\n  var qty = parseFloat(document.getElementById('edit-qty').value);\n  var buy = parseFloat(document.getElementById('edit-buy').value);\n  if (isNaN(qty)||qty<=0){alert('\u0423\u043a\u0430\u0436\u0438 \u043a\u043e\u0440\u0440\u0435\u043a\u0442\u043d\u044b\u0439 \u043e\u0431\u044a\u0451\u043c');return;}\n  if (isNaN(buy)||buy<=0){alert('\u0443\u043a\u0430\u0436\u0438 \u043a\u043e\u0440\u0440\u0435\u043a\u0442\u043d\u0443\u044e \u0446\u0435\u043d\u0443');return;}\n  p.qty = qty; p.buy = buy;\n  save(); _closeEditModal(); render();\n}\n\nfunction delPos(id) {\n  if (!confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u043f\u043e\u0437\u0438\u0446\u0438\u044e?')) return;\n  portfolio = portfolio.filter(function(p) { return p.id !== id; });\n  save();\n  render();\n}\n\nfunction toggleAuto() {\n  if (document.getElementById('auto-cb').checked) {\n    autoT = setInterval(fetchPrices, 60000);\n  } else {\n    clearInterval(autoT); autoT = null;\n  }\n}\n\nvar GC2CC = {\n  'binancecoin':'bnb','ripple':'xrp','matic-network':'polygon',\n  'avalanche-2':'avalanche','shiba-inu':'shiba-inu',\n  'uniswap':'uniswap','chainlink':'chainlink','stellar':'stellar'\n};\n\nfunction mkSignal(ms) {\n  try {\n    if (AbortSignal.timeout) return AbortSignal.timeout(ms);\n  } catch(e) {}\n  try {\n    var c = new AbortController();\n    setTimeout(function(){ c.abort(); }, ms);\n    return c.signal;\n  } catch(e) {}\n  return undefined;\n}\n\nasync function tryFetch(url) {\n  var sig = mkSignal(9000);\n  var opts = sig ? {signal: sig} : {};\n  var r = await fetch(url, opts);\n  if (!r.ok) throw new Error('HTTP ' + r.status);\n  return r.json();\n}\n\nasync function fetchPrices() {\n  if (!portfolio.length) return;\n  var btn = document.getElementById('rbtn');\n  var err = document.getElementById('ferr');\n  if (btn) { btn.disabled = true; btn.textContent = '\\u23f3 \\u0417\\u0430\\u0433\\u0440\\u0443\\u0437\\u043a\\u0430\\u2026'; }\n  if (err) err.style.display = 'none';\n\n  var ids = [];\n  portfolio.forEach(function(p) { if (ids.indexOf(p.gecko) === -1) ids.push(p.gecko); });\n  var ok = false;\n\n  // 1. CoinGecko direct\n  try {\n    var cgUrl = 'https://api.coingecko.com/api/v3/simple/price?ids=' + ids.join(',') + '&vs_currencies=usd&include_24hr_change=true';\n    var d = await tryFetch(cgUrl);\n    if (d && typeof d === 'object' && Object.keys(d).length) { Object.assign(cache, d); ok = true; }\n  } catch(e1) {}\n\n  // 2. CoinCap (works with null-origin)\n  if (!ok) {\n    try {\n      var ccIds = ids.map(function(g) { return GC2CC[g] || g; });\n      var ccUrl = 'https://api.coincap.io/v2/assets?ids=' + ccIds.join(',');\n      var d2 = await tryFetch(ccUrl);\n      if (d2 && d2.data && d2.data.length) {\n        var rev = {};\n        ids.forEach(function(g) { rev[GC2CC[g] || g] = g; });\n        d2.data.forEach(function(a) {\n          var gecko = rev[a.id] || a.id;\n          cache[gecko] = { usd: parseFloat(a.priceUsd) || 0, usd_24h_change: parseFloat(a.changePercent24Hr) || 0 };\n        });\n        ok = true;\n      }\n    } catch(e2) {}\n  }\n\n  // 3. CORS proxy fallback (allorigins)\n  if (!ok) {\n    try {\n      var cgUrl2 = 'https://api.coingecko.com/api/v3/simple/price?ids=' + ids.join(',') + '&vs_currencies=usd&include_24hr_change=true';\n      var proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(cgUrl2);\n      var d3 = await tryFetch(proxyUrl);\n      if (d3 && typeof d3 === 'object' && Object.keys(d3).length) { Object.assign(cache, d3); ok = true; }\n    } catch(e3) {}\n  }\n\n  if (ok) {\n    var t = new Date();\n    var upd = document.getElementById('upd-time');\n    if (upd) upd.textContent = '\\u041e\\u0431\\u043d\\u043e\\u0432\\u043b\\u0435\\u043d\\u043e ' + t.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});\n  } else {\n    if (err) { err.textContent = '\\u041e\\u0448\\u0438\\u0431\\u043a\\u0430: API \\u043d\\u0435\\u0434\\u043e\\u0441\\u0442\\u0443\\u043f\\u043d\\u043e. \\u041f\\u0440\\u043e\\u0432\\u0435\\u0440\\u044c \\u0441\\u0435\\u0442\\u044c'; err.style.display = ''; }\n    var upd2 = document.getElementById('upd-time');\n    if (upd2) upd2.textContent = '\\u041d\\u0435 \\u0443\\u0434\\u0430\\u043b\\u043e\\u0441\\u044c \\u043e\\u0431\\u043d\\u043e\\u0432\\u0438\\u0442\\u044c';\n  }\n\n  if (btn) { btn.disabled = false; btn.innerHTML = '&#8635; \\u041e\\u0431\\u043d\\u043e\\u0432\\u0438\\u0442\\u044c \\u0446\\u0435\\u043d\\u044b'; }\n  render();\n}\nfunction render() {\n  var el = document.getElementById('pf-out');\n  if (!portfolio.length) {\n    el.innerHTML = '<div class=\"empty-state\">\u041f\u043e\u0440\u0442\u0444\u0435\u043b\u044c \u043f\u0443\u0441\u0442 \u2014 \u0434\u043e\u0431\u0430\u0432\u044c \u043f\u0435\u0440\u0432\u0443\u044e \u043f\u043e\u0437\u0438\u0446\u0438\u044e \u0432\u044b\u0448\u0435</div>';\n    setMetrics(null,null,null,null);\n    return;\n  }\n  var totVal = 0, totInv = 0, tot24 = 0, has24 = false;\n  var rows = '';\n  for (var i = 0; i < portfolio.length; i++) {\n    var p = portfolio[i];\n    var pd = cache[p.gecko];\n    var cur  = pd ? pd['usd'] : null;\n    var ch24 = pd ? pd['usd_24h_change'] : null;\n    var inv  = p.qty * p.buy;\n    var val  = cur !== null ? p.qty * cur : null;\n    var pnl  = val !== null ? val - inv : null;\n    var pct  = pnl !== null && inv > 0 ? pnl / inv * 100 : null;\n    var c24c = ch24 === null ? 'fl' : ch24 > 0.005 ? 'up' : ch24 < -0.005 ? 'dn' : 'fl';\n\n    if (val !== null) { totVal += val; totInv += inv; }\n    if (val !== null && ch24 !== null) { tot24 += val * ch24 / 100; has24 = true; }\n\n    var qtyStr = p.qty >= 1 ? f2(p.qty) : p.qty.toLocaleString('en-US',{maximumFractionDigits:6});\n\n    rows += '<tr>';\n    rows += '<td><div class=\"coin-name\">' + p.sym + '</div><div class=\"coin-sym\">' + p.name + '</div></td>';\n    rows += '<td class=\"mono\" style=\"text-align:right\">' + qtyStr + '</td>';\n    rows += '<td class=\"mono\">' + fPrice(p.buy) + '</td>';\n    rows += '<td class=\"mono\">' + (cur !== null ? fPrice(cur) : '<span style=\"color:var(--text3)\">\u2014</span>') + '</td>';\n    rows += '<td class=\"mono\" style=\"font-weight:700\">' + (val !== null ? '$' + f2(val) : '\u2014') + '</td>';\n    rows += '<td class=\"mono\" style=\"color:' + (pnl === null ? 'var(--text2)' : pnl >= 0 ? 'var(--pos)' : 'var(--neg)') + ';font-weight:700\">'\n          + (pnl !== null ? (pnl >= 0 ? '+' : '') + '$' + f2(pnl) : '\u2014') + '</td>';\n    rows += '<td>' + (pct !== null ? '<span class=\"pch ' + (pct >= 0 ? 'up' : 'dn') + '\">' + (pct >= 0 ? '+' : '') + f2(pct) + '%</span>' : '\u2014') + '</td>';\n    rows += '<td>' + (ch24 !== null ? '<span class=\"pch ' + c24c + '\">' + (ch24 >= 0 ? '+' : '') + f2(ch24) + '%</span>' : '\u2014') + '</td>';\n    rows += '<td style=\"display:flex;gap:3px;align-items:center;justify-content:flex-end\"><button class=\"edit-btn\" title=\"\u0420\u0435\u0434\u0430\u043a\u0442\u0438\u0440\u043e\u0432\u0430\u0442\u044c\" onclick=\"editPos(' + p.id + ')\">&#9998;</button><button class=\"del-btn\" onclick=\"delPos(' + p.id + ')\">&#215;</button></td>';\n    rows += '</tr>';\n  }\n\n  var totPnl = totVal - totInv;\n  var totPct = totInv > 0 ? totPnl / totInv * 100 : 0;\n\n  var tf = '<tfoot><tr>';\n  tf += '<td colspan=\"4\" style=\"text-align:left;font-family:var(--mono)\">\u0418\u0422\u041e\u0413\u041e</td>';\n  tf += '<td class=\"mono\">$' + f2(totVal) + '</td>';\n  tf += '<td class=\"mono\" style=\"color:' + (totPnl >= 0 ? 'var(--pos)' : 'var(--neg)') + '\">' + (totPnl >= 0 ? '+' : '') + '$' + f2(totPnl) + '</td>';\n  tf += '<td><span class=\"pch ' + (totPct >= 0 ? 'up' : 'dn') + '\">' + (totPct >= 0 ? '+' : '') + f2(totPct) + '%</span></td>';\n  tf += '<td>' + (has24 ? '<span class=\"pch ' + (tot24 >= 0 ? 'up' : 'dn') + '\">' + (tot24 >= 0 ? '+' : '') + '$' + f2(tot24) + '</span>' : '\u2014') + '</td>';\n  tf += '<td></td></tr></tfoot>';\n\n  el.innerHTML = '<div class=\"pf-wrap\"><table class=\"pf-table\">'\n    + '<thead><tr><th>\u041c\u043e\u043d\u0435\u0442\u0430</th><th>\u041a\u043e\u043b-\u0432\u043e</th><th>\u0421\u0440. \u0446\u0435\u043d\u0430</th><th>\u0422\u0435\u043a\u0443\u0449\u0430\u044f</th><th>\u0421\u0442\u043e\u0438\u043c\u043e\u0441\u0442\u044c</th><th>P&L $</th><th>P&L %</th><th>24\u0447</th><th></th></tr></thead>'\n    + '<tbody>' + rows + '</tbody>'\n    + tf\n    + '</table></div>';\n\n  setMetrics(totVal, totInv, totPnl, totPct);\n}\n\nfunction setMetrics(val, inv, pnl, pct) {\n  var ve = document.getElementById('m-val');\n  var ie = document.getElementById('m-inv');\n  var pe = document.getElementById('m-pnl');\n  var pp = document.getElementById('m-pct');\n  ve.textContent = val !== null && val > 0 ? '$' + f2(val) : '\u2014';\n  ie.textContent = inv !== null && inv > 0 ? '$' + f2(inv) : '\u2014';\n  if (pnl !== null) {\n    pe.textContent  = (pnl >= 0 ? '+' : '') + '$' + f2(pnl);\n    pe.className    = 'metric-value ' + (pnl >= 0 ? 'pos' : 'neg');\n    pp.textContent  = (pct >= 0 ? '+' : '') + f2(pct) + '%';\n    pp.className    = 'metric-value ' + (pct >= 0 ? 'pos' : 'neg');\n  } else {\n    pe.textContent = '\u2014'; pe.className = 'metric-value';\n    pp.textContent = '\u2014'; pp.className = 'metric-value';\n  }\n}\n\nload(); render();\nif (portfolio.length) fetchPrices();\n<\/script>\n<div id=\"toast\" class=\"toast\"></div>\n<div id=\"edit-modal\" class=\"edit-modal\" onclick=\"closeEditModal(event)\">\n  <div class=\"edit-box\">\n    <h3 id=\"edit-title\"></h3>\n    <div class=\"edit-sym-info\" id=\"edit-sym-info\"></div>\n    <div class=\"edit-row\">\n      <label>Объём (кол-во монет)</label>\n      <input type=\"number\" id=\"edit-qty\" step=\"any\" min=\"0\" placeholder=\"0.00\">\n      <div class=\"edit-hint\">Частичное закрытие: уменьши объём в поле</div>\n    </div>\n    <div class=\"edit-row\">\n      <label>Ср. цена входа ($)</label>\n      <input type=\"number\" id=\"edit-buy\" step=\"any\" min=\"0\" placeholder=\"0.00\">\n    </div>\n    <div class=\"edit-actions\">\n      <button class=\"btn-secondary\" onclick=\"_closeEditModal()\">Отмена</button>\n      <button class=\"btn-primary\" onclick=\"saveEdit()\">Сохранить</button>\n    </div>\n  </div>\n</div>\n</body>\n</html>";

  if(!THEMES[t]) t = 'light';
  document.documentElement.setAttribute('data-theme', t);
  setVars(t);
  try{ localStorage.setItem('app_theme', t); }catch(e){}
  var btns = document.querySelectorAll('#theme-menu button');
  for(var i=0;i<btns.length;i++){ btns[i].classList.toggle('active', btns[i].getAttribute('data-theme')===t); }
  var menu = document.getElementById('theme-menu'); if(menu) menu.classList.remove('open');
  try{ var fr=document.getElementById('tool-frame'); if(fr && fr.contentDocument) injectIframeTheme(fr.contentDocument, t); }catch(e){}
}
function toggleThemeMenu(ev){
  ev.stopPropagation();
  document.getElementById('theme-menu').classList.toggle('open');
}
document.addEventListener('click', function(e){
  var m = document.getElementById('theme-menu');
  if(m && m.classList.contains('open') && !e.target.closest('.theme-picker')) m.classList.remove('open');
});
window.addEventListener('DOMContentLoaded', function(){
  applyTheme(getTheme());
  var fr = document.getElementById('tool-frame');
  if(fr) fr.addEventListener('load', function(){
    try{ injectIframeTheme(fr.contentDocument, getTheme()); }catch(e){}
  });
});

var _currentTool = -1;
function goHome() {
  // Save iframe data to parent localStorage before potentially losing it
  try {
    var fr = document.getElementById('tool-frame');
    var cw = fr && fr.contentWindow;
    if (cw && cw.portfolio && cw.portfolio.length) {
      localStorage.setItem('portfolio_v1', JSON.stringify(cw.portfolio));
    }
  } catch(e) {}
  document.getElementById('viewer').classList.remove('open');
  // Keep iframe alive — do NOT set src to about:blank
  document.getElementById('home').style.display = '';
}

function backupAll() {
  var data = {};
  var skip = {'app_theme':1, 'icloud_auto':1};
  for (var i = 0; i < localStorage.length; i++){
    var k = localStorage.key(i);
    if (!k || skip[k] || k.charAt(0) === '_') continue;
    var v = localStorage.getItem(k);
    if (v == null) continue;
    try { data[k] = JSON.parse(v); } catch(e) { data[k] = v; }
  }
  data.__date = new Date().toISOString();
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'suite_backup_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function restoreAll(inp) {
  var file = inp.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      Object.keys(data).forEach(function(k) {
        if (k.charAt(0) !== '_') localStorage.setItem(k, JSON.stringify(data[k]));
      });
      alert('Готово! Перезагрузи страницу.');
    } catch(e) {
      alert('Ошибка: ' + e.message);
    }
  };
  reader.readAsText(file);
  inp.value = '';
}
