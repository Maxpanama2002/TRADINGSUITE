);}\n.risk-warn{background:var(--amber-bg);border:0.5px solid var(--amber-bd);}\n.risk-bad{background:var(--red-bg);border:0.5px solid var(--red-bd);}\n.rr-bar{height:8px;border-radius:4px;background:var(--surf3);overflow:hidden;margin:10px 0 4px;}\n.rr-fill{height:100%;border-radius:4px;transition:width .4s;}\n.daily-list{margin-top:8px;}\n.daily-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px;}\n.daily-item:last-child{border-bottom:none;}\n.del-daily-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px;transition:all .15s;}\n.del-daily-btn:hover{background:var(--red-bg);color:var(--red-tx);}\n</style></head><body>\n<div class=\"page\">\n  <h1>\u0420\u0438\u0441\u043a-\u043c\u0435\u043d\u0435\u0434\u0436\u0435\u0440</h1>\n  <p class=\"subtitle\">\u0420\u0430\u0441\u0447\u0451\u0442 \u0440\u0430\u0437\u043c\u0435\u0440\u0430 \u043f\u043e\u0437\u0438\u0446\u0438\u0438 \u0438 \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u0434\u043d\u0435\u0432\u043d\u043e\u0433\u043e \u0440\u0438\u0441\u043a\u0430</p>\n\n  <div class=\"tabs-bar\">\n    <button class=\"tab-btn active\" onclick=\"showTab('calc')\">\u041a\u0430\u043b\u044c\u043a\u0443\u043b\u044f\u0442\u043e\u0440</button>\n    <button class=\"tab-btn\" onclick=\"showTab('daily')\">\u0414\u043d\u0435\u0432\u043d\u043e\u0439 \u0440\u0438\u0441\u043a</button>\n  </div>\n\n  <!-- CALC TAB -->\n  <div id=\"tab-calc\">\n    <div class=\"card\" style=\"margin-bottom:14px\">\n      <div class=\"card-title\">\u041f\u0430\u0440\u0430\u043c\u0435\u0442\u0440\u044b \u0441\u0434\u0435\u043b\u043a\u0438</div>\n      <div class=\"form-grid\">\n        <div class=\"field\"><label>\u0414\u0435\u043f\u043e\u0437\u0438\u0442 ($)</label><input type=\"number\" id=\"c-deposit\" placeholder=\"10000\" step=\"any\" oninput=\"calc()\"></div>\n        <div class=\"field\"><label>\u0420\u0438\u0441\u043a \u043d\u0430 \u0441\u0434\u0435\u043b\u043a\u0443 (%)</label><input type=\"number\" id=\"c-risk-pct\" value=\"1\" step=\"0.1\" oninput=\"calc()\"></div>\n        <div class=\"field\"><label>\u0426\u0435\u043d\u0430 \u0432\u0445\u043e\u0434\u0430 ($)</label><input type=\"number\" id=\"c-entry\" placeholder=\"0.00\" step=\"any\" oninput=\"calc()\"></div>\n        <div class=\"field\"><label>\u0421\u0442\u043e\u043f-\u043b\u043e\u0441\u0441 ($)</label><input type=\"number\" id=\"c-sl\" placeholder=\"0.00\" step=\"any\" oninput=\"calc()\"></div>\n        <div class=\"field\"><label>\u0422\u0435\u0439\u043a-\u043f\u0440\u043e\u0444\u0438\u0442 ($) \u2014 \u043d\u0435\u043e\u0431\u044f\u0437\u0430\u0442\u0435\u043b\u044c\u043d\u043e</label><input type=\"number\" id=\"c-tp\" placeholder=\"0.00\" step=\"any\" oninput=\"calc()\"></div>\n        <div class=\"field\"><label>\u041a\u043e\u043c\u0438\u0441\u0441\u0438\u044f % (\u0432\u0445\u043e\u0434 + \u0432\u044b\u0445\u043e\u0434)</label><input type=\"number\" id=\"c-fee\" value=\"0.1\" step=\"0.01\" oninput=\"calc()\"></div>\n      </div>\n    </div>\n    <div id=\"calc-result\"></div>\n  </div>\n\n  <!-- DAILY TAB -->\n  <div id=\"tab-daily\" style=\"display:none\">\n    <div class=\"card\" style=\"margin-bottom:14px\">\n      <div class=\"card-title\">\u041d\u0430\u0441\u0442\u0440\u043e\u0439\u043a\u0438 \u0434\u043d\u0435\u0432\u043d\u043e\u0433\u043e \u043b\u0438\u043c\u0438\u0442\u0430</div>\n      <div class=\"form-grid\">\n        <div class=\"field\"><label>\u0414\u0435\u043f\u043e\u0437\u0438\u0442 ($)</label><input type=\"number\" id=\"d-deposit\" placeholder=\"10000\" step=\"any\" oninput=\"saveSettings()\"></div>\n        <div class=\"field\"><label>\u0414\u043d\u0435\u0432\u043d\u043e\u0439 \u043b\u0438\u043c\u0438\u0442 \u0440\u0438\u0441\u043a\u0430 (%)</label><input type=\"number\" id=\"d-limit\" value=\"3\" step=\"0.1\" oninput=\"saveSettings()\"></div>\n      </div>\n    </div>\n    <div class=\"metric-grid mg-3\" id=\"daily-metrics\"></div>\n    <div class=\"card\">\n      <div class=\"card-title\">\u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0441\u0434\u0435\u043b\u043a\u0443 \u0434\u043d\u044f</div>\n      <div class=\"form-grid\">\n        <div class=\"field\"><label>\u0418\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442</label><input type=\"text\" id=\"d-asset\" placeholder=\"BTC/USD\"></div>\n        <div class=\"field\"><label>P&L ($)</label><input type=\"number\" id=\"d-pnl\" placeholder=\"0.00\" step=\"any\"></div>\n      </div>\n      <button class=\"btn-primary\" style=\"margin-top:12px\" onclick=\"addDailyTrade()\">\u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c</button>\n      <div class=\"daily-list\" id=\"daily-list\"></div>\n    </div>\n  </div>\n</div>\n<script>\nlet dailyTrades=[];\nfunction showTab(t){['calc','daily'].forEach((tab,i)=>{document.getElementById('tab-'+tab).style.display=tab===t?'':'none';document.querySelectorAll('.tab-btn')[i].classList.toggle('active',tab===t);});if(t==='daily')renderDaily();}\nfunction fmt(n,d=2){return n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}\nfunction calc(){\n  const deposit=parseFloat(document.getElementById('c-deposit').value)||0;\n  const riskPct=parseFloat(document.getElementById('c-risk-pct').value)||1;\n  const entry=parseFloat(document.getElementById('c-entry').value)||0;\n  const sl=parseFloat(document.getElementById('c-sl').value)||0;\n  const tp=parseFloat(document.getElementById('c-tp').value)||0;\n  const fee=parseFloat(document.getElementById('c-fee').value)||0;\n  const el=document.getElementById('calc-result');\n  if(!deposit||!entry||!sl){el.innerHTML='<div class=\"empty-state\" style=\"padding:1.5rem 0\">\u0417\u0430\u043f\u043e\u043b\u043d\u0438 \u0434\u0435\u043f\u043e\u0437\u0438\u0442, \u0446\u0435\u043d\u0443 \u0432\u0445\u043e\u0434\u0430 \u0438 \u0441\u0442\u043e\u043f-\u043b\u043e\u0441\u0441</div>';return;}\n  const riskAmt=deposit*riskPct/100;\n  const slDist=Math.abs(entry-sl);\n  if(!slDist){el.innerHTML='<div class=\"empty-state\">\u0421\u0442\u043e\u043f-\u043b\u043e\u0441\u0441 \u0440\u0430\u0432\u0435\u043d \u0446\u0435\u043d\u0435 \u0432\u0445\u043e\u0434\u0430</div>';return;}\n  const units=riskAmt/slDist;\n  const posSize=units*entry;\n  const feeCost=posSize*(fee/100);\n  const netRisk=riskAmt+feeCost;\n  const netRiskPct=netRisk/deposit*100;\n  let rrHtml='';let rr=0;\n  if(tp&&tp!==entry){const tpDist=Math.abs(tp-entry);rr=tpDist/slDist;const rrCol=rr>=2?'var(--green-bd)':rr>=1.5?'var(--amber-bd)':'var(--red-bd)';const rrW=Math.min(100,rr/4*100);const tpProfit=units*tpDist-feeCost;rrHtml=`<div class=\"divider\"></div><p class=\"section-label\">\u0421\u043e\u043e\u0442\u043d\u043e\u0448\u0435\u043d\u0438\u0435 \u0440\u0438\u0441\u043a/\u043f\u0440\u0438\u0431\u044b\u043b\u044c</p><div class=\"metric-grid mg-3\"><div class=\"metric\"><div class=\"metric-label\">R:R</div><div class=\"metric-value\" style=\"color:${rrCol}\">1 : ${fmt(rr)}</div></div><div class=\"metric\"><div class=\"metric-label\">\u041f\u043e\u0442\u0435\u043d\u0446\u0438\u0430\u043b\u044c\u043d\u0430\u044f \u043f\u0440\u0438\u0431\u044b\u043b\u044c</div><div class=\"metric-value pos\">+$${fmt(tpProfit)}</div></div><div class=\"metric\"><div class=\"metric-label\">\u041f\u0440\u0438\u0431\u044b\u043b\u044c % \u043e\u0442 \u0434\u0435\u043f\u043e\u0437\u0438\u0442\u0430</div><div class=\"metric-value pos\">+${fmt(tpProfit/deposit*100)}%</div></div></div><div class=\"rr-bar\"><div class=\"rr-fill\" style=\"width:${rrW}%;background:${rrCol}\"></div></div><p style=\"font-size:11px;color:var(--text2)\">1:${fmt(rr)} &nbsp;\u00b7&nbsp; ${rr>=2?'\u0425\u043e\u0440\u043e\u0448\u0438\u0439 R:R \u2713':rr>=1.5?'\u041f\u0440\u0438\u0435\u043c\u043b\u0435\u043c\u044b\u0439 R:R':'\u041d\u0438\u0437\u043a\u0438\u0439 R:R \u2014 \u043f\u0435\u0440\u0435\u0441\u043c\u043e\u0442\u0440\u0438 \u0441\u0434\u0435\u043b\u043a\u0443'}</p>`;}\n  const riskClass=netRiskPct<=1?'risk-ok':netRiskPct<=2?'risk-warn':'risk-bad';\n  const riskTxColor=netRiskPct<=1?'var(--green-tx)':netRiskPct<=2?'var(--amber-tx)':'var(--red-tx)';\n  el.innerHTML=`<div class=\"metric-grid mg-4\" style=\"margin-bottom:14px\">\n    <div class=\"metric\"><div class=\"metric-label\">\u041e\u0431\u044a\u0451\u043c \u043f\u043e\u0437\u0438\u0446\u0438\u0438</div><div class=\"metric-value blue\">$${fmt(posSize)}</div></div>\n    <div class=\"metric\"><div class=\"metric-label\">\u041a\u043e\u043b\u0438\u0447\u0435\u0441\u0442\u0432\u043e \u0435\u0434\u0438\u043d\u0438\u0446</div><div class=\"metric-value\">${fmt(units,4)}</div></div>\n    <div class=\"metric\"><div class=\"metric-label\">\u0420\u0438\u0441\u043a ($)</div><div class=\"metric-value neg\">-$${fmt(riskAmt)}</div></div>\n    <div class=\"metric\"><div class=\"metric-label\">\u041a\u043e\u043c\u0438\u0441\u0441\u0438\u044f</div><div class=\"metric-value amber\">-$${fmt(feeCost)}</div></div>\n  </div>\n  <div class=\"risk-result-box ${riskClass}\">\n    <div style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:${riskTxColor};margin-bottom:8px\">\u0418\u0442\u043e\u0433\u043e\u0432\u044b\u0439 \u0440\u0438\u0441\u043a \u0441 \u043a\u043e\u043c\u0438\u0441\u0441\u0438\u0435\u0439</div>\n    <div class=\"big-num\" style=\"color:${riskTxColor}\">-$${fmt(netRisk)}</div>\n    <div style=\"font-size:13px;margin-top:6px;color:${riskTxColor}\">${fmt(netRiskPct)}% \u043e\u0442 \u0434\u0435\u043f\u043e\u0437\u0438\u0442\u0430</div>\n  </div>${rrHtml}\n  <div class=\"divider\"></div>\n  <p class=\"section-label\">\u0414\u0435\u0442\u0430\u043b\u0438\u0437\u0430\u0446\u0438\u044f</p>\n  <div class=\"card\">\n    ${[['\u0414\u0435\u043f\u043e\u0437\u0438\u0442','$'+fmt(deposit)],['\u0420\u0438\u0441\u043a %',riskPct+'%'],['\u0414\u0438\u0441\u0442\u0430\u043d\u0446\u0438\u044f \u0434\u043e \u0441\u0442\u043e\u043f\u0430','$'+fmt(slDist)+' ('+fmt(slDist/entry*100)+'%)'],['\u0415\u0434\u0438\u043d\u0438\u0446 \u043f\u043e\u0437\u0438\u0446\u0438\u0438',fmt(units,6)],['\u041e\u0431\u044a\u0451\u043c \u043f\u043e\u0437\u0438\u0446\u0438\u0438','$'+fmt(posSize)],['\u041a\u043e\u043c\u0438\u0441\u0441\u0438\u044f (\u0432\u0445\u043e\u0434+\u0432\u044b\u0445\u043e\u0434)','-$'+fmt(feeCost)],['\u0427\u0438\u0441\u0442\u044b\u0439 \u0440\u0438\u0441\u043a','-$'+fmt(netRisk)]].map(([l,v])=>`<div class=\"detail-row\"><span class=\"detail-label\">${l}</span><span class=\"detail-val\">${v}</span></div>`).join('')}\n  </div>`;\n}\nfunction saveSettings(){localStorage.setItem('rm_settings',JSON.stringify({deposit:document.getElementById('d-deposit').value,limit:document.getElementById('d-limit').value}));renderDaily();}\nfunction loadSettings(){try{const s=JSON.parse(localStorage.getItem('rm_settings')||'{}');if(s.deposit)document.getElementById('d-deposit').value=s.deposit;if(s.limit)document.getElementById('d-limit').value=s.limit;}catch(e){}}\nfunction loadDaily(){try{const k='rm_daily_'+new Date().toISOString().slice(0,10);const s=localStorage.getItem(k);if(s)dailyTrades=JSON.parse(s);else dailyTrades=[];}catch(e){dailyTrades=[];}}\nfunction saveDaily(){localStorage.setItem('rm_daily_'+new Date().toISOString().slice(0,10),JSON.stringify(dailyTrades));}\nfunction addDailyTrade(){\n  const asset=(document.getElementById('d-asset').value||'').trim();const pnl=parseFloat(document.getElementById('d-pnl').value);\n  if(!asset||isNaN(pnl)){alert('\u0423\u043a\u0430\u0436\u0438 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442 \u0438 P&L');return;}\n  dailyTrades.push({id:Date.now(),asset,pnl,time:new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})});\n  saveDaily();document.getElementById('d-asset').value='';document.getElementById('d-pnl').value='';renderDaily();\n}\nfunction deleteDailyTrade(id){dailyTrades=dailyTrades.filter(t=>t.id!==id);saveDaily();renderDaily();}\nfunction renderDaily(){\n  const deposit=parseFloat(document.getElementById('d-deposit').value)||0;\n  const limitPct=parseFloat(document.getElementById('d-limit').value)||3;\n  const limitAmt=deposit*limitPct/100;\n  const totalPnl=dailyTrades.reduce((s,t)=>s+t.pnl,0);\n  const used=Math.max(0,-totalPnl);\n  const remaining=Math.max(0,limitAmt-used);\n  const usedPct=limitAmt>0?Math.min(100,used/limitAmt*100):0;\n  const mEl=document.getElementById('daily-metrics');\n  mEl.innerHTML=`<div class=\"metric\"><div class=\"metric-label\">\u041b\u0438\u043c\u0438\u0442 \u0434\u043d\u044f</div><div class=\"metric-value amber\">-$${fmt(limitAmt)}</div></div>\n    <div class=\"metric\"><div class=\"metric-label\">\u0418\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u043d\u043e</div><div class=\"metric-value ${used>0?'neg':''}\">${used>0?'-':''}$${fmt(used)}</div></div>\n    <div class=\"metric\"><div class=\"metric-label\">\u041e\u0441\u0442\u0430\u0442\u043e\u043a</div><div class=\"metric-value ${remaining<limitAmt*0.3?'neg':'pos'}\">$${fmt(remaining)}</div></div>`;\n  const listEl=document.getElementById('daily-list');\n  if(!dailyTrades.length){listEl.innerHTML='<p style=\"font-size:13px;color:var(--text2);padding:12px 0\">\u0421\u0434\u0435\u043b\u043e\u043a \u0441\u0435\u0433\u043e\u0434\u043d\u044f \u0435\u0449\u0451 \u043d\u0435\u0442</p>';return;}\n  listEl.innerHTML=`<div style=\"height:6px;border-radius:3px;background:var(--surf3);overflow:hidden;margin:14px 0 10px\"><div style=\"height:100%;border-radius:3px;width:${usedPct}%;background:${usedPct>80?'var(--red-bd)':usedPct>50?'var(--amber-bd)':'var(--green-bd)'};transition:width .4s\"></div></div>`+\n    dailyTrades.map(t=>`<div class=\"daily-item\"><span>${t.time} &nbsp;\u00b7&nbsp; <strong>${t.asset}</strong></span><span style=\"display:flex;align-items:center;gap:8px\"><span class=\"mono\" style=\"color:${t.pnl>=0?'var(--pos)':'var(--neg)'};font-weight:700\">${t.pnl>=0?'+':''}${fmt(t.pnl)}</span><button class=\"del-daily-btn\" onclick=\"deleteDailyTrade(${t.id})\">&#215;</button></span></div>`).join('')+\n    `<div class=\"daily-item\" style=\"font-weight:700\"><span>\u0418\u0442\u043e\u0433\u043e \u0437\u0430 \u0434\u0435\u043d\u044c</span><span class=\"mono\" style=\"color:${totalPnl>=0?'var(--pos)':'var(--neg)'}\">${totalPnl>=0?'+':''}${fmt(totalPnl)}</span></div>`;\n}\nloadSettings();loadDaily();calc();\ndocument.getElementById('tab-daily').style.display='none';\n<\/script></body></html>";
  tools[6] = "<!DOCTYPE html>\n<html lang=\"ru\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>\u0414\u043d\u0435\u0432\u043d\u0438\u043a \u0442\u0440\u0435\u0439\u0434\u0435\u0440\u0430</title>\n<style>\n\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n:root {\n  --bg:#f0efe9; --surface:#ffffff; --surf2:#f5f4f0; --surf3:#eae9e3;\n  --text:#1a1a18; --text2:#6b6b67; --text3:#9a9a96;\n  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.17);\n  --radius:10px; --radius-lg:14px;\n  --font:'Times New Roman',Times,Georgia,serif;\n  --mono:'Courier New',Courier,monospace;\n  --green-bg:#C0DD97; --green-bd:#639922; --green-tx:#27500A;\n  --red-bg:#F7C1C1;   --red-bd:#E24B4A;   --red-tx:#791F1F;\n  --amber-bg:#FAC775; --amber-bd:#EF9F27; --amber-tx:#633806;\n  --blue-bg:#B5D4F4;  --blue-bd:#378ADD;  --blue-tx:#0C447C;\n  --purple-bg:#CECBF6;--purple-bd:#7F77DD;--purple-tx:#26215C;\n  --pos:#27500A; --neg:#791F1F;\n}\nbody{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;min-height:100vh;padding:28px 16px;}\n.page{max-width:860px;margin:0 auto;}\n.page-wide{max-width:1060px;margin:0 auto;}\nh1{font-size:28px;font-weight:700;letter-spacing:-0.01em;margin-bottom:4px;}\n.subtitle{font-size:14px;color:var(--text2);margin-bottom:24px;}\n.section-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;}\n.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:18px 20px;}\n.card+.card{margin-top:12px;}\n.card-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid var(--border);}\n.metric-grid{display:grid;gap:8px;margin-bottom:18px;}\n.mg-4{grid-template-columns:repeat(4,1fr);} .mg-3{grid-template-columns:repeat(3,1fr);} .mg-2{grid-template-columns:repeat(2,1fr);}\n.metric{background:var(--surf2);border-radius:var(--radius);padding:12px 14px;}\n.metric-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}\n.metric-value{font-size:20px;font-weight:700;font-family:var(--mono);}\n.pos{color:var(--pos);} .neg{color:var(--neg);} .blue{color:var(--blue-tx);} .amber{color:var(--amber-tx);}\n.tabs-bar{display:flex;gap:2px;background:var(--surf2);border-radius:var(--radius);padding:3px;margin-bottom:18px;}\n.tab-btn{flex:1;padding:9px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;background:none;border:none;color:var(--text2);border-radius:8px;font-family:var(--font);transition:all .15s;}\n.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}\n.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}\n.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}\n.field{display:flex;flex-direction:column;gap:4px;}\n.field.full{grid-column:span 2;} .field.full3{grid-column:span 3;}\n.field label{font-size:12px;color:var(--text2);}\ninput[type=text],input[type=number],input[type=datetime-local],input[type=date],select,textarea{width:100%;padding:9px 11px;background:var(--surf2);border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s;}\ninput:focus,select:focus,textarea:focus{border-color:var(--text3);background:var(--surface);}\ntextarea{resize:vertical;min-height:56px;}\ninput[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--surf3);border-radius:2px;outline:none;border:none;cursor:pointer;}\ninput[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--surface);}\n.btn-primary{width:100%;padding:11px;background:var(--text);color:var(--surface);border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s;}\n.btn-primary:hover{opacity:.82;}\n.btn-secondary{padding:8px 16px;background:none;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s;}\n.btn-secondary:hover{border-color:var(--text);color:var(--text);}\n.toggle-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}\n.toggle-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}\n.tbtn{padding:10px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surf2);color:var(--text2);text-align:center;font-family:var(--font);transition:all .15s;}\n.tbtn:hover{border-color:var(--text3);color:var(--text);}\n.tbtn.a-green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);font-weight:700;}\n.tbtn.a-red{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);font-weight:700;}\n.tbtn.a-amber{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);font-weight:700;}\n.tbtn.a-blue{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);font-weight:700;}\n.tbtn.a-dark{background:var(--text);color:var(--surface);border-color:var(--text);font-weight:700;}\n.badge{display:inline-block;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700;}\n.b-green{background:var(--green-bg);color:var(--green-tx);}\n.b-red{background:var(--red-bg);color:var(--red-tx);}\n.b-amber{background:var(--amber-bg);color:var(--amber-tx);}\n.b-blue{background:var(--blue-bg);color:var(--blue-tx);}\n.b-purple{background:var(--purple-bg);color:var(--purple-tx);}\n.table-wrap{overflow-x:auto;}\ntable{width:100%;border-collapse:collapse;font-size:13px;}\nthead th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;border-bottom:0.5px solid var(--border2);}\ntbody td{padding:9px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle;}\ntbody tr:last-child td{border-bottom:none;}\ntbody tr:hover td{background:var(--surf2);}\n.divider{height:0.5px;background:var(--border2);margin:16px 0;}\n.mono{font-family:var(--mono);}\n.empty-state{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:15px;}\n.chart-wrap{position:relative;width:100%;height:240px;margin:10px 0;}\n.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;}\n.detail-row:last-child{border-bottom:none;}\n.detail-label{color:var(--text2);}\n.detail-val{font-family:var(--mono);font-weight:700;}\n.verdict{padding:12px 16px;font-size:14px;margin-bottom:18px;border-left:3px solid;line-height:1.6;border-radius:0 var(--radius) var(--radius) 0;}\n.v-profit{border-color:var(--green-bd);background:var(--green-bg);color:var(--green-tx);}\n.v-loss{border-color:var(--red-bd);background:var(--red-bg);color:var(--red-tx);}\n.v-neutral{border-color:var(--text3);background:var(--surf2);color:var(--text2);}\n.v-partial{border-color:var(--amber-bd);background:var(--amber-bg);color:var(--amber-tx);}\n.insight-box{background:var(--surf2);border:0.5px solid var(--border);border-radius:var(--radius);padding:2px 14px;margin-top:6px;}\n.insight-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px;}\n.insight-row:last-child{border-bottom:none;}\n@media(max-width:560px){.mg-4,.mg-3{grid-template-columns:1fr 1fr;}.form-grid,.form-grid-3{grid-template-columns:1fr;}.field.full,.field.full3{grid-column:span 1;}}\n\n.ebtn{padding:9px 4px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surf2);color:var(--text2);text-align:center;font-family:var(--font);transition:all .15s;line-height:1.3;}\n.ebtn:hover{border-color:var(--text3);color:var(--text);}\n.ebtn[data-e=\"calm\"].active{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);font-weight:700;}\n.ebtn[data-e=\"fear\"].active{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);font-weight:700;}\n.ebtn[data-e=\"greed\"].active{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);font-weight:700;}\n.ebtn[data-e=\"fomo\"].active{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);font-weight:700;}\n.ebtn[data-e=\"revenge\"].active{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple-tx);font-weight:700;}\n.emotion-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}\n.tag-row{display:flex;flex-wrap:wrap;gap:6px;}\n.tag-btn{padding:5px 12px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);border-radius:99px;cursor:pointer;background:var(--surf2);color:var(--text2);font-family:var(--font);transition:all .15s;}\n.tag-btn:hover{border-color:var(--text3);color:var(--text);}\n.tag-btn.active{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);}\n.diary-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;}\n.diary-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .1s;}\n.diary-header:hover{background:var(--surf2);}\n.diary-body{display:none;padding:0 16px 16px;border-top:0.5px solid var(--border);}\n.diary-card.open .diary-body{display:block;}\n.diary-card.open .dchev{transform:rotate(180deg);}\n.dchev{font-size:10px;color:var(--text3);margin-left:auto;transition:transform .2s;flex-shrink:0;}\n.diary-date{font-size:15px;font-weight:700;}\n.diary-meta{font-size:12px;color:var(--text2);margin-top:2px;}\n.del-diary-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:12px;padding:4px 10px;font-family:var(--font);transition:all .15s;flex-shrink:0;}\n.del-diary-btn:hover{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-bd);}\n.entry-block{margin-bottom:12px;}\n.entry-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}\n.entry-text{font-size:14px;line-height:1.7;color:var(--text);}\n</style>\n</head>\n<body>\n<div class=\"page\">\n  <h1>\u0414\u043d\u0435\u0432\u043d\u0438\u043a \u0442\u0440\u0435\u0439\u0434\u0435\u0440\u0430</h1>\n  <p class=\"subtitle\">\u041f\u0441\u0438\u0445\u043e\u043b\u043e\u0433\u0438\u0447\u0435\u0441\u043a\u0438\u0435 \u0437\u0430\u043c\u0435\u0442\u043a\u0438, \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u044f, \u0432\u044b\u0432\u043e\u0434\u044b</p>\n  <div class=\"tabs-bar\">\n    <button class=\"tab-btn active\" id=\"tbw\" onclick=\"goTab('write')\">\u041d\u043e\u0432\u0430\u044f \u0437\u0430\u043f\u0438\u0441\u044c</button>\n    <button class=\"tab-btn\" id=\"tbf\" onclick=\"goTab('feed')\">\u0412\u0441\u0435 \u0437\u0430\u043f\u0438\u0441\u0438</button>\n  </div>\n\n  <div id=\"tab-write\">\n    <div class=\"card\" style=\"margin-bottom:14px\">\n      <div class=\"card-title\">\u0417\u0430\u043f\u0438\u0441\u044c</div>\n      <div class=\"form-grid\" style=\"margin-bottom:14px\">\n        <div class=\"field\"><label>\u0414\u0430\u0442\u0430</label><input type=\"date\" id=\"d-date\"></div>\n        <div class=\"field\"><label>\u0420\u044b\u043d\u043e\u043a \u0441\u0435\u0433\u043e\u0434\u043d\u044f</label>\n          <select id=\"d-market\">\n            <option value=\"\">\u2014 \u043d\u0435 \u0443\u043a\u0430\u0437\u0430\u043d \u2014</option>\n            <option value=\"bull\">\u0411\u044b\u0447\u0438\u0439 (\u0440\u043e\u0441\u0442)</option>\n            <option value=\"bear\">\u041c\u0435\u0434\u0432\u0435\u0436\u0438\u0439 (\u043f\u0430\u0434\u0435\u043d\u0438\u0435)</option>\n            <option value=\"range\">\u0411\u043e\u043a\u043e\u0432\u0438\u043a</option>\n            <option value=\"volatile\">\u0412\u043e\u043b\u0430\u0442\u0438\u043b\u044c\u043d\u044b\u0439</option>\n          </select>\n        </div>\n      </div>\n\n      <div class=\"field\" style=\"margin-bottom:14px\">\n        <label style=\"margin-bottom:6px\">\u041f\u0440\u0435\u043e\u0431\u043b\u0430\u0434\u0430\u044e\u0449\u0430\u044f \u044d\u043c\u043e\u0446\u0438\u044f \u0434\u043d\u044f</label>\n        <div class=\"emotion-grid\">\n          <button class=\"ebtn\" data-e=\"calm\"    onclick=\"pickEmotion(this)\">\u0421\u043f\u043e\u043a\u043e\u0439\u0441\u0442\u0432\u0438\u0435</button>\n          <button class=\"ebtn\" data-e=\"fear\"    onclick=\"pickEmotion(this)\">\u0421\u0442\u0440\u0430\u0445</button>\n          <button class=\"ebtn\" data-e=\"greed\"   onclick=\"pickEmotion(this)\">\u0416\u0430\u0434\u043d\u043e\u0441\u0442\u044c</button>\n          <button class=\"ebtn\" data-e=\"fomo\"    onclick=\"pickEmotion(this)\">FOMO</button>\n          <button class=\"ebtn\" data-e=\"revenge\" onclick=\"pickEmotion(this)\">\u041c\u0435\u0441\u0442\u044c \u0440\u044b\u043d\u043a\u0443</button>\n        </div>\n      </div>\n\n      <div class=\"field\" style=\"margin-bottom:14px\">\n        <label style=\"margin-bottom:6px\">\u0422\u0435\u0433\u0438 \u0434\u043d\u044f</label>\n        <div class=\"tag-row\">\n          <button class=\"tag-btn\" data-tag=\"\u0434\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0430\"   onclick=\"pickTag(this)\">\u0414\u0438\u0441\u0446\u0438\u043f\u043b\u0438\u043d\u0430</button>\n          <button class=\"tag-btn\" data-tag=\"\u0442\u0435\u0440\u043f\u0435\u043d\u0438\u0435\"     onclick=\"pickTag(this)\">\u0422\u0435\u0440\u043f\u0435\u043d\u0438\u0435</button>\n          <button class=\"tag-btn\" data-tag=\"\u043f\u0435\u0440\u0435\u0442\u043e\u0440\u0433\u043e\u0432\u043b\u044f\" onclick=\"pickTag(this)\">\u041f\u0435\u0440\u0435\u0442\u043e\u0440\u0433\u043e\u0432\u043b\u044f</button>\n          <button class=\"tag-btn\" data-tag=\"\u043f\u0440\u043e\u0440\u044b\u0432\"       onclick=\"pickTag(this)\">\u041f\u0440\u043e\u0440\u044b\u0432</button>\n          <button class=\"tag-btn\" data-tag=\"\u043e\u0448\u0438\u0431\u043a\u0430\"       onclick=\"pickTag(this)\">\u041e\u0448\u0438\u0431\u043a\u0430</button>\n          <button class=\"tag-btn\" data-tag=\"\u0438\u043d\u0441\u0430\u0439\u0442\"       onclick=\"pickTag(this)\">\u0418\u043d\u0441\u0430\u0439\u0442</button>\n          <button class=\"tag-btn\" data-tag=\"\u0441\u0442\u0440\u0435\u0441\u0441\"       onclick=\"pickTag(this)\">\u0421\u0442\u0440\u0435\u0441\u0441</button>\n          <button class=\"tag-btn\" data-tag=\"\u0444\u043e\u043a\u0443\u0441\"        onclick=\"pickTag(this)\">\u0424\u043e\u043a\u0443\u0441</button>\n        </div>\n      </div>\n\n      <div class=\"field\" style=\"margin-bottom:12px\">\n        <label>\u0427\u0442\u043e \u043f\u0440\u043e\u0438\u0437\u043e\u0448\u043b\u043e \u0441\u0435\u0433\u043e\u0434\u043d\u044f?</label>\n        <textarea id=\"d-happened\" rows=\"3\" placeholder=\"\u041e\u043f\u0438\u0441\u0430\u043d\u0438\u0435 \u0442\u043e\u0440\u0433\u043e\u0432\u043e\u0433\u043e \u0434\u043d\u044f, \u0441\u0434\u0435\u043b\u043e\u043a, \u0441\u043e\u0431\u044b\u0442\u0438\u0439\u2026\"></textarea>\n      </div>\n      <div class=\"field\" style=\"margin-bottom:12px\">\n        <label>\u0427\u0442\u043e \u0441\u0434\u0435\u043b\u0430\u043b \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u043e?</label>\n        <textarea id=\"d-good\" rows=\"2\" placeholder=\"\u0421\u0438\u043b\u044c\u043d\u044b\u0435 \u0441\u0442\u043e\u0440\u043e\u043d\u044b \u0441\u0435\u0433\u043e\u0434\u043d\u044f\u2026\"></textarea>\n      </div>\n      <div class=\"field\" style=\"margin-bottom:12px\">\n        <label>\u0427\u0442\u043e \u043c\u043e\u0436\u043d\u043e \u0443\u043b\u0443\u0447\u0448\u0438\u0442\u044c?</label>\n        <textarea id=\"d-improve\" rows=\"2\" placeholder=\"\u041d\u0430\u0434 \u0447\u0435\u043c \u0440\u0430\u0431\u043e\u0442\u0430\u0442\u044c\u2026\"></textarea>\n      </div>\n      <div class=\"field\" style=\"margin-bottom:16px\">\n        <label>\u0423\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430 \u043d\u0430 \u0437\u0430\u0432\u0442\u0440\u0430</label>\n        <textarea id=\"d-tomorrow\" rows=\"2\" placeholder=\"\u041f\u0440\u0430\u0432\u0438\u043b\u043e \u0438\u043b\u0438 \u043c\u044b\u0441\u043b\u044c \u043d\u0430 \u0441\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0439 \u0434\u0435\u043d\u044c\u2026\"></textarea>\n      </div>\n      <button class=\"btn-primary\" onclick=\"saveEntry()\">\u0421\u043e\u0445\u0440\u0430\u043d\u0438\u0442\u044c \u0437\u0430\u043f\u0438\u0441\u044c</button>\n    </div>\n  </div>\n\n  <div id=\"tab-feed\" style=\"display:none\">\n    <div style=\"margin-bottom:12px\">\n      <input type=\"text\" id=\"d-search\" placeholder=\"\u041f\u043e\u0438\u0441\u043a \u043f\u043e \u0442\u0435\u043a\u0441\u0442\u0443 \u0438\u043b\u0438 \u0442\u0435\u0433\u0443\u2026\" oninput=\"renderFeed()\">\n    </div>\n    <div id=\"diary-feed\"></div>\n  </div>\n</div>\n\n<script>\nvar entries = [];\nvar selectedEmotion = '';\nvar selectedTags = [];\n\nvar EL = {calm:'\u0421\u043f\u043e\u043a\u043e\u0439\u0441\u0442\u0432\u0438\u0435', fear:'\u0421\u0442\u0440\u0430\u0445', greed:'\u0416\u0430\u0434\u043d\u043e\u0441\u0442\u044c', fomo:'FOMO', revenge:'\u041c\u0435\u0441\u0442\u044c \u0440\u044b\u043d\u043a\u0443'};\nvar MARKETS = {bull:'\u0411\u044b\u0447\u0438\u0439', bear:'\u041c\u0435\u0434\u0432\u0435\u0436\u0438\u0439', range:'\u0411\u043e\u043a\u043e\u0432\u0438\u043a', volatile:'\u0412\u043e\u043b\u0430\u0442\u0438\u043b\u044c\u043d\u044b\u0439'};\n\nfunction loadEntries() {\n  try { var s = localStorage.getItem('diary_v1'); if (s) entries = JSON.parse(s); } catch(e) {}\n  setDefaultDate();\n}\nfunction saveEntries() { localStorage.setItem('diary_v1', JSON.stringify(entries)); }\n\nfunction setDefaultDate() {\n  var n = new Date();\n  var y = n.getFullYear(), mo = String(n.getMonth()+1).padStart(2,'0'), d = String(n.getDate()).padStart(2,'0');\n  document.getElementById('d-date').value = y+'-'+mo+'-'+d;\n}\n\nfunction goTab(t) {\n  document.getElementById('tab-write').style.display = t === 'write' ? '' : 'none';\n  document.getElementById('tab-feed').style.display  = t === 'feed'  ? '' : 'none';\n  document.getElementById('tbw').classList.toggle('active', t === 'write');\n  document.getElementById('tbf').classList.toggle('active', t === 'feed');\n  if (t === 'feed') renderFeed();\n}\n\nfunction pickEmotion(btn) {\n  var grid = document.querySelector('.emotion-grid');\n  grid.querySelectorAll('.ebtn').forEach(function(b) { b.classList.remove('active'); });\n  btn.classList.add('active');\n  selectedEmotion = btn.getAttribute('data-e');\n}\n\nfunction pickTag(btn) {\n  btn.classList.toggle('active');\n  selectedTags = [];\n  document.querySelectorAll('.tag-btn.active').forEach(function(b) { selectedTags.push(b.getAttribute('data-tag')); });\n}\n\nfunction saveEntry() {\n  var date = document.getElementById('d-date').value;\n  if (!date) { alert('\u0423\u043a\u0430\u0436\u0438 \u0434\u0430\u0442\u0443'); return; }\n  var happened = document.getElementById('d-happened').value;\n  var good     = document.getElementById('d-good').value;\n  var improve  = document.getElementById('d-improve').value;\n  var tomorrow = document.getElementById('d-tomorrow').value;\n  if (!happened && !good && !improve && !tomorrow) { alert('\u0414\u043e\u0431\u0430\u0432\u044c \u0445\u043e\u0442\u044f \u0431\u044b \u043e\u0434\u043d\u0443 \u0437\u0430\u043c\u0435\u0442\u043a\u0443'); return; }\n  var entry = {\n    id: Date.now(), date: date,\n    emotion: selectedEmotion,\n    market: document.getElementById('d-market').value,\n    tags: selectedTags.slice(),\n    happened: happened, good: good, improve: improve, tomorrow: tomorrow\n  };\n  entries.unshift(entry);\n  saveEntries();\n  document.getElementById('d-happened').value = '';\n  document.getElementById('d-good').value = '';\n  document.getElementById('d-improve').value = '';\n  document.getElementById('d-tomorrow').value = '';\n  document.getElementById('d-market').value = '';\n  document.querySelectorAll('.ebtn').forEach(function(b) { b.classList.remove('active'); });\n  document.querySelectorAll('.tag-btn').forEach(function(b) { b.classList.remove('active'); });\n  selectedEmotion = '';\n  selectedTags = [];\n  setDefaultDate();\n  alert('\u0417\u0430\u043f\u0438\u0441\u044c \u0441\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u0430!');\n}\n\nfunction deleteEntry(id) {\n  if (!confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u0437\u0430\u043f\u0438\u0441\u044c?')) return;\n  entries = entries.filter(function(e) { return e.id !== id; });\n  saveEntries();\n  renderFeed();\n}\n\nfunction toggleDiary(id) {\n  var card = document.getElementById('de-' + id);\n  if (card) card.classList.toggle('open');\n}\n\nfunction renderFeed() {\n  var el = document.getElementById('diary-feed');\n  var q = (document.getElementById('d-search').value || '').toLowerCase();\n  var fe = entries;\n  if (q) {\n    fe = entries.filter(function(e) {\n      var text = (e.happened + ' ' + e.good + ' ' + e.improve + ' ' + e.tomorrow + ' ' + e.tags.join(' ')).toLowerCase();\n      return text.indexOf(q) !== -1;\n    });\n  }\n  if (!entries.length) { el.innerHTML = '<div class=\"empty-state\">\u0417\u0430\u043f\u0438\u0441\u0435\u0439 \u043f\u043e\u043a\u0430 \u043d\u0435\u0442</div>'; return; }\n  if (!fe.length) { el.innerHTML = '<div class=\"empty-state\">\u041d\u0438\u0447\u0435\u0433\u043e \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u043e</div>'; return; }\n\n  var html = '';\n  for (var i = 0; i < fe.length; i++) {\n    var e = fe[i];\n    var d = new Date(e.date);\n    var dl = d.toLocaleDateString('ru-RU', {weekday:'long', day:'numeric', month:'long'});\n    var emotionLabel = e.emotion ? EL[e.emotion] || e.emotion : '';\n    var marketLabel  = e.market  ? (MARKETS[e.market] || '') : '';\n    var tagsStr = e.tags && e.tags.length ? e.tags.map(function(t){return '#'+t;}).join(' ') : '';\n    var metaParts = [];\n    if (emotionLabel) metaParts.push(emotionLabel);\n    if (marketLabel)  metaParts.push(marketLabel);\n    if (tagsStr)      metaParts.push(tagsStr);\n    var metaStr = metaParts.join(' &nbsp;\u00b7&nbsp; ');\n\n    html += '<div class=\"diary-card\" id=\"de-' + e.id + '\">';\n    html += '<div class=\"diary-header\" onclick=\"toggleDiary(' + e.id + ')\">';\n    html += '<div style=\"flex:1;min-width:0\">';\n    html += '<div class=\"diary-date\">' + dl + '</div>';\n    html += '<div class=\"diary-meta\">' + metaStr + '</div>';\n    html += '</div>';\n    html += '<button class=\"del-diary-btn\" onclick=\"event.stopPropagation();deleteEntry(' + e.id + ')\">\u0423\u0434\u0430\u043b\u0438\u0442\u044c</button>';\n    html += '<span class=\"dchev\">&#9660;</span>';\n    html += '</div>';\n    html += '<div class=\"diary-body\">';\n    if (e.happened) {\n      html += '<div class=\"entry-block\"><div class=\"entry-label\">\u0427\u0442\u043e \u043f\u0440\u043e\u0438\u0437\u043e\u0448\u043b\u043e</div>';\n      html += '<div class=\"entry-text\">' + e.happened.replace(/\\n/g,'<br>') + '</div></div>';\n    }\n    if (e.good) {\n      html += '<div class=\"entry-block\"><div class=\"entry-label\" style=\"color:var(--green-tx)\">\u041f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u043e</div>';\n      html += '<div class=\"entry-text\" style=\"color:var(--green-tx)\">' + e.good.replace(/\\n/g,'<br>') + '</div></div>';\n    }\n    if (e.improve) {\n      html += '<div class=\"entry-block\"><div class=\"entry-label\" style=\"color:var(--amber-tx)\">\u0423\u043b\u0443\u0447\u0448\u0438\u0442\u044c</div>';\n      html += '<div class=\"entry-text\" style=\"color:var(--amber-tx)\">' + e.improve.replace(/\\n/g,'<br>') + '</div></div>';\n    }\n    if (e.tomorrow) {\n      html += '<div class=\"entry-block\"><div class=\"entry-label\" style=\"color:var(--blue-tx)\">\u041d\u0430 \u0437\u0430\u0432\u0442\u0440\u0430</div>';\n      html += '<div class=\"entry-text\" style=\"color:var(--blue-tx)\">' + e.tomorrow.replace(/\\n/g,'<br>') + '</div></div>';\n    }\n    html += '</div></div>';\n  }\n  el.innerHTML = html;\n}\n\nloadEntries();\n<\/script>\n</body>\n</html>";
  tools[7] = "<!DOCTYPE html>\n<html lang=\"ru\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>\u0412\u043e\u0442\u0447\u043b\u0438\u0441\u0442</title>\n<style>\n\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n:root {\n  --bg:#f0efe9; --surface:#ffffff; --surf2:#f5f4f0; --surf3:#eae9e3;\n  --text:#1a1a18; --text2:#6b6b67; --text3:#9a9a96;\n  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.17);\n  --radius:10px; --radius-lg:14px;\n  --font:'Times New Roman',Times,Georgia,serif;\n  --mono:'Courier New',Courier,monospace;\n  --green-bg:#C0DD97; --green-bd:#639922; --green-tx:#27500A;\n  --red-bg:#F7C1C1;   --red-bd:#E24B4A;   --red-tx:#791F1F;\n  --amber-bg:#FAC775; --amber-bd:#EF9F27; --amber-tx:#633806;\n  --blue-bg:#B5D4F4;  --blue-bd:#378ADD;  --blue-tx:#0C447C;\n  --purple-bg:#CECBF6;--purple-bd:#7F77DD;--purple-tx:#26215C;\n  --pos:#27500A; --neg:#791F1F;\n}\nbody{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;min-height:100vh;padding:28px 16px;}\n.page{max-width:860px;margin:0 auto;}\n.page-wide{max-width:1060px;margin:0 auto;}\nh1{font-size:28px;font-weight:700;letter-spacing:-0.01em;margin-bottom:4px;}\n.subtitle{font-size:14px;color:var(--text2);margin-bottom:24px;}\n.section-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;}\n.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:18px 20px;}\n.card+.card{margin-top:12px;}\n.card-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid var(--border);}\n.metric-grid{display:grid;gap:8px;margin-bottom:18px;}\n.mg-4{grid-template-columns:repeat(4,1fr);} .mg-3{grid-template-columns:repeat(3,1fr);} .mg-2{grid-template-columns:repeat(2,1fr);}\n.metric{background:var(--surf2);border-radius:var(--radius);padding:12px 14px;}\n.metric-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}\n.metric-value{font-size:20px;font-weight:700;font-family:var(--mono);}\n.pos{color:var(--pos);} .neg{color:var(--neg);} .blue{color:var(--blue-tx);} .amber{color:var(--amber-tx);}\n.tabs-bar{display:flex;gap:2px;background:var(--surf2);border-radius:var(--radius);padding:3px;margin-bottom:18px;}\n.tab-btn{flex:1;padding:9px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;background:none;border:none;color:var(--text2);border-radius:8px;font-family:var(--font);transition:all .15s;}\n.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}\n.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}\n.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}\n.field{display:flex;flex-direction:column;gap:4px;}\n.field.full{grid-column:span 2;} .field.full3{grid-column:span 3;}\n.field label{font-size:12px;color:var(--text2);}\ninput[type=text],input[type=number],input[type=datetime-local],input[type=date],select,textarea{width:100%;padding:9px 11px;background:var(--surf2);border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s;}\ninput:focus,select:focus,textarea:focus{border-color:var(--text3);background:var(--surface);}\ntextarea{resize:vertical;min-height:56px;}\ninput[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--surf3);border-radius:2px;outline:none;border:none;cursor:pointer;}\ninput[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--surface);}\n.btn-primary{width:100%;padding:11px;background:var(--text);color:var(--surface);border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s;}\n.btn-primary:hover{opacity:.82;}\n.btn-secondary{padding:8px 16px;background:none;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s;}\n.btn-secondary:hover{border-color:var(--text);color:var(--text);}\n.toggle-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}\n.toggle-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}\n.tbtn{padding:10px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surf2);color:var(--text2);text-align:center;font-family:var(--font);transition:all .15s;}\n.tbtn:hover{border-color:var(--text3);color:var(--text);}\n.tbtn.a-green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);font-weight:700;}\n.tbtn.a-red{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);font-weight:700;}\n.tbtn.a-amber{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);font-weight:700;}\n.tbtn.a-blue{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);font-weight:700;}\n.tbtn.a-dark{background:var(--text);color:var(--surface);border-color:var(--text);font-weight:700;}\n.badge{display:inline-block;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700;}\n.b-green{background:var(--green-bg);color:var(--green-tx);}\n.b-red{background:var(--red-bg);color:var(--red-tx);}\n.b-amber{background:var(--amber-bg);color:var(--amber-tx);}\n.b-blue{background:var(--blue-bg);color:var(--blue-tx);}\n.b-purple{background:var(--purple-bg);color:var(--purple-tx);}\n.table-wrap{overflow-x:auto;}\ntable{width:100%;border-collapse:collapse;font-size:13px;}\nthead th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;border-bottom:0.5px solid var(--border2);}\ntbody td{padding:9px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle;}\ntbody tr:last-child td{border-bottom:none;}\ntbody tr:hover td{background:var(--surf2);}\n.divider{height:0.5px;background:var(--border2);margin:16px 0;}\n.mono{font-family:var(--mono);}\n.empty-state{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:15px;}\n.chart-wrap{position:relative;width:100%;height:240px;margin:10px 0;}\n.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;}\n.detail-row:last-child{border-bottom:none;}\n.detail-label{color:var(--text2);}\n.detail-val{font-family:var(--mono);font-weight:700;}\n.verdict{padding:12px 16px;font-size:14px;margin-bottom:18px;border-left:3px solid;line-height:1.6;border-radius:0 var(--radius) var(--radius) 0;}\n.v-profit{border-color:var(--green-bd);background:var(--green-bg);color:var(--green-tx);}\n.v-loss{border-color:var(--red-bd);background:var(--red-bg);color:var(--red-tx);}\n.v-neutral{border-color:var(--text3);background:var(--surf2);color:var(--text2);}\n.v-partial{border-color:var(--amber-bd);background:var(--amber-bg);color:var(--amber-tx);}\n.insight-box{background:var(--surf2);border:0.5px solid var(--border);border-radius:var(--radius);padding:2px 14px;margin-top:6px;}\n.insight-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px;}\n.insight-row:last-child{border-bottom:none;}\n@media(max-width:560px){.mg-4,.mg-3{grid-template-columns:1fr 1fr;}.form-grid,.form-grid-3{grid-template-columns:1fr;}.field.full,.field.full3{grid-column:span 1;}}\n\n.ss-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}\n.ss-btn{padding:10px 4px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surf2);color:var(--text2);text-align:center;font-family:var(--font);transition:all .15s;}\n.ss-btn:hover{border-color:var(--text3);color:var(--text);}\n.ss-btn.s-watch{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);font-weight:700;}\n.ss-btn.s-ready{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);font-weight:700;}\n.ss-btn.s-active{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);font-weight:700;}\n.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}\n.fb{padding:6px 14px;font-size:12px;font-weight:600;border:0.5px solid var(--border2);border-radius:99px;cursor:pointer;background:none;color:var(--text2);font-family:var(--font);transition:all .15s;}\n.fb:hover{border-color:var(--text3);color:var(--text);}\n.fb.active{background:var(--text);color:var(--surface);border-color:var(--text);}\n.wl-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;}\n.wl-header{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none;transition:background .1s;}\n.wl-header:hover{background:var(--surf2);}\n.wl-body{display:none;padding:0 16px 14px;border-top:0.5px solid var(--border);}\n.wl-card.open .wl-body{display:block;}\n.wl-card.open .wchev{transform:rotate(180deg);}\n.wchev{font-size:10px;color:var(--text3);margin-left:auto;transition:transform .2s;flex-shrink:0;}\n.wl-name{font-size:16px;font-weight:700;}\n.wl-sub{font-size:12px;color:var(--text2);margin-top:2px;}\n.wl-del-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:12px;padding:4px 10px;font-family:var(--font);transition:all .15s;flex-shrink:0;}\n.wl-del-btn:hover{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-bd);}\n.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}\n.level-box{background:var(--surf2);border-radius:var(--radius);padding:8px 12px;font-size:13px;display:flex;justify-content:space-between;}\n.level-name{color:var(--text2);}\n.level-val{font-family:var(--mono);font-weight:700;}\n</style>\n</head>\n<body>\n<div class=\"page\">\n  <h1>\u0412\u043e\u0442\u0447\u043b\u0438\u0441\u0442</h1>\n  <p class=\"subtitle\">\u0418\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442\u044b, \u0443\u0440\u043e\u0432\u043d\u0438 \u0438 \u0437\u0430\u043c\u0435\u0442\u043a\u0438 \u0434\u043b\u044f \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u044f</p>\n  <div class=\"tabs-bar\">\n    <button class=\"tab-btn active\" id=\"tb-add\" onclick=\"goTab('add')\">\u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c</button>\n    <button class=\"tab-btn\" id=\"tb-list\" onclick=\"goTab('list')\">\u0421\u043f\u0438\u0441\u043e\u043a</button>\n  </div>\n\n  <!-- ADD TAB -->\n  <div id=\"tab-add\">\n    <div class=\"card\">\n      <div class=\"card-title\">\u041d\u043e\u0432\u044b\u0439 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442</div>\n      <div class=\"form-grid\" style=\"margin-bottom:12px\">\n        <div class=\"field\"><label>\u0418\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442</label><input type=\"text\" id=\"w-name\" placeholder=\"BTC/USD, AAPL\u2026\"></div>\n        <div class=\"field\"><label>\u041a\u0430\u0442\u0435\u0433\u043e\u0440\u0438\u044f</label>\n          <select id=\"w-cat\">\n            <option value=\"crypto\">\u041a\u0440\u0438\u043f\u0442\u043e</option>\n            <option value=\"stocks\">\u0410\u043a\u0446\u0438\u0438</option>\n            <option value=\"forex\">\u0424\u043e\u0440\u0435\u043a\u0441</option>\n            <option value=\"futures\">\u0424\u044c\u044e\u0447\u0435\u0440\u0441\u044b</option>\n            <option value=\"other\">\u0414\u0440\u0443\u0433\u043e\u0435</option>\n          </select>\n        </div>\n      </div>\n      <div class=\"field\" style=\"margin-bottom:12px\">\n        <label style=\"margin-bottom:6px\">\u0421\u0442\u0430\u0442\u0443\u0441</label>\n        <div class=\"ss-grid\">\n          <button class=\"ss-btn s-watch\" id=\"sw-watch\" onclick=\"setStatus('watch')\">&#128065; \u041d\u0430\u0431\u043b\u044e\u0434\u0430\u044e</button>\n          <button class=\"ss-btn\" id=\"sw-ready\" onclick=\"setStatus('ready')\">&#9889; \u0413\u043e\u0442\u043e\u0432 \u043a \u0432\u0445\u043e\u0434\u0443</button>\n          <button class=\"ss-btn\" id=\"sw-active\" onclick=\"setStatus('active')\">&#10003; \u0412 \u0441\u0434\u0435\u043b\u043a\u0435</button>\n        </div>\n      </div>\n      <div class=\"form-grid\" style=\"margin-bottom:12px\">\n        <div class=\"field\"><label>\u041f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430 ($)</label><input type=\"number\" id=\"w-sup\" placeholder=\"0.00\" step=\"any\"></div>\n        <div class=\"field\"><label>\u0421\u043e\u043f\u0440\u043e\u0442\u0438\u0432\u043b\u0435\u043d\u0438\u0435 ($)</label><input type=\"number\" id=\"w-res\" placeholder=\"0.00\" step=\"any\"></div>\n        <div class=\"field\"><label>\u0426\u0435\u043b\u044c 1 ($)</label><input type=\"number\" id=\"w-t1\" placeholder=\"0.00\" step=\"any\"></div>\n        <div class=\"field\"><label>\u0426\u0435\u043b\u044c 2 ($)</label><input type=\"number\" id=\"w-t2\" placeholder=\"0.00\" step=\"any\"></div>\n      </div>\n      <div class=\"field\" style=\"margin-bottom:16px\">\n        <label>\u0417\u0430\u043c\u0435\u0442\u043a\u0438 / \u0441\u0435\u0442\u0430\u043f</label>\n        <textarea id=\"w-notes\" rows=\"3\" placeholder=\"\u041f\u0440\u0438\u0447\u0438\u043d\u0430 \u043d\u0430\u0431\u043b\u044e\u0434\u0435\u043d\u0438\u044f, \u0443\u0441\u043b\u043e\u0432\u0438\u044f \u0432\u0445\u043e\u0434\u0430\u2026\"></textarea>\n      </div>\n      <button class=\"btn-primary\" onclick=\"addItem()\">\u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0432 \u0441\u043f\u0438\u0441\u043e\u043a</button>\n    </div>\n  </div>\n\n  <!-- LIST TAB -->\n  <div id=\"tab-list\" style=\"display:none\">\n    <div class=\"filter-row\">\n      <button class=\"fb active\" id=\"ff-all\"    onclick=\"setFilter('all',this)\">\u0412\u0441\u0435</button>\n      <button class=\"fb\" id=\"ff-watch\"  onclick=\"setFilter('watch',this)\">\u041d\u0430\u0431\u043b\u044e\u0434\u0430\u044e</button>\n      <button class=\"fb\" id=\"ff-ready\"  onclick=\"setFilter('ready',this)\">\u0413\u043e\u0442\u043e\u0432 \u043a \u0432\u0445\u043e\u0434\u0443</button>\n      <button class=\"fb\" id=\"ff-active\" onclick=\"setFilter('active',this)\">\u0412 \u0441\u0434\u0435\u043b\u043a\u0435</button>\n    </div>\n    <div id=\"wl-list\"></div>\n  </div>\n</div>\n\n<script>\nvar watchlist = [];\nvar newStatus = 'watch';\nvar wlFilter  = 'all';\n\nvar STATUS_LABEL = {watch:'\u041d\u0430\u0431\u043b\u044e\u0434\u0430\u044e', ready:'\u0413\u043e\u0442\u043e\u0432 \u043a \u0432\u0445\u043e\u0434\u0443', active:'\u0412 \u0441\u0434\u0435\u043b\u043a\u0435'};\nvar STATUS_BADGE = {watch:'b-blue', ready:'b-amber', active:'b-green'};\nvar CAT_LABEL    = {crypto:'\u041a\u0440\u0438\u043f\u0442\u043e', stocks:'\u0410\u043a\u0446\u0438\u0438', forex:'\u0424\u043e\u0440\u0435\u043a\u0441', futures:'\u0424\u044c\u044e\u0447\u0435\u0440\u0441\u044b', other:'\u0414\u0440\u0443\u0433\u043e\u0435'};\n\nfunction loadWL() {\n  try { var s = localStorage.getItem('watchlist_v1'); if (s) watchlist = JSON.parse(s); } catch(e) {}\n}\nfunction saveWL() { localStorage.setItem('watchlist_v1', JSON.stringify(watchlist)); }\n\nfunction goTab(t) {\n  document.getElementById('tab-add').style.display  = t === 'add'  ? '' : 'none';\n  document.getElementById('tab-list').style.display = t === 'list' ? '' : 'none';\n  document.getElementById('tb-add').classList.toggle('active', t === 'add');\n  document.getElementById('tb-list').classList.toggle('active', t === 'list');\n  if (t === 'list') renderList();\n}\n\nfunction setStatus(s) {\n  newStatus = s;\n  document.querySelectorAll('.ss-grid .ss-btn').forEach(function(b) {\n    b.className = 'ss-btn';\n  });\n  document.getElementById('sw-' + s).classList.add('s-' + s);\n}\n\nfunction setFilter(f, btn) {\n  wlFilter = f;\n  document.querySelectorAll('.filter-row .fb').forEach(function(b) { b.classList.remove('active'); });\n  btn.classList.add('active');\n  renderList();\n}\n\nfunction addItem() {\n  var name = (document.getElementById('w-name').value || '').trim();\n  if (!name) { alert('\u0423\u043a\u0430\u0436\u0438 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442'); return; }\n  var item = {\n    id: Date.now(), name: name,\n    cat: document.getElementById('w-cat').value,\n    status: newStatus,\n    sup: document.getElementById('w-sup').value,\n    res: document.getElementById('w-res').value,\n    t1:  document.getElementById('w-t1').value,\n    t2:  document.getElementById('w-t2').value,\n    notes: document.getElementById('w-notes').value,\n    date: new Date().toLocaleDateString('ru-RU')\n  };\n  watchlist.unshift(item);\n  saveWL();\n  document.getElementById('w-name').value  = '';\n  document.getElementById('w-sup').value   = '';\n  document.getElementById('w-res').value   = '';\n  document.getElementById('w-t1').value    = '';\n  document.getElementById('w-t2').value    = '';\n  document.getElementById('w-notes').value = '';\n  alert(name + ' \u0434\u043e\u0431\u0430\u0432\u043b\u0435\u043d \u0432 \u0432\u043e\u0442\u0447\u043b\u0438\u0441\u0442!');\n}\n\nfunction deleteItem(id) {\n  if (!confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u0438\u0437 \u0432\u043e\u0442\u0447\u043b\u0438\u0441\u0442\u0430?')) return;\n  watchlist = watchlist.filter(function(w) { return w.id !== id; });\n  saveWL();\n  renderList();\n}\n\nfunction changeStatus(id, s) {\n  var w = watchlist.find(function(x) { return x.id === id; });\n  if (w) { w.status = s; saveWL(); renderList(); }\n}\n\nfunction toggleWlCard(id) {\n  var c = document.getElementById('wlc-' + id);\n  if (c) c.classList.toggle('open');\n}\n\nfunction renderList() {\n  var el = document.getElementById('wl-list');\n  var fw = wlFilter === 'all' ? watchlist : watchlist.filter(function(w) { return w.status === wlFilter; });\n\n  if (!watchlist.length) {\n    el.innerHTML = '<div class=\"empty-state\">\u0421\u043f\u0438\u0441\u043e\u043a \u043f\u0443\u0441\u0442 &mdash; \u0434\u043e\u0431\u0430\u0432\u044c \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442\u044b</div>';\n    return;\n  }\n  if (!fw.length) {\n    el.innerHTML = '<div class=\"empty-state\">\u041d\u0435\u0442 \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442\u043e\u0432 \u0441 \u0442\u0430\u043a\u0438\u043c \u0441\u0442\u0430\u0442\u0443\u0441\u043e\u043c</div>';\n    return;\n  }\n\n  var html = '';\n  for (var i = 0; i < fw.length; i++) {\n    var w = fw[i];\n    var badge = STATUS_BADGE[w.status] || 'b-blue';\n    var slabel = STATUS_LABEL[w.status] || w.status;\n    var cat = CAT_LABEL[w.cat] || w.cat;\n\n    html += '<div class=\"wl-card\" id=\"wlc-' + w.id + '\">';\n    html += '<div class=\"wl-header\" onclick=\"toggleWlCard(' + w.id + ')\">';\n    html += '<div style=\"flex:1;min-width:0\">';\n    html += '<div class=\"wl-name\">' + w.name + ' <span class=\"badge ' + badge + '\">' + slabel + '</span></div>';\n    html += '<div class=\"wl-sub\">' + cat + ' &nbsp;&middot;&nbsp; ' + w.date + '</div>';\n    html += '</div>';\n    html += '<button class=\"wl-del-btn\" onclick=\"event.stopPropagation();deleteItem(' + w.id + ')\">\u0423\u0434\u0430\u043b\u0438\u0442\u044c</button>';\n    html += '<span class=\"wchev\">&#9660;</span>';\n    html += '</div>';\n    html += '<div class=\"wl-body\">';\n\n    // status change buttons\n    html += '<div class=\"ss-grid\" style=\"margin:12px 0 14px\">';\n    html += '<button class=\"ss-btn ' + (w.status==='watch'?'s-watch':'') + '\" onclick=\"changeStatus(' + w.id + ',\\'watch\\')\">&#128065; \u041d\u0430\u0431\u043b\u044e\u0434\u0430\u044e</button>';\n    html += '<button class=\"ss-btn ' + (w.status==='ready'?'s-ready':'') + '\" onclick=\"changeStatus(' + w.id + ',\\'ready\\')\">&#9889; \u0413\u043e\u0442\u043e\u0432</button>';\n    html += '<button class=\"ss-btn ' + (w.status==='active'?'s-active':'') + '\" onclick=\"changeStatus(' + w.id + ',\\'active\\')\">&#10003; \u0412 \u0441\u0434\u0435\u043b\u043a\u0435</button>';\n    html += '</div>';\n\n    // levels\n    var hasLevels = w.sup || w.res || w.t1 || w.t2;\n    if (hasLevels) {\n      html += '<div class=\"level-grid\">';\n      if (w.sup) html += '<div class=\"level-box\"><span class=\"level-name\" style=\"color:var(--green-tx)\">\u041f\u043e\u0434\u0434\u0435\u0440\u0436\u043a\u0430</span><span class=\"level-val\">$' + w.sup + '</span></div>';\n      if (w.res) html += '<div class=\"level-box\"><span class=\"level-name\" style=\"color:var(--red-tx)\">\u0421\u043e\u043f\u0440\u043e\u0442\u0438\u0432\u043b\u0435\u043d\u0438\u0435</span><span class=\"level-val\">$' + w.res + '</span></div>';\n      if (w.t1)  html += '<div class=\"level-box\"><span class=\"level-name\" style=\"color:var(--blue-tx)\">\u0426\u0435\u043b\u044c 1</span><span class=\"level-val\">$' + w.t1 + '</span></div>';\n      if (w.t2)  html += '<div class=\"level-box\"><span class=\"level-name\" style=\"color:var(--blue-tx)\">\u0426\u0435\u043b\u044c 2</span><span class=\"level-val\">$' + w.t2 + '</span></div>';\n      html += '</div>';\n    }\n    if (w.notes) {\n      html += '<p class=\"section-label\">\u0417\u0430\u043c\u0435\u0442\u043a\u0438</p>';\n      html += '<p style=\"font-size:14px;line-height:1.7\">' + w.notes.replace(/\\n/g,'<br>') + '</p>';\n    }\n    html += '</div></div>';\n  }\n  el.innerHTML = html;\n}\n\nloadWL();\n<\/script>\n</body>\n</html>";
  tools[8] = "<!DOCTYPE html><html lang=\"ru\"><head>\n<meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>\u0421\u0442\u0430\u0442\u0438\u0441\u0442\u0438\u043a\u0430</title>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js\"><\/script>\n<style>\n\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n:root {\n  --bg:#f0efe9; --surface:#ffffff; --surf2:#f5f4f0; --surf3:#eae9e3;\n  --text:#1a1a18; --text2:#6b6b67; --text3:#9a9a96;\n  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.17);\n  --radius:10px; --radius-lg:14px;\n  --font:'Times New Roman',Times,Georgia,serif;\n  --mono:'Courier New',Courier,monospace;\n  --green-bg:#C0DD97; --green-bd:#639922; --green-tx:#27500A;\n  --red-bg:#F7C1C1;   --red-bd:#E24B4A;   --red-tx:#791F1F;\n  --amber-bg:#FAC775; --amber-bd:#EF9F27; --amber-tx:#633806;\n  --blue-bg:#B5D4F4;  --blue-bd:#378ADD;  --blue-tx:#0C447C;\n  --purple-bg:#CECBF6;--purple-bd:#7F77DD;--purple-tx:#26215C;\n  --pos:#27500A; --neg:#791F1F;\n}\nbody{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;min-height:100vh;padding:28px 16px;}\n.page{max-width:860px;margin:0 auto;}\n.page-wide{max-width:1060px;margin:0 auto;}\nh1{font-size:28px;font-weight:700;letter-spacing:-0.01em;margin-bottom:4px;}\n.subtitle{font-size:14px;color:var(--text2);margin-bottom:24px;}\n.section-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;}\n.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:18px 20px;}\n.card+.card{margin-top:12px;}\n.card-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid var(--border);}\n.metric-grid{display:grid;gap:8px;margin-bottom:18px;}\n.mg-4{grid-template-columns:repeat(4,1fr);} .mg-3{grid-template-columns:repeat(3,1fr);} .mg-2{grid-template-columns:repeat(2,1fr);}\n.metric{background:var(--surf2);border-radius:var(--radius);padding:12px 14px;}\n.metric-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}\n.metric-value{font-size:20px;font-weight:700;font-family:var(--mono);}\n.pos{color:var(--pos);} .neg{color:var(--neg);} .blue{color:var(--blue-tx);} .amber{color:var(--amber-tx);}\n.tabs-bar{display:flex;gap:2px;background:var(--surf2);border-radius:var(--radius);padding:3px;margin-bottom:18px;}\n.tab-btn{flex:1;padding:9px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;background:none;border:none;color:var(--text2);border-radius:8px;font-family:var(--font);transition:all .15s;}\n.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}\n.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}\n.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}\n.field{display:flex;flex-direction:column;gap:4px;}\n.field.full{grid-column:span 2;} .field.full3{grid-column:span 3;}\n.field label{font-size:12px;color:var(--text2);}\ninput[type=text],input[type=number],input[type=datetime-local],input[type=date],select,textarea{width:100%;padding:9px 11px;background:var(--surf2);border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s;}\ninput:focus,select:focus,textarea:focus{border-color:var(--text3);background:var(--surface);}\ntextarea{resize:vertical;min-height:56px;}\ninput[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--surf3);border-radius:2px;outline:none;border:none;cursor:pointer;}\ninput[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--surface);}\n.btn-primary{width:100%;padding:11px;background:var(--text);color:var(--surface);border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s;}\n.btn-primary:hover{opacity:.82;}\n.btn-secondary{padding:8px 16px;background:none;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s;}\n.btn-secondary:hover{border-color:var(--text);color:var(--text);}\n.toggle-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}\n.toggle-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}\n.tbtn{padding:10px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surf2);color:var(--text2);text-align:center;font-family:var(--font);transition:all .15s;}\n.tbtn:hover{border-color:var(--text3);color:var(--text);}\n.tbtn.a-green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);font-weight:700;}\n.tbtn.a-red{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);font-weight:700;}\n.tbtn.a-amber{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);font-weight:700;}\n.tbtn.a-blue{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);font-weight:700;}\n.tbtn.a-dark{background:var(--text);color:var(--surface);border-color:var(--text);font-weight:700;}\n.badge{display:inline-block;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700;}\n.b-green{background:var(--green-bg);color:var(--green-tx);}\n.b-red{background:var(--red-bg);color:var(--red-tx);}\n.b-amber{background:var(--amber-bg);color:var(--amber-tx);}\n.b-blue{background:var(--blue-bg);color:var(--blue-tx);}\n.b-purple{background:var(--purple-bg);color:var(--purple-tx);}\n.table-wrap{overflow-x:auto;}\ntable{width:100%;border-collapse:collapse;font-size:13px;}\nthead th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;border-bottom:0.5px solid var(--border2);}\ntbody td{padding:9px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle;}\ntbody tr:last-child td{border-bottom:none;}\ntbody tr:hover td{background:var(--surf2);}\n.divider{height:0.5px;background:var(--border2);margin:16px 0;}\n.mono{font-family:var(--mono);}\n.empty-state{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:15px;}\n.chart-wrap{position:relative;width:100%;height:240px;margin:10px 0;}\n.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;}\n.detail-row:last-child{border-bottom:none;}\n.detail-label{color:var(--text2);}\n.detail-val{font-family:var(--mono);font-weight:700;}\n.verdict{padding:12px 16px;font-size:14px;margin-bottom:18px;border-left:3px solid;line-height:1.6;border-radius:0 var(--radius) var(--radius) 0;}\n.v-profit{border-color:var(--green-bd);background:var(--green-bg);color:var(--green-tx);}\n.v-loss{border-color:var(--red-bd);background:var(--red-bg);color:var(--red-tx);}\n.v-neutral{border-color:var(--text3);background:var(--surf2);color:var(--text2);}\n.v-partial{border-color:var(--amber-bd);background:var(--amber-bg);color:var(--amber-tx);}\n.insight-box{background:var(--surf2);border:0.5px solid var(--border);border-radius:var(--radius);padding:2px 14px;margin-top:6px;}\n.insight-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px;}\n.insight-row:last-child{border-bottom:none;}\n@media(max-width:560px){.mg-4,.mg-3{grid-template-columns:1fr 1fr;}.form-grid,.form-grid-3{grid-template-columns:1fr;}.field.full,.field.full3{grid-column:span 1;}}\n\n.stat-hero{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:24px;margin-bottom:18px;text-align:center;}\n.stat-hero-num{font-size:48px;font-weight:700;font-family:var(--mono);line-height:1;}\n.stat-hero-label{font-size:13px;color:var(--text2);margin-top:6px;}\n.top-list{display:flex;flex-direction:column;gap:4px;}\n.top-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surf2);border-radius:var(--radius);font-size:13px;}\n.top-item-rank{font-size:11px;font-weight:700;color:var(--text3);min-width:20px;font-family:var(--mono);}\n.top-item-bar{flex:1;height:4px;background:var(--surf3);border-radius:2px;overflow:hidden;}\n.top-item-fill{height:100%;border-radius:2px;}\n</style></head><body>\n<div class=\"page\">\n  <h1>\u0421\u0442\u0430\u0442\u0438\u0441\u0442\u0438\u043a\u0430</h1>\n  <p class=\"subtitle\">\u0421\u0432\u043e\u0434\u043d\u044b\u0439 \u0430\u043d\u0430\u043b\u0438\u0437 \u0432\u0441\u0435\u0445 \u0442\u0432\u043e\u0438\u0445 \u0434\u0430\u043d\u043d\u044b\u0445</p>\n  <div id=\"stats-container\"></div>\n</div>\n<script>\nlet charts=[];\nfunction fmt(n,d=2){return n.toLocaleString('ru-RU',{minimumFractionDigits:d,maximumFractionDigits:d});}\nfunction loadAll(){\n  let trades=[],periods=[],diary=[],watchlist=[];\n  try{const s=localStorage.getItem('tj_v3');if(s)trades=JSON.parse(s);}catch(e){}\n  try{const s=localStorage.getItem('tj_periods');if(s)periods=JSON.parse(s);}catch(e){}\n  try{const s=localStorage.getItem('diary_v1');if(s)diary=JSON.parse(s);}catch(e){}\n  try{const s=localStorage.getItem('watchlist_v1');if(s)watchlist=JSON.parse(s);}catch(e){}\n  return{trades,periods,diary,watchlist};\n}\nfunction render(){\n  charts.forEach(c=>c.destroy());charts=[];\n  const{trades,periods,diary,watchlist}=loadAll();\n  const el=document.getElementById('stats-container');\n  if(!trades.length&&!diary.length&&!watchlist.length){el.innerHTML='<div class=\"empty-state\" style=\"padding:4rem 1rem\">\u0414\u0430\u043d\u043d\u044b\u0445 \u043f\u043e\u043a\u0430 \u043d\u0435\u0442.<br>\u041d\u0430\u0447\u043d\u0438 \u0432\u0435\u0441\u0442\u0438 \u0436\u0443\u0440\u043d\u0430\u043b, \u0434\u043d\u0435\u0432\u043d\u0438\u043a \u0438 \u0432\u043e\u0442\u0447\u043b\u0438\u0441\u0442.</div>';return;}\n  const wins=trades.filter(t=>t.pnl>0).length;\n  const totalPnl=trades.reduce((s,t)=>s+t.pnl,0);\n  const wr=trades.length?Math.round(wins/trades.length*100):0;\n  const avg=trades.length?totalPnl/trades.length:0;\n  const best=trades.length?trades.reduce((b,t)=>t.pnl>b.pnl?t:b,trades[0]):null;\n  const worst=trades.length?trades.reduce((b,t)=>t.pnl<b.pnl?t:b,trades[0]):null;\n  // by instrument\n  const byAsset={};trades.forEach(t=>{if(!byAsset[t.asset])byAsset[t.asset]={pnl:0,count:0,wins:0};byAsset[t.asset].pnl+=t.pnl;byAsset[t.asset].count++;if(t.pnl>0)byAsset[t.asset].wins++;});\n  const topAssets=Object.entries(byAsset).sort((a,b)=>Math.abs(b[1].pnl)-Math.abs(a[1].pnl)).slice(0,5);\n  const maxAbsPnl=topAssets.length?Math.max(...topAssets.map(([,v])=>Math.abs(v.pnl))):1;\n  // monthly\n  const byMonth={};trades.forEach(t=>{const m=(t.date||'').slice(0,7);if(m){if(!byMonth[m])byMonth[m]=0;byMonth[m]+=t.pnl;}});\n  const months=Object.keys(byMonth).sort();\n  const mData=months.map(m=>byMonth[m]);\n  // emotion breakdown\n  const bE={};trades.forEach(t=>{if(t.emotion){if(!bE[t.emotion])bE[t.emotion]={total:0,wins:0,pnl:0};bE[t.emotion].total++;if(t.pnl>0)bE[t.emotion].wins++;bE[t.emotion].pnl+=t.pnl;}});\n  const EL={calm:'\u0421\u043f\u043e\u043a\u043e\u0439\u0441\u0442\u0432\u0438\u0435',fear:'\u0421\u0442\u0440\u0430\u0445',greed:'\u0416\u0430\u0434\u043d\u043e\u0441\u0442\u044c',fomo:'FOMO',revenge:'\u041c\u0435\u0441\u0442\u044c'};\n  const avgMoodArr=diary.filter(e=>e.mood>0);const avgMood=avgMoodArr.length?(avgMoodArr.reduce((s,e)=>s+e.mood,0)/avgMoodArr.length).toFixed(1):null;\n  const MOODS={1:'\ud83d\ude30',2:'\ud83d\ude15',3:'\ud83d\ude10',4:'\ud83d\ude42',5:'\ud83d\ude0a'};\n  el.innerHTML=`\n  <div class=\"metric-grid mg-4\">\n    <div class=\"metric\"><div class=\"metric-label\">\u041
