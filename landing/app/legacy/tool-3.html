<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Таблица торговых решений</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f0efe9; --surface: #ffffff; --panel: #f5f4f0;
  --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.17); --text: #1a1e2e;
  --muted: #8892a4; --head-bg: #eae9e3;
  --buy: #27500A; --sell: #791F1F; --neutral: #633806; --accent: #0C447C;
  --hover: rgba(0,0,0,0.025);
  --hdr-bg: #eae9e3; --tf-bg: #eaecf0; --tf-color: var(--tf-color);
}
html.dark {
  --bg: #0b0e14; --surface: #111520; --panel: #161c2a;
  --border: #1f2d45; --border2: #253550; --text: #c8d8f0;
  --muted: #4a6080; --head-bg: #0d1520;
  --buy: #00e676; --sell: #ff3d5a; --neutral: #ffd740; --accent: #4488ff;
  --hover: rgba(255,255,255,0.025);
  --hdr-bg: #0a0f1a; --tf-bg: #0d1220; --tf-color: #7090b8;
}
body {
  background: var(--bg); font-family:'Courier New',Courier,monospace;
  min-height: 100vh; display: flex; align-items: flex-start;
  justify-content: center; padding: 32px 16px 80px; color: var(--text);
}
.container { width: 100%; max-width: 1100px; }

/* TOP BAR */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
}
.title { font-family:'Times New Roman',Times,Georgia,serif;font-weight:700; font-size: 26px; letter-spacing: .1em; color: var(--text); line-height: 1; }
.subtitle { font-size: 10px; letter-spacing: .14em; color: var(--muted); text-transform: uppercase; margin-top: 2px; }
.topbar-btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

#save-status { font-size: 10px; color: var(--muted); letter-spacing: .1em; min-width: 90px; text-align: right; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; border: 1px solid var(--border2);
  color: var(--muted); font-family:'Courier New',Courier,monospace;
  font-size: 10px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; padding: 8px 16px; cursor: pointer;
  transition: all .18s;
}
.btn:hover { border-color: var(--text); color: var(--text); }
.btn.green:hover { border-color: var(--buy); color: var(--buy); box-shadow: 0 0 10px rgba(22,163,74,.15); }
.btn.label-wrap { cursor: pointer; }

/* TABLE BLOCK */
.table-block { margin-bottom: 28px; animation: fadeUp .32s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

/* BLOCK HEADER */
.block-header {
  display: flex; align-items: center; gap: 10px;
  background: var(--hdr-bg); border: 1px solid var(--border2);
  border-bottom: none; padding: 10px 14px;
}
.block-num { font-family:'Times New Roman',Times,Georgia,serif;font-weight:700; font-size: 12px; color: var(--muted); letter-spacing: .14em; flex-shrink: 0; }
.block-title {
  flex: 1; background: transparent; border: none;
  border-bottom: 1px solid transparent; color: #2563eb;
  font-family:'Times New Roman',Times,Georgia,serif;font-weight:700; font-size: 14px;
  letter-spacing: .1em; outline: none; min-width: 0;
  transition: border-color .2s; padding-bottom: 1px;
}
.block-title:focus { border-bottom-color: var(--accent); }
.block-title::placeholder { color: var(--muted); }
.block-header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.date-inp {
  background: var(--panel); border: 1px solid var(--border2); color: var(--text);
  font-family:'Courier New',Courier,monospace; font-size: 11px;
  padding: 4px 9px; outline: none; cursor: pointer; transition: border-color .2s;
}
.date-inp:focus { border-color: var(--accent); }
.icon-btn {
  background: transparent; border: 1px solid var(--border2); color: var(--muted);
  font-size: 13px; width: 28px; height: 28px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; transition: all .15s;
  font-family:'Courier New',Courier,monospace; line-height: 1; flex-shrink: 0;
}
.icon-btn.col-btn:hover { border-color: var(--neutral); color: var(--neutral); }
.icon-btn.del-btn:hover { border-color: var(--sell); color: var(--sell); }

/* COLLAPSED */
.table-block.collapsed .block-body { display: none; }
.table-block.collapsed .block-header { border-bottom: 1px solid var(--border2); opacity: .6; }
.table-block.collapsed .col-btn { color: var(--neutral); border-color: rgba(255,215,64,.4); }

/* TABLE */
.table-wrap { border: 1px solid var(--border2); background: var(--surface); overflow-x: auto; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
table { width: 100%; border-collapse: collapse; min-width: 800px; }

.th-cols th {
  background: var(--head-bg); padding: 8px 10px; font-size: 9px; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase; color: var(--muted);
  border-right: 1px solid var(--border); border-bottom: 2px solid var(--border2);
  text-align: center; white-space: nowrap;
}
.th-cols th:first-child { text-align: center; padding-left: 0; width: 64px; background: var(--tf-bg); }
.th-cols th:last-child { border-right: none; }

.data-row td { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 0; text-align: center; vertical-align: middle; transition: background .15s; }
.data-row:hover td { background: var(--hover); }
.data-row td:last-child { border-right: none; }

.tf-cell { padding: 0; font-size: 12px; font-weight: 700; letter-spacing: .1em; color: var(--tf-color); text-align: center !important; background: var(--tf-bg) !important; border-right: 2px solid var(--border2) !important; white-space: nowrap; }

/* +/- CELL */
.check-cell { width: 52px; height: 48px; cursor: pointer; user-select: none; transition: background .15s; }
.check-cell:hover { background: rgba(0,0,0,.04) !important; }
.check-inner { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; min-height: 48px; }
.cb {
  width: 28px; height: 28px; border: 1.5px solid var(--border2); border-radius: 3px;
  background: transparent; display: flex; align-items: center; justify-content: center;
  transition: all .15s; font-family:'Courier New',Courier,monospace;
  font-size: 18px; font-weight: 700; line-height: 1; color: var(--muted);
}
.check-cell      .cb::after { content: '–'; }
.check-cell.plus .cb { background: rgba(22,163,74,.1); border-color: var(--buy); color: var(--buy); box-shadow: none; }
.check-cell.plus .cb::after { content: '+'; }
.check-cell.minus .cb { background: rgba(220,38,38,.1); border-color: var(--sell); color: var(--sell); box-shadow: none; }
.check-cell.minus .cb::after { content: '−'; }

/* BUY/SELL */
.bs-toggle { display: flex; padding: 6px; justify-content: center; }
.bs-btn { padding: 4px 10px; font-size: 9px; font-weight: 700; letter-spacing: .1em; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-family:'Courier New',Courier,monospace; transition: all .15s; }
.bs-btn:first-child { border-right: none; border-radius: 2px 0 0 2px; }
.bs-btn:last-child  { border-radius: 0 2px 2px 0; }
.bs-btn.active-buy  { background: var(--buy);  color: #ffffff; border-color: var(--buy); }
.bs-btn.active-sell { background: var(--sell); color: #ffffff; border-color: var(--sell); }

/* DECISION */
.decision-row td { border-top: 2px solid var(--border2); padding: 0; }
.decision-wrap { display: flex; align-items: flex-start; }
.decision-label { padding: 12px 14px; font-size: 9px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); white-space: nowrap; border-right: 1px solid var(--border); min-width: 100px; align-self: stretch; display: flex; align-items: center; }
.decision-text { flex: 1; padding: 12px 16px; font-size: 12px; line-height: 1.6; color: var(--text); outline: none; min-height: 48px; background: transparent; border: none; resize: none; font-family:'Courier New',Courier,monospace; width: 100%; }
.decision-text::placeholder { color: var(--muted); font-style: italic; }

/* SIGNALS */
.signal-row { border: 1px solid var(--border2); border-top: none; padding: 10px 14px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; background: var(--panel); }
.signal-label { font-size: 9px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
.signal-pill { padding: 4px 11px; font-size: 10px; font-weight: 700; letter-spacing: .1em; border-radius: 2px; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--muted); font-family:'Courier New',Courier,monospace; transition: all .15s; }
.signal-pill.active           { background: var(--accent); color: #fff; border-color: var(--accent); }
.signal-pill.vol-up.active    { background: rgba(22,163,74,.12); color: var(--buy);  border-color: var(--buy); }
.signal-pill.vol-down.active  { background: rgba(220,38,38,.12);  color: var(--sell); border-color: var(--sell); }
.signal-pill.s-long.active    { background: rgba(22,163,74,.15);  color: var(--buy);  border-color: var(--buy);  box-shadow: none; }
.signal-pill.s-short.active   { background: rgba(220,38,38,.15);  color: var(--sell); border-color: var(--sell); box-shadow: none; }

/* SCORE */
.score-section { display: flex; align-items: center; gap: 14px; padding: 9px 14px; border: 1px solid var(--border2); border-top: none; background: var(--panel); flex-wrap: wrap; }
.score-label { font-size: 10px; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; white-space: nowrap; }
.score-bar-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; min-width: 80px; }
.score-bar { height: 100%; background: linear-gradient(90deg, var(--sell), var(--neutral), var(--buy)); border-radius: 3px; transition: width .4s ease; width: 0%; }
.score-val { font-family:'Times New Roman',Times,Georgia,serif;font-weight:700; font-size: 20px; letter-spacing: .08em; color: var(--text); min-width: 80px; text-align: right; }

.num-cell { width: 52px; height: 48px; padding: 0 !important; }
.num-inp { width: 100%; height: 100%; min-height: 48px; border: none; background: transparent; text-align: center; font-family:'Courier New',Courier,monospace; font-size: 13px; font-weight: 700; color: var(--text); outline: none; cursor: pointer; }
.num-inp::-webkit-inner-spin-button { opacity: 0; }
.num-inp:hover, .num-inp:focus { background: var(--hover); }
.pct-cell { width: 58px; height: 48px; padding: 0 !important; }
.pct-inp { width: 100%; height: 100%; min-height: 48px; border: none; background: transparent; text-align: center; font-family:'Courier New',Courier,monospace; font-size: 13px; font-weight: 700; color: var(--accent); outline: none; cursor: pointer; }
.pct-inp::-webkit-inner-spin-button { opacity: 0; }
.pct-inp:hover, .pct-inp:focus { background: var(--hover); }
.icon-btn.tf-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div>
      <div class="title">Таблица торговых решений</div>
      <div class="subtitle">принятие решений · технический анализ</div>
    </div>
    <div class="topbar-btns">
      <span id="save-status"></span>
      <button class="btn" id="export-btn">↓ Сохранить</button>
      <label class="btn label-wrap">
        ↑ Загрузить
        <input type="file" id="import-input" accept=".html" style="display:none">
      </label>
      <button class="btn" id="theme-btn" title="Сменить тему">☀</button>
      <button class="btn green" id="add-btn">+ Новая таблица</button>
    </div>
  </div>

  <div id="tables-container"></div>

</div>
<script>
var tableCount = 0;

function todayVal() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function makeCell() {
  return '<td class="check-cell"><div class="check-inner"><div class="cb"></div></div></td>';
}

function makeNumCell() {
  return '<td class="num-cell"><input class="num-inp" type="number" min="1" max="10" placeholder="-"></td>';
}

function makePercentCell() {
  return '<td class="pct-cell"><input class="pct-inp" type="number" min="0" max="100" placeholder="-"></td>';
}

function makeRow(tf) {
  return '<tr class="data-row">' +
    '<td class="tf-cell">' + tf + '</td>' +
    '<td><div class="bs-toggle">' +
      '<button class="bs-btn">BUY</button>' +
      '<button class="bs-btn">SELL</button>' +
    '</div></td>' +
    makeCell() + makeCell() + makeCell() +
    makeCell() + makeNumCell() +
    makeCell() + makeNumCell() +
    makeCell() + makeCell() + makePercentCell() + makeCell() +
  '</tr>';
}

function addTable(preset) {
  tableCount++;
  var n = tableCount;
  var div = document.createElement('div');
  div.className = 'table-block';

  div.innerHTML =
    '<div class="block-header">' +
      '<span class="block-num">#' + n + '</span>' +
      '<input class="block-title" type="text" placeholder="ТАБЛИЦА ПРИНЯТИЯ ТОРГОВЫХ РЕШЕНИЙ" value="ТАБЛИЦА ПРИНЯТИЯ ТОРГОВЫХ РЕШЕНИЙ">' +
      '<div class="block-header-right">' +
        '<input type="date" class="date-inp" value="' + todayVal() + '">' +
        '<button class="icon-btn tf-toggle-btn" title="TF">≡</button>' +
        '<button class="icon-btn col-btn">−</button>' +
        '<button class="icon-btn del-btn">✕</button>' +
      '</div>' +
    '</div>' +
    '<div class="block-body">' +
      '<div class="table-wrap"><table>' +
        '<tr class="th-cols">' +
          '<th>TF</th><th>BUY / SELL</th><th>B.BANDS</th>' +
          '<th>ADEVO</th><th>КРУГИ</th>' +
          '<th>ДИВЕР<br>СКРЫТЫЕ</th><th>КОЛ-ВО<br>1–10</th>' +
          '<th>ДИВЕР<br>ОБЫЧНЫЕ</th><th>КОЛ-ВО<br>1–10</th>' +
          '<th>STOCH<br>RSI</th><th>SHORTS/<br>LONGS</th><th>%</th><th>СВЕЧИ</th>' +
        '</tr>' +
        makeRow('1H') + makeRow('4H') + makeRow('1D') + makeRow('1W') + makeRow('1M') +
        '<tr class="decision-row"><td colspan="14"><div class="decision-wrap">' +
          '<div class="decision-label">РЕШЕНИЕ:</div>' +
          '<textarea class="decision-text" placeholder="Введите торговое решение…" rows="2"></textarea>' +
        '</div></td></tr>' +
      '</table></div>' +
      '<div class="signal-row">' +
        '<div class="signal-label">сигнал:</div>' +
        '<button class="signal-pill vol-up">ОБЪЁМ ↑</button>' +
        '<button class="signal-pill vol-down">ОБЪЁМ ↓</button>' +
        '<button class="signal-pill vol-down">ШОРТ</button>' +
        '<button class="signal-pill vol-up">ЛОНГ</button>' +
        '<button class="signal-pill">ОЖИДАНИЕ</button>' +
        '<button class="signal-pill s-long">СТРОНГ ЛОНГ</button>' +
        '<button class="signal-pill s-short">СТРОНГ ШОРТ</button>' +
      '</div>' +
      '<div class="score-section">' +
        '<div class="score-label">подтверждений</div>' +
        '<div class="score-bar-wrap"><div class="score-bar"></div></div>' +
        '<div class="score-val">+0 / −0</div>' +
      '</div>' +
    '</div>';

  document.getElementById('tables-container').appendChild(div);

  // Collapse button
  div.querySelector('.col-btn').addEventListener('click', function() {
    var collapsed = div.classList.toggle('collapsed');
    this.textContent = collapsed ? '+' : '−';
  });

  // TF toggle
  div.querySelector('.tf-toggle-btn').addEventListener('click', function() {
    var panel = div.querySelector('.tf-vis-panel');
    if (!panel) {
      panel = document.createElement('div');
      panel.className = 'tf-vis-panel';
      panel.style.cssText = 'display:flex;gap:6px;align-items:center;padding:7px 14px;background:var(--panel);border:1px solid var(--border2);border-top:none;flex-wrap:wrap;';
      var lbl = document.createElement('span');
      lbl.textContent = 'TF:';
      lbl.style.cssText = 'font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-right:6px;';
      panel.appendChild(lbl);
      ['1H','4H','1D','1W','1M'].forEach(function(tf) {
        var b = document.createElement('button');
        b.className = 'tf-row-btn active';
        b.textContent = tf;
        b.dataset.tf = tf;
        b.style.cssText = 'padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.1em;cursor:pointer;border:1px solid var(--border2);background:var(--tf-bg);color:var(--tf-color);font-family:inherit;transition:opacity .15s;opacity:1;';
        b.addEventListener('click', function(e) {
          e.stopPropagation();
          var show = b.classList.toggle('active');
          b.style.opacity = show ? '1' : '0.3';
          div.querySelectorAll('.data-row').forEach(function(row) {
            var cell = row.querySelector('.tf-cell');
            if (cell && cell.textContent.trim() === tf) row.style.display = show ? '' : 'none';
          });
          saveState();
        });
        panel.appendChild(b);
      });
      div.querySelector('.table-wrap').parentNode.insertBefore(panel, div.querySelector('.table-wrap'));
    }
    var vis = panel.style.display !== 'none';
    panel.style.display = vis ? 'none' : 'flex';
    this.style.color = vis ? '' : 'var(--accent)';
    this.style.borderColor = vis ? '' : 'var(--accent)';
  });

  // Delete button
  div.querySelector('.del-btn').addEventListener('click', function() {
    div.style.transition = 'opacity .22s, transform .22s';
    div.style.opacity = '0';
    div.style.transform = 'translateY(-8px)';
    setTimeout(function() { div.remove(); saveState(); }, 230);
  });

  // Check cells
  div.querySelectorAll('.check-cell').forEach(function(cell) {
    cell.addEventListener('click', function() {
      if (!cell.classList.contains('plus') && !cell.classList.contains('minus')) {
        cell.classList.add('plus');
      } else if (cell.classList.contains('plus')) {
        cell.classList.remove('plus');
        cell.classList.add('minus');
      } else {
        cell.classList.remove('minus');
      }
      updateScore(div);
      saveState();
    });
  });

  // BUY/SELL buttons
  div.querySelectorAll('.bs-toggle').forEach(function(wrap) {
    wrap.querySelectorAll('.bs-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var isBuy = btn === wrap.querySelector('.bs-btn:first-child');
        var cls = isBuy ? 'active-buy' : 'active-sell';
        var other = isBuy ? 'active-sell' : 'active-buy';
        wrap.querySelectorAll('.bs-btn').forEach(function(b) { b.classList.remove('active-buy','active-sell'); });
        if (!btn.classList.contains(cls)) btn.classList.add(cls);
        saveState();
      });
    });
  });

  // Signal pills
  div.querySelectorAll('.signal-pill').forEach(function(pill) {
    pill.addEventListener('click', function() {
      pill.classList.toggle('active');
      saveState();
    });
  });

  // Decision textarea
  div.querySelectorAll('.num-inp, .pct-inp').forEach(function(inp) {
    inp.addEventListener('input', saveState);
  });

  div.querySelector('.decision-text').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
    saveState();
  });

  // Title / date save
  div.querySelector('.block-title').addEventListener('input', saveState);
  div.querySelector('.date-inp').addEventListener('change', saveState);

  // Apply preset if provided
  if (preset) applyPreset(div, preset);

  return div;
}

function updateScore(block) {
  var plus  = block.querySelectorAll('.check-cell.plus').length;
  var minus = block.querySelectorAll('.check-cell.minus').length;
  var total = block.querySelectorAll('.check-cell').length;
  var pct   = total > 0 ? (plus / total * 100) : 0;
  block.querySelector('.score-bar').style.width = pct + '%';
  block.querySelector('.score-val').textContent = '+' + plus + ' / −' + minus;
}

// ── STATE ──

function getState() {
  var blocks = [];
  document.querySelectorAll('.table-block').forEach(function(block) {
    var cells = [];
    block.querySelectorAll('.check-cell').forEach(function(c) {
      cells.push(c.classList.contains('plus') ? '+' : c.classList.contains('minus') ? '-' : '');
    });
    var nums = [];
    block.querySelectorAll('.num-inp').forEach(function(inp) { nums.push(inp.value); });
    var pcts = [];
    block.querySelectorAll('.pct-inp').forEach(function(inp) { pcts.push(inp.value); });
    var hTfs = [];
    block.querySelectorAll('.tf-row-btn').forEach(function(b) {
      if (!b.classList.contains('active')) hTfs.push(b.dataset.tf);
    });
    var bs = [];
    block.querySelectorAll('.bs-toggle').forEach(function(wrap) {
      bs.push(wrap.querySelector('.active-buy') ? 'BUY' : wrap.querySelector('.active-sell') ? 'SELL' : '');
    });
    var signals = [];
    block.querySelectorAll('.signal-pill').forEach(function(p) {
      signals.push(p.classList.contains('active'));
    });
    blocks.push({
      title:     block.querySelector('.block-title').value,
      date:      block.querySelector('.date-inp').value,
      collapsed: block.classList.contains('collapsed'),
      decision:  block.querySelector('.decision-text').value,
      cells: cells, bs: bs, signals: signals, nums: nums, pcts: pcts, hiddenTfs: hTfs
    });
  });
  return { blocks: blocks };
}

function applyPreset(block, p) {
  if (p.title)    block.querySelector('.block-title').value = p.title;
  if (p.date)     block.querySelector('.date-inp').value = p.date;
  if (p.decision) { var ta = block.querySelector('.decision-text'); ta.value = p.decision; ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
  if (p.collapsed) { block.classList.add('collapsed'); block.querySelector('.col-btn').textContent = '+'; }
  var cells = block.querySelectorAll('.check-cell');
  (p.cells || []).forEach(function(v, i) {
    if (!cells[i]) return;
    cells[i].classList.remove('plus','minus');
    if (v === '+') cells[i].classList.add('plus');
    if (v === '-') cells[i].classList.add('minus');
  });
  var numInps = block.querySelectorAll('.num-inp');
  (p.nums || []).forEach(function(v, i) { if (numInps[i]) numInps[i].value = v; });
  var pctInps = block.querySelectorAll('.pct-inp');
  (p.pcts || []).forEach(function(v, i) { if (pctInps[i]) pctInps[i].value = v; });
  var wraps = block.querySelectorAll('.bs-toggle');
  (p.bs || []).forEach(function(v, i) {
    if (!wraps[i] || !v) return;
    wraps[i].querySelectorAll('.bs-btn').forEach(function(b) { b.classList.remove('active-buy','active-sell'); });
    var target = v === 'BUY' ? wraps[i].querySelector('.bs-btn:first-child') : wraps[i].querySelector('.bs-btn:last-child');
    if (target) target.classList.add(v === 'BUY' ? 'active-buy' : 'active-sell');
  });
  var pills = block.querySelectorAll('.signal-pill');
  (p.signals || []).forEach(function(v, i) {
    if (pills[i]) pills[i].classList.toggle('active', !!v);
  });
  updateScore(block);
  if (p.hiddenTfs && p.hiddenTfs.length) {
    var tb = block.querySelector('.tf-toggle-btn');
    if (tb) tb.click();
    setTimeout(function() {
      (p.hiddenTfs || []).forEach(function(tf) {
        var b = block.querySelector('.tf-row-btn[data-tf="' + tf + '"]');
        if (b && b.classList.contains('active')) b.click();
      });
      var pn = block.querySelector('.tf-vis-panel');
      if (pn) { pn.style.display='none'; var tb2=block.querySelector('.tf-toggle-btn'); if(tb2){tb2.style.color='';tb2.style.borderColor='';} }
    }, 50);
  }
}

function loadState(state) {
  document.getElementById('tables-container').innerHTML = '';
  tableCount = 0;
  (state.blocks || []).forEach(function(b) { addTable(b); });
}

// ── LOCALSTORAGE ──

function saveState() {
  try {
    localStorage.setItem('tt_v2', JSON.stringify(getState()));
    var el = document.getElementById('save-status');
    el.textContent = '● сохранено';
    el.style.color = 'var(--buy)';
    clearTimeout(el._t);
    el._t = setTimeout(function() { el.textContent = ''; }, 2000);
  } catch(e) {}
}

      el._t = setTimeout(function() { el.textContent = ''; }, 2500);
    } catch(err) {
      alert('Ошибка загрузки: ' + err.message);
    }
  };
  reader.readAsText(file);
  this.value = '';
});

// ── ADD TABLE BUTTON ──

document.getElementById('add-btn').addEventListener('click', function() {
  addTable(null);
  saveState();
});

// ── THEME ──
var isDark = localStorage.getItem('tt_theme') === 'dark';
function applyTheme() {
  document.documentElement.classList.toggle('dark', isDark);
  document.getElementById('theme-btn').textContent = isDark ? '☀' : '☾';
}
document.getElementById('theme-btn').addEventListener('click', function() {
  isDark = !isDark;
  localStorage.setItem('tt_theme', isDark ? 'dark' : 'light');
  applyTheme();
});
applyTheme();

// ── INIT ──

if (window.__TT_PRESET__) {
  loadState(window.__TT_PRESET__);
} else {
  try {
    var saved = localStorage.getItem('tt_v2');
    if (saved) { loadState(JSON.parse(saved)); }
    else { addTable(null); }
  } catch(e) { addTable(null); }
}
</script>
</body>
</html>
