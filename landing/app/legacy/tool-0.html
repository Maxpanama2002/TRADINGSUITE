<!DOCTYPE html><html lang="ru"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Торговый журнал</title>
<script src="../vendor/chart.umd.js"></script>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f0efe9; --surface:#ffffff; --surf2:#f5f4f0; --surf3:#eae9e3;
  --text:#1a1a18; --text2:#6b6b67; --text3:#9a9a96;
  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.17);
  --radius:10px; --radius-lg:14px;
  --font:'Times New Roman',Times,Georgia,serif;
  --mono:'Courier New',Courier,monospace;
  --green-bg:#C0DD97; --green-bd:#639922; --green-tx:#27500A;
  --red-bg:#F7C1C1;   --red-bd:#E24B4A;   --red-tx:#791F1F;
  --amber-bg:#FAC775; --amber-bd:#EF9F27; --amber-tx:#633806;
  --blue-bg:#B5D4F4;  --blue-bd:#378ADD;  --blue-tx:#0C447C;
  --purple-bg:#CECBF6;--purple-bd:#7F77DD;--purple-tx:#26215C;
  --pos:#27500A; --neg:#791F1F;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;min-height:100vh;padding:28px 16px;}
.page{max-width:860px;margin:0 auto;}
.page-wide{max-width:1060px;margin:0 auto;}
h1{font-size:28px;font-weight:700;letter-spacing:-0.01em;margin-bottom:4px;}
.subtitle{font-size:14px;color:var(--text2);margin-bottom:24px;}
.section-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;}
.card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:18px 20px;}
.card+.card{margin-top:12px;}
.card-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;padding-bottom:10px;border-bottom:0.5px solid var(--border);}
.metric-grid{display:grid;gap:8px;margin-bottom:18px;}
.mg-4{grid-template-columns:repeat(4,1fr);} .mg-3{grid-template-columns:repeat(3,1fr);} .mg-2{grid-template-columns:repeat(2,1fr);}
.metric{background:var(--surf2);border-radius:var(--radius);padding:12px 14px;}
.metric-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.metric-value{font-size:20px;font-weight:700;font-family:var(--mono);}
.pos{color:var(--pos);} .neg{color:var(--neg);} .blue{color:var(--blue-tx);} .amber{color:var(--amber-tx);}
.tabs-bar{display:flex;gap:2px;background:var(--surf2);border-radius:var(--radius);padding:3px;margin-bottom:18px;}
.tab-btn{flex:1;padding:9px;font-size:14px;font-weight:600;text-align:center;cursor:pointer;background:none;border:none;color:var(--text2);border-radius:8px;font-family:var(--font);transition:all .15s;}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field.full{grid-column:span 2;} .field.full3{grid-column:span 3;}
.field label{font-size:12px;color:var(--text2);}
input[type=text],input[type=number],input[type=datetime-local],input[type=date],select,textarea{width:100%;padding:9px 11px;background:var(--surf2);border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;color:var(--text);font-family:var(--font);outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--text3);background:var(--surface);}
textarea{resize:vertical;min-height:56px;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--surf3);border-radius:2px;outline:none;border:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--surface);}
.btn-primary{width:100%;padding:11px;background:var(--text);color:var(--surface);border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s;}
.btn-primary:hover{opacity:.82;}
.btn-secondary{padding:8px 16px;background:none;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s;}
.btn-secondary:hover{border-color:var(--text);color:var(--text);}
.toggle-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.toggle-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.tbtn{padding:10px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surf2);color:var(--text2);text-align:center;font-family:var(--font);transition:all .15s;}
.tbtn:hover{border-color:var(--text3);color:var(--text);}
.tbtn.a-green{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);font-weight:700;}
.tbtn.a-red{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);font-weight:700;}
.tbtn.a-amber{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);font-weight:700;}
.tbtn.a-blue{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);font-weight:700;}
.tbtn.a-dark{background:var(--text);color:var(--surface);border-color:var(--text);font-weight:700;}
.badge{display:inline-block;padding:3px 8px;border-radius:99px;font-size:10px;font-weight:700;}
.b-green{background:var(--green-bg);color:var(--green-tx);}
.b-red{background:var(--red-bg);color:var(--red-tx);}
.b-amber{background:var(--amber-bg);color:var(--amber-tx);}
.b-blue{background:var(--blue-bg);color:var(--blue-tx);}
.b-purple{background:var(--purple-bg);color:var(--purple-tx);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;border-bottom:0.5px solid var(--border2);}
tbody td{padding:9px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surf2);}
.divider{height:0.5px;background:var(--border2);margin:16px 0;}
.mono{font-family:var(--mono);}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:15px;}
.chart-wrap{position:relative;width:100%;height:240px;margin:10px 0;}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--text2);}
.detail-val{font-family:var(--mono);font-weight:700;}
.verdict{padding:12px 16px;font-size:14px;margin-bottom:18px;border-left:3px solid;line-height:1.6;border-radius:0 var(--radius) var(--radius) 0;}
.v-profit{border-color:var(--green-bd);background:var(--green-bg);color:var(--green-tx);}
.v-loss{border-color:var(--red-bd);background:var(--red-bg);color:var(--red-tx);}
.v-neutral{border-color:var(--text3);background:var(--surf2);color:var(--text2);}
.v-partial{border-color:var(--amber-bd);background:var(--amber-bg);color:var(--amber-tx);}
.insight-box{background:var(--surf2);border:0.5px solid var(--border);border-radius:var(--radius);padding:2px 14px;margin-top:6px;}
.insight-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.insight-row:last-child{border-bottom:none;}
@media(max-width:560px){.mg-4,.mg-3{grid-template-columns:1fr 1fr;}.form-grid,.form-grid-3{grid-template-columns:1fr;}.field.full,.field.full3{grid-column:span 1;}}

.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:1.5px dashed var(--border2);border-radius:var(--radius-lg);background:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--text2);font-family:var(--font);transition:all .15s;margin-bottom:10px;}
.add-btn:hover{background:var(--surf2);color:var(--text);border-color:var(--text3);}
.plus-icon{width:22px;height:22px;border-radius:50%;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:17px;line-height:1;flex-shrink:0;}
.trade-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:8px;overflow:hidden;}
.card-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .1s;}
.card-header:hover{background:var(--surf2);}
.card-chevron{font-size:10px;color:var(--text3);margin-left:auto;transition:transform .2s;flex-shrink:0;}
.trade-card.open .card-chevron{transform:rotate(180deg);}
.card-body{display:none;padding:0 14px 16px;border-top:0.5px solid var(--border);}
.trade-card.open .card-body{display:block;}
.card-title{font-size:15px;font-weight:700;}
.card-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.del-card-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:12px;padding:4px 10px;font-family:var(--font);flex-shrink:0;transition:all .15s;}
.del-card-btn:hover{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-bd);}
.del-row-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px;transition:all .15s;}
.del-row-btn:hover{background:var(--red-bg);color:var(--red-tx);}
.ebtn{padding:9px 4px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surf2);color:var(--text2);text-align:center;font-family:var(--font);transition:all .15s;line-height:1.3;}
.ebtn:hover{border-color:var(--text3);color:var(--text);}
.ebtn[data-e="calm"].active{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);font-weight:700;}
.ebtn[data-e="fear"].active{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);font-weight:700;}
.ebtn[data-e="greed"].active{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue-tx);font-weight:700;}
.ebtn[data-e="fomo"].active{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);font-weight:700;}
.ebtn[data-e="revenge"].active{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple-tx);font-weight:700;}
.pbtn{padding:9px 4px;font-size:13px;font-weight:600;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surf2);color:var(--text2);text-align:center;font-family:var(--font);transition:all .15s;}
.pbtn:hover{border-color:var(--text3);color:var(--text);}
.pbtn[data-p="yes"].active{background:var(--green-bg);border-color:var(--green-bd);color:var(--green-tx);font-weight:700;}
.pbtn[data-p="partial"].active{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-tx);font-weight:700;}
.pbtn[data-p="no"].active{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-tx);font-weight:700;}
.emotion-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.plan-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.risk-result{background:var(--amber-bg);border:0.5px solid var(--amber-bd);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--amber-tx);font-weight:600;margin-top:8px;display:none;}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.filter-bar input,.filter-bar select{width:auto;flex:1;min-width:120px;padding:7px 10px;font-size:13px;}
.filter-bar .btn-secondary{flex-shrink:0;}
.export-bar{display:flex;gap:8px;margin-bottom:12px;}
/* PERIOD */
.period-box{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:18px;}
.period-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.ptype-btn{padding:12px 8px;font-size:13px;font-weight:700;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--surf2);color:var(--text2);text-align:center;font-family:var(--font);transition:all .15s;}
.ptype-btn.active{background:var(--text);color:var(--surface);border-color:var(--text);}
.period-selects{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.close-period-btn{width:100%;padding:12px;background:var(--amber-bg);color:var(--amber-tx);border:1.5px solid var(--amber-bd);border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:700;font-family:var(--font);transition:all .15s;}
.close-period-btn:hover{background:var(--amber-bd);color:#fff;}
.period-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:10px;overflow:hidden;}
.period-card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .1s;}
.period-card-header:hover{background:var(--surf2);}
.period-card.open .period-card-body{display:block;}
.period-card.open .period-chevron{transform:rotate(180deg);}
.period-card-body{display:none;padding:0 16px 16px;border-top:0.5px solid var(--border);}
.period-chevron{font-size:10px;color:var(--text3);margin-left:auto;transition:transform .2s;flex-shrink:0;}
.period-name{font-size:15px;font-weight:700;}
.period-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.period-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0;}
.del-period-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);color:var(--text2);cursor:pointer;font-size:12px;padding:4px 10px;font-family:var(--font);transition:all .15s;}
.del-period-btn:hover{background:var(--red-bg);color:var(--red-tx);border-color:var(--red-bd);}
.chart-toggle{display:flex;gap:6px;margin-bottom:10px;}.ctgl{padding:5px 14px;font-size:12px;font-weight:600;border:1px solid var(--border2);border-radius:6px;cursor:pointer;background:var(--surf2);color:var(--text2);font-family:var(--font);transition:all .15s;}.ctgl.active{background:var(--text);color:var(--bg);}.hm-wrap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:8px 0 16px;}.hm-cell{border-radius:var(--radius);padding:10px 6px;text-align:center;}.hm-day{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}.hm-wr{font-size:15px;font-weight:700;font-family:var(--mono);}.hm-meta{font-size:10px;opacity:.75;margin-top:3px;}.err-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}.err-lbl{font-size:12px;flex:0 0 150px;}.err-trk{flex:1;height:7px;background:var(--surf3);border-radius:4px;overflow:hidden;}.err-fill{height:100%;border-radius:4px;background:var(--red-bd);}.err-meta{font-size:12px;font-family:var(--mono);flex:0 0 90px;text-align:right;}

</style></head><body>
<div class="page">
  <h1>Торговый журнал</h1>
  <p class="subtitle">Фиксируй сделки, эмоции и следование плану</p>
  <div class="metric-grid mg-4" id="metrics-bar"></div>
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="showTab('log')">Сделки</button>
    <button class="tab-btn" onclick="showTab('periods')">Периоды</button>
    <button class="tab-btn" onclick="showTab('stats')">Аналитика</button>
  </div>
  <div id="tab-log">
    <button class="add-btn" onclick="addCard()"><span class="plus-icon">+</span>&nbsp;Новая сделка</button>
    <div id="cards"></div>
  </div>
  <div id="tab-periods" style="display:none">
    <div class="period-box">
      <div class="section-label">Закрыть период</div>
      <div class="period-type-grid">
        <button class="ptype-btn active" onclick="setPType('month')" id="pt-month">Месяц</button>
        <button class="ptype-btn" onclick="setPType('quarter')" id="pt-quarter">Квартал</button>
        <button class="ptype-btn" onclick="setPType('year')" id="pt-year">Год</button>
      </div>
      <div class="period-selects" id="period-selects"></div>
      <div id="period-preview" style="margin-bottom:14px"></div>
      <button class="close-period-btn" onclick="closePeriod()">Закрыть и сохранить период</button>
    </div>
    <div class="section-label" style="margin-bottom:8px">Сохранённые периоды</div>
    <div id="archived-periods"></div>
  </div>
  <div id="tab-stats" style="display:none"><div id="stats-content"></div></div>
  </div>
<script>
const EL={calm:'Спокойствие',fear:'Страх',greed:'Жадность',fomo:'FOMO',revenge:'Месть'};
const PL={yes:'Полностью',partial:'Частично',no:'Нарушил'};
let trades=[],cardIdx=0,pnlChart=null,archivedPeriods=[],currentPType='month';
function load(){try{const s=localStorage.getItem('tj_v3');if(s)trades=JSON.parse(s);}catch(e){}try{const p=localStorage.getItem('tj_periods');if(p)archivedPeriods=JSON.parse(p);}catch(e){}renderMetrics();}
function save(){localStorage.setItem('tj_v3',JSON.stringify(trades));}
function savePeriods(){localStorage.setItem('tj_periods',JSON.stringify(archivedPeriods));}
function nowLocal(){const n=new Date();return new Date(n-n.getTimezoneOffset()*60000).toISOString().slice(0,16);}
function showTab(t){['log','periods','stats'].forEach((tab,i)=>{document.getElementById('tab-'+tab).style.display=tab===t?'':'none';document.querySelectorAll('.tab-btn')[i].classList.toggle('active',tab===t);});if(t==='stats')renderStats();if(t==='periods'){buildPeriodSelects();renderArchivedPeriods();}}


function clearFilters(){document.getElementById('f-search').value='';document.getElementById('f-dir').value='';document.getElementById('f-emotion').value='';renderHistory();}
function getFilteredTrades(){let r=trades;const s=(document.getElementById('f-search').value||'').toLowerCase();const d=document.getElementById('f-dir').value;const e=document.getElementById('f-emotion').value;if(s)r=r.filter(t=>t.asset&&t.asset.toLowerCase().includes(s));if(d)r=r.filter(t=>t.dir===d);if(e)r=r.filter(t=>t.emotion===e);return r;}
function exportCSV(){
  const ft=getFilteredTrades();
  if(!ft.length){alert('Нет сделок для экспорта');return;}
  const h=['Дата','Инструмент','Направление','Размер','Цена входа','Цена выхода','Стоп-лосс','Тейк-профит','P&L','Эмоция','Соблюдение плана','Причина выхода','Заметки'];
  const rows=ft.map(t=>[t.date||'',t.asset||'',t.dir==='long'?'Long':'Short',t.size||'',t.entry||'',t.exit||'',t.sl||'',t.tp||'',t.pnl||'',EL[t.emotion]||'',PL[t.plan]||'',t.reason||'',t.notes||''].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv='\uFEFF'+[h.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='trades_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
// RISK CALC
function calcRisk(id){
  const deposit=parseFloat(document.getElementById('rc-dep-'+id).value)||0;
  const riskPct=parseFloat(document.getElementById('rc-pct-'+id).value)||1;
  const entry=parseFloat(document.getElementById('fen-'+id).value)||0;
  const sl=parseFloat(document.getElementById('fsl-'+id).value)||0;
  const res=document.getElementById('risk-result-'+id);
  if(!deposit||!entry||!sl){res.style.display='none';return;}
  const riskAmt=deposit*riskPct/100;
  const diff=Math.abs(entry-sl);
  if(!diff){res.style.display='none';return;}
  const units=riskAmt/diff;
  const posSize=(units*entry).toFixed(2);
  res.style.display='block';
  res.textContent='Риск: $'+riskAmt.toFixed(2)+' · Объём позиции: $'+posSize+' ('+units.toFixed(4)+' ед.)';
}
// PERIOD
const MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const QUARTERS=['I квартал (янв–март)','II квартал (апр–июнь)','III квартал (июл–сен)','IV квартал (окт–дек)'];
function setPType(t){currentPType=t;document.querySelectorAll('.ptype-btn').forEach(b=>b.classList.remove('active'));document.getElementById('pt-'+t).classList.add('active');buildPeriodSelects();}
function buildPeriodSelects(){
  const now=new Date();const cy=now.getFullYear();const cm=now.getMonth();const cq=Math.floor(cm/3);
  const sel=document.getElementById('period-selects');
  const yearOpts=Array.from({length:6},(_,i)=>cy-i).map(y=>`<option value="${y}">${y}</option>`).join('');

function closePeriod(){
  const{from,to,label}=getPeriodRange();const pts=trades.filter(t=>{if(!t.date)return false;const d=new Date(t.date);return d>=from&&d<=to;});

function renderHeatmap(el){

      <div class="hm-meta">${s.n?s.n+' сд':'нет'}</div>
      <div class="hm-meta">${s.n?(avg>=0?'+':'')+avg.toFixed(1):'—'}</div>
    </div>`;
  }).join('')}</div><div class="divider"></div>`;
}
function renderEmotionPlan(el){
  const bE={},bP={};trades.forEach(t=>{if(t.emotion){if(!bE[t.emotion])bE[t.emotion]={total:0,wins:0,pnl:0};bE[t.emotion].total++;if(t.pnl>0)bE[t.emotion].wins++;bE[t.emotion].pnl+=t.pnl;}if(t.plan){if(!bP[t.plan])bP[t.plan]={total:0,wins:0,pnl:0};bP[t.plan].total++;if(t.pnl>0)bP[t.plan].wins++;bP[t.plan].pnl+=t.pnl;}});
  el.innerHTML+=`<p class="section-label">Эмоция → результат</p><div class="insight-box">${Object.entries(bE).map(([k,v])=>`<div class="insight-row"><span>${EL[k]||k}</span><span class="mono" style="font-size:12px">${v.total} сд &middot; ВР ${Math.round(v.wins/v.total*100)}% &middot; <span style="color:${v.pnl>=0?'var(--pos)':'var(--neg)'};font-weight:700">${v.pnl>=0?'+':''}${v.pnl.toFixed(2)}</span></span></div>`).join('')}</div>
  <div class="divider"></div>
  <p class="section-label">Соблюдение плана → результат</p><div class="insight-box">${Object.entries(bP).map(([k,v])=>`<div class="insight-row"><span>${PL[k]||k}</span><span class="mono" style="font-size:12px">${v.total} сд &middot; ВР ${Math.round(v.wins/v.total*100)}% &middot; <span style="color:${v.pnl>=0?'var(--pos)':'var(--neg)'};font-weight:700">${v.pnl>=0?'+':''}${v.pnl.toFixed(2)}</span></span></div>`).join('')}</div>
  <div class="divider"></div>`;
}
function renderErrorAnalysis(el){
  const ET={emotion:'Эмоциональная',system:'Нарушение системы',signal:'Ложный сигнал',exit:'Плохой выход',force:'Форс-мажор'};
  const losses=trades.filter(t=>t.pnl<0);
  if(losses.length===0){el.innerHTML+='';return;}
  const byErr={};losses.forEach(t=>{const k=t.errType||'unknown';if(!byErr[k])byErr[k]={n:0,pnl:0};byErr[k].n++;byErr[k].pnl+=t.pnl;});
  const total=losses.length;
  const sorted=Object.entries(byErr).sort((a,b)=>b[1].n-a[1].n);
  const maxN=sorted[0]?sorted[0][1].n:1;
  el.innerHTML+=`<p class="section-label">Анализ ошибок (убыточные сделки: ${total})</p>
  <div class="insight-box">${sorted.map(([k,v])=>`
    <div class="err-row">
      <span class="err-lbl">${ET[k]||'Не указано'}</span>
      <div class="err-trk"><div class="err-fill" style="width:${Math.round(v.n/maxN*100)}%"></div></div>
      <span class="err-meta" style="color:var(--neg)">${v.n} сд · ${v.pnl.toFixed(0)}$</span>
    </div>`).join('')}
  </div>`;
}
function renderStats(){
  const el=document.getElementById('stats-content');
  if(trades.length<2){el.innerHTML='<div class="empty-state">Нужно хотя бы 2 сделки</div>';return;}
  el.innerHTML='';
  renderPnlSection(el);
  renderHeatmap(el);
  renderEmotionPlan(el);
  renderErrorAnalysis(el);
}
load();
</script></body></html>
